<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山西古建筑地图</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            --bg-primary: #f5f0e8;
            --bg-secondary: #fff;
            --bg-overlay: rgba(15, 10, 5, 0.85);
            --text-primary: #1a1209;
            --text-secondary: #5c4a32;
            --text-light: #8b7355;
            --accent: #8b2500;
            --accent-light: #c44000;
            --accent-gold: #c9a84c;
            --accent-blue: #2c5282;
            --border: #d4c4a8;
            --border-dark: #b8a078;
            --shadow: 0 4px 24px rgba(0,0,0,0.12);
            --shadow-heavy: 0 12px 48px rgba(0,0,0,0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #1a0f05 0%, #2c1810 50%, #1a0f05 100%);
            color: #f5e6c8;
            padding: 0 24px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--accent-gold);
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent-gold), #a07830);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .header-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f5e6c8, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 11px;
            color: rgba(245,230,200,0.6);
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-gold);
        }

        .stat-pill .num {
            font-weight: 700;
            font-size: 14px;
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 380px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 50;
            transition: width 0.3s ease;
        }

        .sidebar.collapsed {
            width: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Noto Sans SC', sans-serif;
            background: #fdfaf5;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-light);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 14px;
        }

        /* Filter tabs */
        .filter-row {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .filter-row::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Building list */
        .building-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .building-list::-webkit-scrollbar {
            width: 6px;
        }

        .building-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .building-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .building-card {
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 6px;
            border: 1px solid transparent;
            transition: all 0.2s;
            background: var(--bg-secondary);
        }

        .building-card:hover {
            border-color: var(--border-dark);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        .building-card.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, #fff8f5, #fff);
            box-shadow: 0 2px 12px rgba(139,37,0,0.1);
        }

        .building-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 5px;
        }

        .building-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .building-level {
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .level-guobao { background: #e8f0e8; color: #2d5016; }
        .level-shengbao { background: #e8f0f8; color: #1a3a5c; }
        .level-shibao { background: #f5f0e8; color: #6b4423; }

        .building-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .building-type {
            font-size: 11px;
            color: var(--accent);
            background: rgba(139,37,0,0.08);
            padding: 2px 7px;
            border-radius: 4px;
        }

        .building-location {
            font-size: 11px;
            color: var(--text-light);
        }

        .building-desc-preview {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== MAP AREA ===== */
        .map-area {
            flex: 1;
            position: relative;
        }

        #map-container {
            width: 100%;
            height: 100%;
        }

        .map-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8e0d0, #d4c8b8);
            gap: 20px;
        }

        .placeholder-icon {
            font-size: 64px;
            opacity: 0.5;
        }

        .placeholder-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .placeholder-desc {
            font-size: 14px;
            color: var(--text-light);
            max-width: 400px;
            text-align: center;
            line-height: 1.6;
        }

        .placeholder-key-box {
            background: var(--bg-secondary);
            border: 2px dashed var(--border-dark);
            border-radius: 12px;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 420px;
        }

        .placeholder-key-box input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Noto Sans SC', sans-serif;
            text-align: center;
        }

        .placeholder-key-box button {
            padding: 10px 24px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .placeholder-key-box button:hover {
            background: var(--accent-light);
        }

        /* Map loading */
        .map-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139,37,0,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== POPUP ===== */
        .map-popup {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            width: 340px;
            max-height: calc(100% - 40px);
            background: var(--bg-secondary);
            border-radius: 14px;
            box-shadow: var(--shadow-heavy);
            z-index: 200;
            overflow: hidden;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .map-popup.active {
            display: flex;
        }

        .popup-header {
            background: linear-gradient(135deg, #1a0f05, #3c2415);
            padding: 16px 18px 14px;
            color: #f5e6c8;
            position: relative;
        }

        .popup-close {
            position: absolute;
            right: 14px;
            top: 14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #f5e6c8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s;
        }

        .popup-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .popup-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 8px;
            padding-right: 30px;
        }

        .popup-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .popup-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-type { background: rgba(139,37,0,0.12); color: var(--accent); }
        .badge-level-guobao { background: #d4ecc4; color: #2d5016; }
        .badge-level-shengbao { background: #d4e8f4; color: #1a3a5c; }
        .badge-level-shibao { background: #f0e8d8; color: #6b4423; }

        .popup-body {
            padding: 16px 18px;
            overflow-y: auto;
            flex: 1;
        }

        .popup-section {
            margin-bottom: 14px;
        }

        .popup-section:last-child { margin-bottom: 0; }

        .popup-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .popup-value {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .popup-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .popup-coords {
            display: flex;
            gap: 10px;
            background: #f8f5f0;
            border-radius: 6px;
            padding: 8px 10px;
        }

        .popup-coords span {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .popup-era {
            font-size: 13px;
            color: var(--accent);
        }

        .popup-footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            background: #fdfaf5;
        }

        .popup-locate-btn {
            width: 100%;
            padding: 9px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .popup-locate-btn:hover {
            background: var(--accent-light);
        }

        /* ===== LEGEND ===== */
        .map-legend {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 12px 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            z-index: 50;
            display: none;
        }

        .map-legend.active { display: block; }

        .legend-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .legend-items {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-guobao { background: #c44000; box-shadow: 0 0 6px rgba(196,64,0,0.4); }
        .dot-shengbao { background: #2c5282; box-shadow: 0 0 6px rgba(44,82,130,0.4); }
        .dot-shibao { background: #8b7355; }

        /* ===== TOGGLE SIDEBAR BTN ===== */
        .toggle-sidebar {
            position: absolute;
            left: 380px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 48px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 12px;
            z-index: 60;
            transition: all 0.3s;
            box-shadow: 2px 0 8px rgba(0,0,0,0.08);
        }

        .toggle-sidebar:hover {
            background: #f5f0e8;
            color: var(--accent);
        }

        .sidebar.collapsed + .map-area .toggle-sidebar,
        .sidebar.collapsed ~ .toggle-sidebar {
            left: 0;
        }

        .toggle-sidebar.collapsed {
            left: 0;
        }

        /* ===== NO RESULT ===== */
        .no-result {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .no-result-icon { font-size: 36px; margin-bottom: 10px; }
        .no-result-text { font-size: 13px; }

        /* ===== CITY FILTER ===== */
        .city-filter {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 4px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .city-filter::-webkit-scrollbar { display: none; }

        .city-btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
        }

        .city-btn:hover { border-color: var(--accent); color: var(--accent); }
        .city-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 85%;
                max-width: 360px;
                z-index: 100;
                box-shadow: var(--shadow-heavy);
            }

            .sidebar.collapsed {
                width: 0;
            }

            .toggle-sidebar {
                left: 85%;
            }

            .map-popup {
                right: 10px;
                left: 10px;
                width: auto;
            }
        }

        /* Scrollbar */
        .popup-body::-webkit-scrollbar { width: 5px; }
        .popup-body::-webkit-scrollbar-track { background: transparent; }
        .popup-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div class="header-icon">&#x1F3DB;</div>
            <div>
                <div class="header-title">山西古建筑地图</div>
                <div class="header-subtitle">Ancient Architecture Atlas of Shanxi</div>
            </div>
        </div>
        <div class="header-right">
            <div class="stat-pill">
                <span class="num" id="stat-total">--</span>
                <span>处古建</span>
            </div>
            <div class="stat-pill">
                <span class="num" id="stat-shown">--</span>
                <span>已显示</span>
            </div>
            <div class="stat-pill" id="key-status-pill">
                <span id="key-status-text">&#x26A0; 待配置地图Key</span>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <span class="search-icon">&#x1F50D;</span>
                    <input type="text" id="search-input" placeholder="搜索古建筑名称、地点...">
                </div>
            </div>

            <!-- City filter -->
            <div class="city-filter" id="city-filter"></div>

            <!-- Type filter -->
            <div class="filter-row" id="type-filter"></div>

            <!-- Building list -->
            <div class="building-list" id="building-list"></div>
        </aside>

        <!-- MAP AREA -->
        <div class="map-area" id="map-area">
            <div id="map-container"></div>

            <!-- Map placeholder / key input -->
            <div class="map-placeholder" id="map-placeholder">
                <div class="placeholder-icon">&#x1F5FA;</div>
                <div class="placeholder-title">山西古建筑地图</div>
                <div class="placeholder-desc">
                    山西省是全国重点文物保护单位数量最多的省份，涵盖石窟寺、古塔、古寺、古城、壁画等众多类型的珍贵文化遗产
                </div>
                <div style="font-size:13px; color:var(--text-secondary); text-align:center;">
                    高德地图 Key 已配置，正在加载地图...
                </div>
            </div>

            <!-- Map loading -->
            <div class="map-loading" id="map-loading" style="display:none;">
                <div class="spinner"></div>
                <div style="font-size:13px; color:var(--text-secondary);">正在加载地图...</div>
            </div>

            <!-- Map popup -->
            <div class="map-popup" id="map-popup">
                <div class="popup-header">
                    <div class="popup-close" onclick="closePopup()">&#x2715;</div>
                    <div class="popup-name" id="popup-name">古建筑名称</div>
                    <div class="popup-badges" id="popup-badges"></div>
                </div>
                <div class="popup-body" id="popup-body"></div>
                <div class="popup-footer">
                    <button class="popup-locate-btn" onclick="locateOnMap()">
                        <span>&#x1F4CD;</span> 在地图上定位
                    </button>
                </div>
            </div>

            <!-- Legend -->
            <div class="map-legend" id="map-legend">
                <div class="legend-title">图例</div>
                <div class="legend-items">
                    <div class="legend-item"><div class="legend-dot dot-guobao"></div>全国重点文物保护单位</div>
                    <div class="legend-item"><div class="legend-dot dot-shengbao"></div>省级文物保护单位</div>
                    <div class="legend-item"><div class="legend-dot dot-shibao"></div>市级文物保护单位</div>
                </div>
            </div>

            <!-- Toggle sidebar -->
            <button class="toggle-sidebar" id="toggle-sidebar" onclick="toggleSidebar()">&#x25C0;</button>
        </div>
    </div>

    <!-- AMap SDK loaded synchronously with security config -->
    <script>
        // ===== AMap SECURITY CONFIG (must be set before script load) =====
        window._AMapSecurityConfig = {
            securityJsCode: "6d716470b354e1d8fa30af4f750378cb",
        };
        window.onMapApiLoaded = function() {
            // 高德 JS API 加载完成的回调
            window.__AMAP_READY__ = true;
            window.dispatchEvent(new Event('amap-ready'));
        };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=db83aa593c93704e07a1ad2c77054acc&plugin=AMap.Scale,AMap.ToolBar&callback=onMapApiLoaded"></script>
    <script>
        const buildings = [{"name": "晋祠", "type": "祠庙建筑群", "city": "太原市", "county": "晋源区", "location": "太原市晋源区晋祠镇", "lat": 37.7086, "lng": 112.4341, "desc": "晋祠始建于北魏，是为纪念晋国开国诸侯唐叔虞及母后邑姜而建。祠内有圣母殿、鱼沼飞梁、献殿等宋代建筑，以\"千古三名楼\"之称的难老泉最为著名。1961年列入第一批全国重点文物保护单位。", "era": "始建于北魏，宋代大规模重建", "level": "国保"}, {"name": "晋祠圣母殿", "type": "殿", "city": "太原市", "county": "晋源区", "location": "晋祠景区内", "lat": 37.7078, "lng": 112.4347, "desc": "圣母殿是晋祠中最古老、最壮观的建筑，建于北宋太平兴国九年（984年）。殿内有43尊宋代彩塑侍女像，形态各异，栩栩如生，是我国宋代泥塑艺术的珍品。", "era": "北宋太平兴国九年（984年）", "level": "国保"}, {"name": "晋祠鱼沼飞梁", "type": "桥", "city": "太原市", "county": "晋源区", "location": "晋祠景区内", "lat": 37.708, "lng": 112.4343, "desc": "鱼沼飞梁是晋祠中的一座古代桥梁，建于宋代，呈十字形，与圣母殿前的方形沼池（鱼沼）相接，是我国最早的十字形立交桥，具有极高的科学和艺术价值。", "era": "宋代", "level": "国保"}, {"name": "晋祠难老泉", "type": "泉", "city": "太原市", "county": "晋源区", "location": "晋祠景区内", "lat": 37.7075, "lng": 112.4338, "desc": "难老泉为晋祠三绝之一，泉水清澈，终年不竭，被誉为\"晋阳第一泉\"。泉水自古用于灌溉晋祠周边的稻田，形成了独特的北方水乡景观。", "era": "历史悠久", "level": "国保"}, {"name": "晋祠侍女像", "type": "彩塑", "city": "太原市", "county": "晋源区", "location": "晋祠圣母殿内", "lat": 37.7078, "lng": 112.4347, "desc": "圣母殿内共有43尊宋代彩塑侍女像，塑造了不同身份、不同性格的宫廷侍女形象，是中国古代雕塑艺术的杰作，被誉为\"晋祠三绝\"之一。", "era": "北宋（984年）", "level": "国保"}, {"name": "晋祠铁人", "type": "铁铸", "city": "太原市", "county": "晋源区", "location": "晋祠对越坊前", "lat": 37.7082, "lng": 112.434, "desc": "晋祠有四尊铁铸武士像，高约1.9米，神情威武，造型生动。铸造于北宋绍圣四年（1097年），距今已有900多年历史，是研究宋代铸造工艺的珍贵实物。", "era": "北宋绍圣四年（1097年）", "level": "国保"}, {"name": "晋祠周柏", "type": "古树", "city": "太原市", "county": "晋源区", "location": "晋祠景区内", "lat": 37.7084, "lng": 112.4336, "desc": "晋祠有古柏两株，传为西周所植，至今已有3000多年历史。其中一株树身向南倾斜，如虬龙飞舞，被誉为\"晋祠三绝\"之一。", "era": "西周（约3000年前）", "level": "国保"}, {"name": "天龙山石窟", "type": "石窟寺", "city": "太原市", "county": "晋源区", "location": "太原市晋源区西南天龙山", "lat": 37.7094, "lng": 112.4, "desc": "天龙山石窟始凿于东魏，历经北齐、隋、唐等多个朝代营造，形成了25个洞窟共存1600余尊造像的规模。山崖上精美的佛教造像被誉为\"天龙山样式\"，代表了公元6至9世纪中国佛教艺术的最高水平。1920年代因外国探险家大规模盗凿，流失海外珍品众多。2013年天龙山石窟数字复原工程启动，流失造像以3D打印方式\"回归\"。", "era": "东魏至唐（534-907年）", "level": "国保"}, {"name": "店头村古建筑群", "type": "古村", "city": "太原市", "county": "晋源区", "location": "太原市晋源区店头村", "lat": 37.7155, "lng": 112.4183, "desc": "店头村是晋阳古城附近的一处千年古村，因位于交通要道店铺林立而得名。村内保存有大量明清时期的窑洞建筑群和古树名木，是研究晋阳古城周边历史的重要实物资料。", "era": "明清时期", "level": "国保"}, {"name": "太原古县城", "type": "古城", "city": "太原市", "county": "晋源区", "location": "太原市晋源区古县城村", "lat": 37.721, "lng": 112.429, "desc": "太原古县城是晋阳古城遗址的一部分，始建于春秋时期，明洪武九年（1376年）重建。城内有大量明清古建筑，如县衙、文庙、城隍庙等，2011年启动保护修复工程。", "era": "明洪武九年（1376年）重建", "level": "国保"}, {"name": "窦大夫祠", "type": "祠", "city": "太原市", "county": "尖草坪区", "location": "太原市尖草坪区上兰村", "lat": 37.9242, "lng": 112.4397, "desc": "窦大夫祠又称英济祠，是为纪念春秋时期晋国大夫窦犨而建的祠庙。祠内建筑保存基本完整，有元、明、清各代遗构，是研究晋祠祭祀文化的重要实物。", "era": "元、明、清", "level": "国保"}, {"name": "崛围山多福寺", "type": "寺", "city": "太原市", "county": "尖草坪区", "location": "太原市尖草坪区崛围山", "lat": 37.932, "lng": 112.448, "desc": "多福寺位于崛围山巅，始建于唐贞元二年（786年），明代曾大规模修缮。寺内有明洪武年间铸造的大铁钟一口，重达万斤，是太原地区现存最古老的铁钟之一。", "era": "唐贞元二年（786年）始建", "level": "国保"}, {"name": "永祚寺（双塔寺）", "type": "寺", "city": "太原市", "county": "迎泽区", "location": "太原市迎泽区郝庄村", "lat": 37.8455, "lng": 112.5555, "desc": "永祚寺俗称双塔寺，始建于明万历年间。寺内两座13层舍利塔高达54米以上，隔街相望，形成\"双塔凌霄\"的壮观景象，是太原市的标志性古建筑和城市景观。", "era": "明万历年间（1573-1620年）", "level": "国保"}, {"name": "纯阳宫", "type": "道观", "city": "太原市", "county": "迎泽区", "location": "太原市迎泽区起凤街", "lat": 37.8645, "lng": 112.555, "desc": "纯阳宫是太原古建筑群中保存最完整的一处道观，始建于元代，明清均有修缮。建筑布局严谨，殿阁楼台错落有致，是研究元、明、清道教建筑的重要实例。", "era": "元代始建", "level": "国保"}, {"name": "大关帝庙", "type": "庙", "city": "太原市", "county": "迎泽区", "location": "太原市迎泽区庙前街", "lat": 37.8575, "lng": 112.5525, "desc": "大关帝庙是太原现存规模最大、形制最完整的关帝庙，始建于宋，明清多次重修。庙内建筑布局完整，雕刻精美，是研究关羽崇拜和关帝庙建筑的重要实物。", "era": "宋代始建", "level": "国保"}, {"name": "唱经楼", "type": "楼", "city": "太原市", "county": "迎泽区", "location": "太原市迎泽区柳巷", "lat": 37.864, "lng": 112.553, "desc": "唱经楼是明清时期科举考试时用于唱名的楼阁建筑，是太原古城的重要标志性建筑之一。建筑为两层砖木结构，造型古朴典雅，是研究明清科举制度的重要实物。", "era": "明万历年间", "level": "省保"}, {"name": "云冈石窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "大同市云冈区云冈镇", "lat": 40.1094, "lng": 113.1304, "desc": "云冈石窟是中国三大石窟之一，始凿于北魏文成帝和平元年（460年），历经约70年营造，形成绵延1公里的45个主要洞窟、5万余尊造像的宏大规模。其中昙曜五窟造像气势恢宏，代表了5世纪世界雕刻艺术的最高水平，被誉为\"中国佛教艺术的第一个巅峰\"。1961年列入第一批全国重点文物保护单位，2001年列入世界文化遗产名录。", "era": "北魏和平元年（460年）至494年", "level": "国保"}, {"name": "云冈石窟第1-4窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "云冈石窟景区东部", "lat": 40.1105, "lng": 113.133, "desc": "云冈石窟早期洞窟（第1-4窟），亦称\"昙曜五窟\"（部分），由著名高僧昙曜主持开凿，洞窟形制为椭圆形平面，穹隆顶，造像以三世佛为主，体态雄健，呈现典型的犍陀罗风格。", "era": "北魏和平年间（460-465年）", "level": "国保"}, {"name": "云冈石窟第5-6窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "云冈石窟景区中部", "lat": 40.109, "lng": 113.131, "desc": "第5、6窟为双窟，形制规整，窟内造像内容丰富。第6窟为中心塔柱窟，雕满佛传故事浮雕，技法精湛，是云冈石窟中最精美的洞窟之一，被誉为\"云冈第一伟观\"。", "era": "北魏（约465-494年）", "level": "国保"}, {"name": "云冈石窟第15-20窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "云冈石窟景区西部", "lat": 40.1075, "lng": 113.128, "desc": "云冈石窟西部窟群（第15-20窟），以第16-20窟最为著名，即\"昙曜五窟\"，五窟各有主像，分别象征北魏五位皇帝。昙曜五窟造像高大雄健，面相方圆，衣纹简洁，具有浓郁的西域风格。", "era": "北魏和平年间（460-465年）", "level": "国保"}, {"name": "云冈石窟第21-45窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "云冈石窟景区西部", "lat": 40.1065, "lng": 113.1265, "desc": "云冈石窟西部窟群，以第21-45窟为主。这一区域石窟风格多样，既有大型洞窟也有小型窟龛，反映了北魏晚期到西魏、东魏时期石窟艺术中国化和世俗化的演变过程。", "era": "北魏晚期至西魏", "level": "国保"}, {"name": "云冈石窟第5窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "云冈石窟景区", "lat": 40.1092, "lng": 113.1315, "desc": "第5窟是云冈石窟中规模最大的洞窟之一，洞口上方开凿有窟檐结构的明窗。窟内主像为释迦牟尼坐佛，高达17米，是云冈石窟中最大的佛像之一。", "era": "北魏", "level": "国保"}, {"name": "云冈石窟第6窟", "type": "石窟寺", "city": "大同市", "county": "云冈区", "location": "云冈石窟景区", "lat": 40.1091, "lng": 113.1312, "desc": "第6窟为中心塔柱窟，洞窟四壁和塔柱均雕满释迦牟尼从诞生到成佛的佛传故事浮雕，共39幅，构图精巧，技法娴熟，是研究北魏绘画和雕刻艺术的重要资料，被誉为\"第一伟观\"。", "era": "北魏", "level": "国保"}, {"name": "善化寺", "type": "寺", "city": "大同市", "county": "平城区", "location": "大同市平城区南寺街", "lat": 40.0944, "lng": 113.291, "desc": "善化寺俗称南寺，始建于唐开元年间（741年），金代重修，是中国现存最完整的辽金佛教寺院建筑群之一。寺内保存有大雄宝殿、三圣殿、普贤阁等辽金建筑，其中大雄宝殿为现存辽代木构建筑中体量最大者。1961年列入第一批全国重点文物保护单位。", "era": "唐开元年间（741年），金代重修", "level": "国保"}, {"name": "善化寺大雄宝殿", "type": "殿", "city": "大同市", "county": "平城区", "location": "善化寺内", "lat": 40.0945, "lng": 113.2912, "desc": "善化寺大雄宝殿建于辽代，是现存辽代木构建筑中体量最大的单体建筑之一。殿内保存有辽代壁画和彩塑，展示了辽代佛教艺术的独特风格。", "era": "辽代", "level": "国保"}, {"name": "善化寺普贤阁", "type": "阁", "city": "大同市", "county": "平城区", "location": "善化寺内", "lat": 40.0943, "lng": 113.2908, "desc": "善化寺普贤阁为金代建筑，是一座平面呈六角形的三层楼阁式建筑，结构精巧，造型秀丽，是研究辽金楼阁建筑的重要实例。", "era": "金代", "level": "国保"}, {"name": "华严寺", "type": "寺", "city": "大同市", "county": "平城区", "location": "大同市平城区下华严寺街", "lat": 40.0958, "lng": 113.2972, "desc": "华严寺始建于辽代，是依据佛教华严宗经典《华严经》建造的佛教寺院，分上、下两寺，总占地面积约18600平方米。上华严寺的大雄宝殿是现存最大的辽代单体木构建筑之一，殿内有辽代彩塑和壁画，极为珍贵。1961年列入第一批全国重点文物保护单位。", "era": "辽重熙七年（1038年）", "level": "国保"}, {"name": "华严寺大雄宝殿", "type": "殿", "city": "大同市", "county": "平城区", "location": "华严寺上寺", "lat": 40.096, "lng": 113.2975, "desc": "华严寺大雄宝殿为辽代建筑遗存，金代重修，是我国现存辽代木构建筑中体量最大的一座。殿内采用减柱造设计，扩大了内部空间，殿顶琉璃吻兽为金代遗物，色彩艳丽，保存完好。", "era": "辽代，金代重修", "level": "国保"}, {"name": "华严寺薄伽教藏殿", "type": "殿", "city": "大同市", "county": "平城区", "location": "华严寺下寺", "lat": 40.0955, "lng": 113.2968, "desc": "薄伽教藏殿是华严寺下寺的主殿，建于辽代，是华严寺现存最古老的建筑。殿内保存有31尊辽代彩塑，其中合掌露齿菩萨以其优雅的造型和迷人的微笑被誉为\"东方维纳斯\"，是辽代雕塑艺术的杰作。", "era": "辽代", "level": "国保"}, {"name": "应县木塔（佛宫寺释迦塔）", "type": "塔", "city": "朔州市", "county": "应县", "location": "朔州市应县金城镇", "lat": 39.5669, "lng": 113.2929, "desc": "应县木塔全称佛宫寺释迦塔，建于辽清宁二年（1056年），是世界上现存最高最古老的纯木构楼阁式塔，高67.31米。塔身为八角形，共9层（明5暗4），全部使用木榫咬合，没有使用一颗铁钉，历经近千年风雨和多次地震仍屹立不倒，是中国古代木构建筑的巅峰之作。2016年获吉尼斯世界纪录认定为世界最高木塔。", "era": "辽清宁二年（1056年）", "level": "国保"}, {"name": "悬空寺", "type": "寺", "city": "大同市", "county": "浑源县", "location": "大同市浑源县恒山", "lat": 39.6655, "lng": 113.7047, "desc": "悬空寺又名恒山悬空寺，始建于北魏太和十五年（491年），距今已有1500多年历史。寺庙建在恒山金龙峡西侧翠屏峰的悬崖峭壁之上，上载危岩，下临深谷，栈道飞架，虚空中悬挂39间殿阁，整个建筑群以半插横梁为基础，借助岩石为托，形成了\"奇、悬、巧\"的建筑特色，被称为恒山十八景之冠。2010年入选《时代周刊》世界十大最危险建筑。", "era": "北魏太和十五年（491年），明、清重修", "level": "国保"}, {"name": "恒山古建筑群", "type": "古建筑群", "city": "大同市", "county": "浑源县", "location": "大同市浑源县恒山", "lat": 39.662, "lng": 113.706, "desc": "恒山是五岳中的北岳，山上有大量古建筑群，包括悬空寺、九天宫、会仙府等，多依山就势，与自然景观融为一体，形成了独特的道教建筑文化。", "era": "北魏至明清", "level": "国保"}, {"name": "云林寺", "type": "寺", "city": "大同市", "county": "阳高县", "location": "大同市阳高县云林街", "lat": 40.3658, "lng": 113.7433, "desc": "云林寺又名云林禅寺，始建于明代，是阳高县保存最完整的古建筑群。寺内保存有精美的壁画和彩塑，具有较高的历史和艺术价值。", "era": "明代", "level": "国保"}, {"name": "平城遗址", "type": "遗址", "city": "大同市", "county": "平城区", "location": "大同市城区", "lat": 40.09, "lng": 113.29, "desc": "平城遗址即北魏都城遗址，位于大同市城区一带，是北魏王朝（398-493年）的都城遗址。遗址范围广大，地下保存有大量北魏时期的建筑基址、墓葬等，对研究北魏都城规划具有重要价值。", "era": "北魏（398-493年）", "level": "国保"}, {"name": "方山永固陵", "type": "墓", "city": "大同市", "county": "新荣区", "location": "大同市新荣区方山", "lat": 40.235, "lng": 113.165, "desc": "方山永固陵是北魏文成帝文明皇后冯氏的陵墓，始建于太和五年（481年）。陵墓规模宏大，封土高约22.87米，是我国现存体量最大、地面封土保存最完整的北魏皇家墓葬之一。", "era": "北魏太和五年（481年）", "level": "国保"}, {"name": "许家窑人遗址", "type": "遗址", "city": "大同市", "county": "阳高县", "location": "大同市阳高县许家窑村", "lat": 40.31, "lng": 113.91, "desc": "许家窑人遗址是著名的旧石器时代古人类化石遗址，距今约10万年，出土了大量古人类化石和打制石器，对研究华北地区早期人类的演化具有重要意义。", "era": "旧石器时代（约10万年前）", "level": "国保"}, {"name": "曲回寺石像冢", "type": "墓", "city": "大同市", "county": "灵丘县", "location": "大同市灵丘县曲回寺村", "lat": 39.46, "lng": 114.21, "desc": "曲回寺石像冢是北魏时期的石塔群遗址，共有45座石塔埋于地下，塔内雕刻有精美的佛像和佛教故事浮雕，是研究北魏佛教艺术的重要实物资料。", "era": "北魏", "level": "国保"}, {"name": "禅房寺塔", "type": "塔", "city": "大同市", "county": "大同县", "location": "大同市大同县禅房寺村", "lat": 40.085, "lng": 113.6, "desc": "禅房寺塔为辽代八角七级密檐式砖塔，高约20米，造型秀美，结构稳固，是大同地区辽代佛塔的代表作之一。", "era": "辽代", "level": "国保"}, {"name": "永安寺", "type": "寺", "city": "大同市", "county": "浑源县", "location": "大同市浑源县城内", "lat": 39.735, "lng": 113.7, "desc": "永安寺始建于北魏，历经重修，现存建筑为元、明、清遗构。寺内保存有精美的壁画，内容丰富，技法高超，具有很高的历史和艺术价值。", "era": "北魏始建，元、明、清重修", "level": "国保"}, {"name": "栗毓美墓", "type": "墓", "city": "大同市", "county": "浑源县", "location": "大同市浑源县城东", "lat": 39.745, "lng": 113.715, "desc": "栗毓美墓是清代河东河道总督栗毓美的陵墓，墓前有大型石刻仪仗群，包括石人、石马、石碑等，雕刻精美，是清代石雕艺术的杰作。", "era": "清代", "level": "国保"}, {"name": "崇福寺", "type": "寺", "city": "朔州市", "county": "朔城区", "location": "朔州市朔城区崇福寺街", "lat": 39.3255, "lng": 112.4342, "desc": "崇福寺始建于唐麟德二年（665年），辽代曾为萧太后的家庙，故又称萧太后家庙。现存建筑以雄伟的千佛阁最为著名，殿内供奉有1012尊小型铜佛。此外，寺内还有精美的壁画和琉璃构件。1965年列入省级文物保护单位。", "era": "唐麟德二年（665年），辽代扩建", "level": "国保"}, {"name": "崇福寺千佛阁", "type": "阁", "city": "朔州市", "county": "朔城区", "location": "崇福寺内", "lat": 39.3257, "lng": 112.4345, "desc": "千佛阁是崇福寺的主殿，辽代建筑，面阔七间，进深四间，殿内供奉1012尊小型铜佛像，排列整齐，蔚为壮观。", "era": "辽代", "level": "国保"}, {"name": "广武城", "type": "城", "city": "朔州市", "county": "山阴县", "location": "朔州市山阴县旧广武村", "lat": 39.518, "lng": 112.755, "desc": "广武城是明代长城防线上的重要军事城堡，始建于明洪武年间（1368-1398年）。古城城墙基本保存完整，城门、瓮城、马面等防御设施齐全，是研究明代军事城堡建筑的重要实物。", "era": "明洪武年间（1368-1398年）", "level": "国保"}, {"name": "旧广武城", "type": "城", "city": "朔州市", "county": "山阴县", "location": "朔州市山阴县旧广武村", "lat": 39.519, "lng": 112.757, "desc": "旧广武城是广武古城的核心部分，城墙为土夯筑，保存较为完整。城内街巷格局基本保持明代风貌，是研究明代边塞城镇的重要实例。", "era": "明洪武年间", "level": "国保"}, {"name": "汉墓群", "type": "墓", "city": "朔州市", "county": "平鲁区", "location": "朔州市平鲁区井坪镇", "lat": 39.51, "lng": 112.29, "desc": "朔州汉墓群是西汉时期的墓葬群，分布范围广，墓葬数量多，出土有大量汉代陶器、铜器、铁器等随葬品，对研究汉代北方边郡的社会经济具有重要价值。", "era": "西汉", "level": "国保"}, {"name": "五台山寺庙群", "type": "寺庙群", "city": "忻州市", "county": "五台县", "location": "忻州市五台县五台山", "lat": 38.7133, "lng": 113.565, "desc": "五台山是中国四大佛教名山之首（文殊菩萨道场），现有保存完好的寺庙68座，其中全国重点文物保护单位13处。五台山寺庙群以其悠久的历史、宏大的规模、独特的建筑和丰富的文化遗存，成为中国佛教建筑的百科全书，也是研究中国古代建筑、宗教、艺术的重要基地。2009年被列入世界遗产名录。", "era": "东汉永平年间（68年）始建，历代扩建", "level": "国保"}, {"name": "显通寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县五台山台怀镇", "lat": 38.715, "lng": 113.585, "desc": "显通寺是五台山历史最悠久、规模最大的寺庙之一，始建于东汉永平年间（68年），初名大孚灵鹫寺，是中国最早的佛教寺院之一。现存建筑多为明、清遗构，寺内有无梁殿、铜殿等特色建筑，以及珍贵的佛教文物。", "era": "东汉永平年间（68年）", "level": "国保"}, {"name": "显通寺无梁殿", "type": "殿", "city": "忻州市", "county": "五台县", "location": "显通寺内", "lat": 38.7152, "lng": 113.5852, "desc": "显通寺无梁殿建于明万历年间（1573-1620年），全部用砖券砌成，不用一木，殿内雕饰精美，展示了明代砖构建筑的卓越技艺，是研究明代建筑技术的重要实例。", "era": "明万历年间（1573-1620年）", "level": "国保"}, {"name": "显通寺铜殿", "type": "殿", "city": "忻州市", "county": "五台县", "location": "显通寺内", "lat": 38.7151, "lng": 113.5853, "desc": "显通寺铜殿铸于明万历年间，高约5米，阔4米，深3米，通体铜铸，殿内供奉铜质文殊菩萨像，造型精美，工艺精湛，是五台山的标志性建筑之一。", "era": "明万历三十四年（1606年）", "level": "国保"}, {"name": "佛光寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县豆村镇佛光新村", "lat": 38.695, "lng": 113.608, "desc": "佛光寺是五台山最著名的古刹之一，始建于北魏孝文帝时期（471-499年），唐代达到鼎盛。1937年，建筑学家梁思成、林徽因夫妇在此发现了唐代木构建筑东大殿，打破了当时\"中国无唐代木构建筑\"的论断，轰动国际学术界。寺内东大殿是现存唐代木构建筑的代表作，殿内还有唐代壁画、彩塑和石塔，被梁思成誉为\"中华第一国宝\"。1961年列入第一批全国重点文物保护单位。", "era": "北魏孝文帝时期（471-499年）", "level": "国保"}, {"name": "佛光寺东大殿", "type": "殿", "city": "忻州市", "county": "五台县", "location": "佛光寺内", "lat": 38.6952, "lng": 113.6082, "desc": "佛光寺东大殿（又称唐构殿）建于唐大中十一年（857年），面阔七间，进深四间，单檐庑殿顶，是我国现存唐代木构建筑中体量最大、保存最完整的一座。殿内保存有唐代壁画和彩塑，展示了盛唐时期的艺术风格。", "era": "唐大中十一年（857年）", "level": "国保"}, {"name": "佛光寺文殊殿", "type": "殿", "city": "忻州市", "county": "五台县", "location": "佛光寺内", "lat": 38.6948, "lng": 113.6078, "desc": "佛光寺文殊殿建于金代，是五台山现存金代木构建筑的代表作之一。殿内供奉文殊菩萨像，四周墙壁绘有金代壁画，具有重要的历史和艺术价值。", "era": "金代", "level": "国保"}, {"name": "佛光寺祖师塔", "type": "塔", "city": "忻州市", "county": "五台县", "location": "佛光寺内", "lat": 38.695, "lng": 113.6075, "desc": "佛光寺内有北魏、金代、唐代墓塔多座，其中唐代墓塔为六角形两层砖塔，是研究唐代佛塔建筑的重要实例。", "era": "北魏至唐", "level": "国保"}, {"name": "南禅寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县阳白乡李家庄村", "lat": 38.712, "lng": 113.52, "desc": "南禅寺始建于唐建中三年（782年），是中国现存最古老的木构建筑之一，比佛光寺东大殿还早75年。寺内大云殿为唐代原构，规模虽小但结构完整，殿内保存有唐代彩塑。梁思成称其为\"中华第一瑰宝\"。1961年列入第一批全国重点文物保护单位。", "era": "唐建中三年（782年）", "level": "国保"}, {"name": "南禅寺大云殿", "type": "殿", "city": "忻州市", "county": "五台县", "location": "南禅寺内", "lat": 38.7122, "lng": 113.5202, "desc": "南禅寺大云殿建于唐建中三年（782年），面阔五间，进深三间，单檐歇山顶，是我国现存最古老的唐代木构建筑。殿内保存有完整的唐代彩塑群像，展示了盛唐时期的佛教艺术风格。", "era": "唐建中三年（782年）", "level": "国保"}, {"name": "塔院寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县五台山台怀镇", "lat": 38.718, "lng": 113.59, "desc": "塔院寺原为五台山显通寺的塔院，明代独立成寺。寺内大白塔（释迦文佛真身舍利塔）是五台山的标志性建筑，塔高56.4米，八角十三层，为元代建筑遗存，清代外包砖石并加筑塔刹，成为五台山的象征。", "era": "元代（始建），明、清重修", "level": "国保"}, {"name": "殊像寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县五台山台怀镇", "lat": 38.717, "lng": 113.586, "desc": "殊像寺是五台山五大禅处之一，创建于元代，明、清重修。寺内文殊阁供有五台山最大的文殊菩萨骑狻猊像，高9.87米，庄严威武，为明代铸铜造像精品。", "era": "元代，明、清重修", "level": "省保"}, {"name": "金阁寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县五台山上", "lat": 38.72, "lng": 113.61, "desc": "金阁寺位于五台山中台南麓海拔1900米处，始建于唐大历年间，明、清重修。寺庙建筑宏大，以金阁得名，殿顶覆以金瓦，在阳光下熠熠生辉。寺内保存有明代壁画。", "era": "唐大历年间，明、清重修", "level": "国保"}, {"name": "延庆寺", "type": "寺", "city": "忻州市", "county": "五台县", "location": "五台县五台山", "lat": 38.71, "lng": 113.595, "desc": "延庆寺始建于唐，宋、金、元、明、清均有修缮。现存建筑以金代大钟楼和元代石塔最为著名，具有较高的历史和艺术价值。", "era": "唐，宋、金、元、明、清重修", "level": "国保"}, {"name": "延庆寺金代大钟楼", "type": "楼", "city": "忻州市", "county": "五台县", "location": "延庆寺内", "lat": 38.7102, "lng": 113.5952, "desc": "延庆寺大钟楼建于金代，为两层楼阁式建筑，上悬金代大铁钟一口，钟身高大，铸工精湛，是研究金代铸造工艺的珍贵实物。", "era": "金代", "level": "国保"}, {"name": "延庆寺元代石塔", "type": "塔", "city": "忻州市", "county": "五台县", "location": "延庆寺内", "lat": 38.71, "lng": 113.595, "desc": "延庆寺元代石塔造型独特，雕刻精美，是研究元代佛塔建筑的重要实例。", "era": "元代", "level": "国保"}, {"name": "定襄关王庙", "type": "庙", "city": "忻州市", "county": "定襄县", "location": "忻州市定襄县北关", "lat": 38.501, "lng": 112.964, "desc": "定襄关王庙始建于宋宣和五年（1123年），是纪念三国名将关羽的祠庙。建筑保存基本完整，具有宋代建筑风格特征，是研究宋金时期关王庙建筑的重要实例。", "era": "宋宣和五年（1123年）", "level": "国保"}, {"name": "代县边靖楼", "type": "楼", "city": "忻州市", "county": "代县", "location": "忻州市代县县城", "lat": 39.068, "lng": 112.963, "desc": "边靖楼建于明洪武七年（1374年），是代县古城的城楼，也是明长城防线上的重要军事设施。楼高26米，三层四檐，气势雄伟，登楼可远眺塞外风光。", "era": "明洪武七年（1374年）", "level": "国保"}, {"name": "代县阿育王塔", "type": "塔", "city": "忻州市", "county": "代县", "location": "忻州市代县县城", "lat": 39.067, "lng": 112.9635, "desc": "阿育王塔始建于隋仁寿元年（601年），是佛塔的珍贵遗存。塔为覆钵式，通体白色，造型独特，是研究隋代佛塔建筑的重要实例。", "era": "隋仁寿元年（601年）", "level": "国保"}, {"name": "代县文庙", "type": "庙", "city": "忻州市", "county": "代县", "location": "忻州市代县县城", "lat": 39.0665, "lng": 112.962, "desc": "代县文庙是代州古城的标志性建筑之一，创建于唐代，现存建筑多为明清遗构。庙内保存有大量碑刻和精美的木雕、砖雕构件。", "era": "唐，清代重修", "level": "国保"}, {"name": "代县雁门关", "type": "关隘", "city": "忻州市", "county": "代县", "location": "忻州市代县雁门山", "lat": 40.186, "lng": 112.955, "desc": "雁门关是长城上的重要关隘，自古为中原与北方游牧民族交战的前线，有\"中华第一关\"之称。现有关门、关道、敌楼、烽火台等大量历史遗迹，是研究古代军事防御体系的重要基地。", "era": "战国赵武灵王设关，明代大规模修筑", "level": "国保"}, {"name": "繁峙岩山寺", "type": "寺", "city": "忻州市", "county": "繁峙县", "location": "忻州市繁峙县天岩村", "lat": 38.91, "lng": 113.38, "desc": "岩山寺始建于宋，金代重修，寺内文殊殿保存有金代壁画83平方米，内容丰富，技法精湛，展示了金代宫廷生活和佛教艺术的生动场面，具有极高的历史和艺术价值，被誉为\"墙壁上的清明上河图\"。", "era": "宋，金代重修", "level": "国保"}, {"name": "岩山寺金代壁画", "type": "壁画", "city": "忻州市", "county": "繁峙县", "location": "岩山寺文殊殿", "lat": 38.9102, "lng": 113.3802, "desc": "岩山寺文殊殿内保存有金代壁画83平方米，壁画描绘了释迦牟尼传记故事及大量的宫廷生活、侍女、百戏等场景，色彩艳丽，线条流畅，是研究金代绘画艺术的珍贵资料。", "era": "金代（1158年）", "level": "国保"}, {"name": "静居寺石窟", "type": "石窟寺", "city": "忻州市", "county": "静乐县", "location": "忻州市静乐县", "lat": 38.36, "lng": 111.94, "desc": "静居寺石窟开凿于唐代，共有洞窟若干，造像风格具有典型的唐代特征，是研究唐代石窟艺术的重要遗存。", "era": "唐代", "level": "国保"}, {"name": "宁武关", "type": "关隘", "city": "忻州市", "county": "宁武县", "location": "忻州市宁武县", "lat": 39.005, "lng": 112.305, "desc": "宁武关是明代长城防线上的重要关隘，与雁门关、偏关合称\"外三关\"，是防御北方游牧民族入侵的重要军事要塞。关城遗址保存有城墙、城门、敌楼等遗迹。", "era": "明", "level": "国保"}, {"name": "偏头关", "type": "关隘", "city": "忻州市", "county": "偏关县", "location": "忻州市偏关县", "lat": 39.42, "lng": 111.51, "desc": "偏头关是明代外三关之一，建于黄河东岸的土山之上，因地势东仰西伏，故名\"偏头\"。关城依山而建，与黄河天险相连，形成坚固的防御体系。", "era": "明", "level": "国保"}, {"name": "五台山古建筑群", "type": "古建筑群", "city": "忻州市", "county": "五台县", "location": "五台县五台山", "lat": 38.7133, "lng": 113.565, "desc": "五台山古建筑群包括从东汉到明清各代的寺庙建筑，是中国古代寺庙建筑的宝库。建筑类型涵盖殿、堂、楼、阁、塔、廊、桥等多种形式，展示了各代建筑风格的演变过程。", "era": "东汉至清", "level": "国保"}, {"name": "藏山祠", "type": "祠", "city": "阳泉市", "county": "盂县", "location": "阳泉市盂县苌池乡藏山村", "lat": 38.12, "lng": 113.45, "desc": "藏山祠是为纪念春秋时期晋国忠臣程婴舍子救孤而建的祠庙。相传程婴将赵氏孤儿藏于此山，故名\"藏山\"。祠庙始建于金代，明、清均有修缮，建筑依山就势，层层升高，景色优美。", "era": "金代，明、清重修", "level": "国保"}, {"name": "藏山祠藏孤洞", "type": "洞", "city": "阳泉市", "county": "盂县", "location": "藏山祠内", "lat": 38.1205, "lng": 113.4505, "desc": "藏孤洞是传说中程婴藏匿赵氏孤儿的地方，位于藏山深处，是一个天然石灰岩溶洞。洞内幽深曲折，与赵氏孤儿的故事紧密相连，成为藏山祠景区的重要景点。", "era": "金代", "level": "国保"}, {"name": "娘子关", "type": "关隘", "city": "阳泉市", "county": "平定县", "location": "阳泉市平定县娘子关镇", "lat": 37.945, "lng": 113.95, "desc": "娘子关是长城的著名关隘，位于太行山巅，因唐平阳公主率\"娘子军\"驻守于此而得名。关城依山而建，东临悬崖，西踞山岭，地势险要。现存关城为明嘉靖年间所筑。", "era": "隋唐设关，明嘉靖重筑", "level": "国保"}, {"name": "娘子关瀑布", "type": "瀑布", "city": "阳泉市", "county": "平定县", "location": "娘子关镇", "lat": 37.94, "lng": 113.955, "desc": "娘子关瀑布位于娘子关城东，水从绵山峡谷中奔涌而出，落差数十米，声如雷鸣，形成壮观的瀑布景象。瀑布与古关城相映衬，景色雄险兼具。", "era": "自然景观+人文古迹", "level": "省保"}, {"name": "平遥古城", "type": "古城", "city": "晋中市", "county": "平遥县", "location": "晋中市平遥县古城", "lat": 37.2147, "lng": 112.1545, "desc": "平遥古城始建于西周宣王时期（公元前827-782年），现存城墙建于明洪武三年（1370年），是中国保存最完整的明清古城之一。城内有保存完整的城墙、城楼、街道、店铺、民居、寺庙等，被列入世界文化遗产名录。古城内有\"日升昌\"等票号旧址，是中国票号文化的发源地，被誉为\"中国现代银行的开端\"。1997年列入《世界遗产名录》。", "era": "西周始建，明洪武三年（1370年）重建", "level": "国保（世界文化遗产）"}, {"name": "平遥古城墙", "type": "城墙", "city": "晋中市", "county": "平遥县", "location": "平遥古城", "lat": 37.215, "lng": 112.154, "desc": "平遥古城墙周长6.16公里，墙高约12米，设有72座敌楼、3000个垛口。城墙为夯土外包砖石结构，设有城门六座，瓮城四座，布局严谨，防御设施完备，是研究明代城墙建筑的珍贵实物。", "era": "明洪武三年（1370年）", "level": "国保（世界文化遗产）"}, {"name": "平遥日升昌票号", "type": "商铺", "city": "晋中市", "county": "平遥县", "location": "平遥古城西大街", "lat": 37.214, "lng": 112.151, "desc": "日升昌票号创立于清道光三年（1823年），是中国第一家票号（私人银行），开创了银行汇兑业务的先河。票号建筑保存完整，是研究清代金融业发展的珍贵实物。", "era": "清道光三年（1823年）", "level": "国保"}, {"name": "平遥县衙", "type": "官署", "city": "晋中市", "county": "平遥县", "location": "平遥古城内", "lat": 37.2155, "lng": 112.1545, "desc": "平遥县衙始建于北魏，现存建筑为明清遗构，是保存最完整的明清县级衙署之一。衙署建筑布局完整，包括大堂、二堂、内宅等，展示了古代地方行政机构的格局。", "era": "北魏始建，明、清重修", "level": "国保"}, {"name": "平遥文庙", "type": "庙", "city": "晋中市", "county": "平遥县", "location": "平遥古城内", "lat": 37.217, "lng": 112.156, "desc": "平遥文庙是保存最完整的明清州县学孔庙之一，建筑布局完整，包括照壁、棂星门、大成殿等。庙内保存有大量碑刻和精美的建筑构件。", "era": "金代，明、清重修", "level": "国保"}, {"name": "平遥城隍庙", "type": "庙", "city": "晋中市", "county": "平遥县", "location": "平遥古城内", "lat": 37.2135, "lng": 112.1535, "desc": "平遥城隍庙始建于明洪武年间，是供奉城隍神的庙宇。庙内建筑布局完整，雕刻精美，保存有明清时期的壁画和琉璃构件，是研究城隍信仰和明清宗教建筑的重要实例。", "era": "明洪武年间", "level": "国保"}, {"name": "平遥双林寺", "type": "寺", "city": "晋中市", "county": "平遥县", "location": "平遥县中都乡桥头村", "lat": 37.245, "lng": 112.195, "desc": "双林寺始建于北齐武平二年（571年），以保存大量精美彩塑著称。寺内有宋、元、明、清各代彩塑2000余尊，其中千佛殿的韦驮像被誉为\"中国第一韦驮\"，菩萨殿的水月观音被誉为\"东方维纳斯\"，是研究中国古代彩塑艺术的宝库。1965年列入省级文物保护单位。", "era": "北齐武平二年（571年）", "level": "国保"}, {"name": "双林寺彩塑", "type": "彩塑", "city": "晋中市", "county": "平遥县", "location": "双林寺内", "lat": 37.2452, "lng": 112.1952, "desc": "双林寺保存有历代彩塑2000余尊，其中唐、宋、元、明、清各代均有。千佛殿的韦驮像被誉为\"中国第一韦驮\"，菩萨殿的水月观音被誉为\"东方维纳斯\"，这些彩塑代表了中国古代彩塑艺术的最高水平。", "era": "宋、元、明、清各代", "level": "国保"}, {"name": "平遥镇国寺", "type": "寺", "city": "晋中市", "county": "平遥县", "location": "平遥县郝洞村", "lat": 37.258, "lng": 112.218, "desc": "镇国寺始建于北汉天会七年（963年），是中国现存最古老的木构建筑之一。寺内万佛殿建于北汉，是五代时期的代表性木构建筑，殿内保存有11尊五代彩塑，极为珍贵。1965年列入省级文物保护单位。", "era": "北汉天会七年（963年）", "level": "国保"}, {"name": "镇国寺万佛殿", "type": "殿", "city": "晋中市", "county": "平遥县", "location": "镇国寺内", "lat": 37.2582, "lng": 112.2182, "desc": "万佛殿建于北汉天会七年（963年），面阔三间，进深三间，单檐歇山顶，是我国现存五代时期唯一的木构建筑。殿内保存有11尊五代彩塑，展示了五代时期的彩塑艺术风格。", "era": "北汉天会七年（963年）", "level": "国保"}, {"name": "祁县古城渠家大院", "type": "民居", "city": "晋中市", "county": "祁县", "location": "祁县古城内", "lat": 37.36, "lng": 112.427, "desc": "渠家大院是祁县\"渠半城\"渠氏家族的主要宅院，是晋商豪宅的典型代表。大院占地宽广，建筑精美，砖雕、木雕、石雕琳琅满目，展示了清代晋商的文化品位和建筑艺术。", "era": "清", "level": "国保"}, {"name": "祁县古城乔家大院", "type": "民居", "city": "晋中市", "county": "祁县", "location": "祁县东观镇乔家堡村", "lat": 37.384, "lng": 112.476, "desc": "乔家大院是晋商乔氏家族的宅院，是保存最完整的晋商民居建筑群之一。始建于清乾隆年间，共分6个大院、20个小院、313间房屋。建筑布局严谨，工艺精湛，是研究晋商文化和清代民居建筑的重要实例。", "era": "清乾隆至光绪年间", "level": "国保"}, {"name": "介休祆神楼", "type": "楼", "city": "晋中市", "county": "介休市", "location": "晋中市介休市顺城关", "lat": 37.025, "lng": 111.9165, "desc": "祆神楼是古代祆教（拜火教）祭祀场所的建筑遗存，是中国现存唯一保存祆教元素的古建筑。楼阁高三层，结构精巧，装饰华丽，具有独特的文化价值，是研究祆教在中国传播的重要实物。", "era": "元至清", "level": "国保"}, {"name": "灵石王家大院", "type": "民居", "city": "晋中市", "county": "灵石县", "location": "晋中市灵石县静升镇", "lat": 36.8555, "lng": 111.7875, "desc": "王家大院是灵石王氏家族历经明清两代、先后修建的大型宅院建筑群，总面积达25万平方米以上，是晋商豪宅中规模最大、建筑最精美的一处。大院依山而建，层层叠高，房屋千余间，有\"民间故宫\"之称。", "era": "明、清", "level": "国保"}, {"name": "太谷无边寺", "type": "寺", "city": "晋中市", "county": "太谷县", "location": "晋中市太谷县", "lat": 37.4235, "lng": 112.5535, "desc": "无边寺始建于西晋泰始年间（265-274年），是太谷古城的标志性古建筑。寺内白塔高耸，是太谷古城的标志性景观。", "era": "西晋泰始年间", "level": "国保"}, {"name": "太谷无边寺白塔", "type": "塔", "city": "晋中市", "county": "太谷县", "location": "无边寺内", "lat": 37.4237, "lng": 112.5537, "desc": "无边寺白塔为八角九层楼阁式砖塔，高43米，建于北宋。塔身秀丽挺拔，与古寺相映成趣，成为太谷古城的标志性景观。", "era": "北宋", "level": "国保"}, {"name": "杏花村汾酒作坊", "type": "作坊", "city": "吕梁市", "county": "汾阳市", "location": "吕梁市汾阳市杏花村镇", "lat": 37.435, "lng": 111.775, "desc": "杏花村汾酒作坊是中国最古老的酿酒作坊之一，据传可追溯至北齐（550-577年）。作坊内保存有宋、元、明、清各代的酿酒设施和工艺遗存，是研究中国酿酒史的珍贵实物，也是汾酒文化的发源地。2012年列入世界文化遗产预备名录。", "era": "北齐，历代沿用", "level": "国保"}, {"name": "杏花村古井", "type": "井", "city": "吕梁市", "county": "汾阳市", "location": "汾酒作坊内", "lat": 37.4352, "lng": 111.7752, "desc": "古井位于汾酒作坊内，据传为唐代所掘，井水清澈甘甜，用此井水酿造的汾酒品质优良，被誉为\"神井\"。", "era": "唐代", "level": "国保"}, {"name": "杏花村老作坊", "type": "作坊", "city": "吕梁市", "county": "汾阳市", "location": "汾酒作坊内", "lat": 37.4351, "lng": 111.7748, "desc": "老作坊保存有清代至民国的酿酒设施，包括地缸发酵区、蒸馏区、储酒区等，是研究清代酿酒工艺的珍贵实物。", "era": "清", "level": "国保"}, {"name": "碛口古镇", "type": "古镇", "city": "吕梁市", "county": "临县", "location": "吕梁市临县碛口镇", "lat": 37.573, "lng": 110.608, "desc": "碛口古镇是明清时期黄河沿岸的重要商埠，因其上游的黄河大同碛而得名。古镇保存有大量明清时期的商铺、客栈、票号、民居等建筑，是研究晋商与西北贸易的重要实物见证，被誉为\"九曲黄河第一镇\"。", "era": "明、清", "level": "国保"}, {"name": "碛口西湾村", "type": "古村", "city": "吕梁市", "county": "临县", "location": "临县碛口镇西湾村", "lat": 37.578, "lng": 110.612, "desc": "西湾村是碛口古镇的重要组成部分，为陈氏家族聚居地。村内街巷布局合理，民居建筑精美，保存了完整的明清古村风貌，是研究晋西传统民居建筑的珍贵实物。", "era": "明、清", "level": "国保"}, {"name": "临县义居寺", "type": "寺", "city": "吕梁市", "county": "临县", "location": "临县", "lat": 37.56, "lng": 110.59, "desc": "义居寺为古代佛寺，创建年代较早。寺内保存有精美的壁画和古建筑，是研究晋西佛教文化的重要实物。", "era": "元、明", "level": "国保"}, {"name": "文水则天庙", "type": "庙", "city": "吕梁市", "county": "文水县", "location": "吕梁市文水县南徐村", "lat": 37.437, "lng": 112.035, "desc": "则天庙是祭祀武则天的庙宇，创建于唐代，武则天是文水人。庙内保存有唐代建筑风格和历史文物，是研究武则天文化的重要场所。", "era": "唐", "level": "国保"}, {"name": "离石安国寺", "type": "寺", "city": "吕梁市", "county": "离石区", "location": "吕梁市离石区", "lat": 37.52, "lng": 111.15, "desc": "安国寺是离石的古刹，创建于唐，重修于宋。寺内保存有精美的壁画和古建筑。", "era": "唐，宋重修", "level": "国保"}, {"name": "法兴寺", "type": "寺", "city": "长治市", "county": "长子县", "location": "长治市长子县慈林镇崔庄村", "lat": 36.055, "lng": 112.88, "desc": "法兴寺始建于十六国时期的后凉（401年），唐、宋、明、清多次重修。寺内保存有唐代的石塔和宋代大殿，殿内供奉有宋代的彩塑十二菩萨像，造型精美，神态各异，被誉为\"宋塑之冠\"。2001年列入国保。", "era": "后凉（401年）", "level": "国保"}, {"name": "法兴寺十二菩萨像", "type": "彩塑", "city": "长治市", "county": "长子县", "location": "法兴寺内", "lat": 36.0552, "lng": 112.8802, "desc": "法兴寺十二菩萨像塑造于北宋政和元年（1111年），分别供奉于圆觉殿内两侧。十二尊菩萨神态各异，被称为\"宋塑之冠\"，代表了中国古代彩塑艺术的最高水平。", "era": "北宋政和元年（1111年）", "level": "国保"}, {"name": "法兴寺燃灯塔", "type": "塔", "city": "长治市", "county": "长子县", "location": "法兴寺内", "lat": 36.055, "lng": 112.8798, "desc": "燃灯塔建于唐咸亨四年（673年），高约13米，为三出檐楼阁式石塔。塔身雕有精美的佛教造像和花纹，是研究唐代石塔建筑的重要实例。", "era": "唐咸亨四年（673年）", "level": "国保"}, {"name": "法兴寺圆觉殿", "type": "殿", "city": "长治市", "county": "长子县", "location": "法兴寺内", "lat": 36.0551, "lng": 112.8801, "desc": "圆觉殿建于北宋政和元年（1111年），面阔三间，进深六椽，单檐悬山顶。殿内供奉有精美的十二圆觉菩萨彩塑，展示了宋代彩塑艺术的最高成就。", "era": "北宋政和元年（1111年）", "level": "国保"}, {"name": "崇庆寺", "type": "寺", "city": "长治市", "county": "长子县", "location": "长治市长子县紫云山", "lat": 36.08, "lng": 112.89, "desc": "崇庆寺始建于北宋年间，寺内保存有精美的彩塑和古建筑。千佛殿内的彩塑被梁思成誉为\"宋元雕塑的上品\"。", "era": "北宋", "level": "国保"}, {"name": "长治观音堂", "type": "寺", "city": "长治市", "county": "潞州区", "location": "长治市潞州区梁家庄", "lat": 36.195, "lng": 113.12, "desc": "观音堂创建于明万历年间，堂内墙壁、殿顶布满悬塑，共计500余尊造像，描绘了佛教、道教、儒教的各种人物形象，密密麻麻，层层叠叠，被称为\"明代悬塑艺术宝库\"。", "era": "明万历十年（1582年）", "level": "国保"}, {"name": "观音堂悬塑", "type": "悬塑", "city": "长治市", "county": "潞州区", "location": "观音堂内", "lat": 36.1952, "lng": 113.1202, "desc": "观音堂悬塑以观音菩萨为中心，周围环绕500余尊道教、佛教、儒教人物造像，层层叠叠，布满墙壁和殿顶，蔚为壮观。这些悬塑做工精细，色彩艳丽，是明代悬塑艺术的杰作。", "era": "明万历十年（1582年）", "level": "国保"}, {"name": "潞安府城隍庙", "type": "庙", "city": "长治市", "county": "潞州区", "location": "长治市潞州区东街", "lat": 36.1955, "lng": 113.122, "desc": "潞安府城隍庙是长治古城的标志性古建筑，始建于元代，明、清均有重修。庙内保存有元、明、清各代建筑和精美的琉璃构件，是研究古代城隍信仰的重要实物。", "era": "元代，明、清重修", "level": "国保"}, {"name": "上党门", "type": "门", "city": "长治市", "county": "潞州区", "location": "长治市潞州区府前街", "lat": 36.196, "lng": 113.121, "desc": "上党门是潞安府府城的南门，始建于隋开皇年间，是长治古城的标志性建筑。门楼高耸，气势雄伟，是研究隋唐城门的珍贵实物。", "era": "隋开皇年间", "level": "国保"}, {"name": "沁县大云寺", "type": "寺", "city": "长治市", "county": "沁县", "location": "长治市沁县", "lat": 36.755, "lng": 112.705, "desc": "大云寺始建于唐，后晋天福年间（936-944年）重修，是沁县最重要的古建筑。寺内保存有精美的壁画和古建筑，具有很高的历史和艺术价值。", "era": "唐，后晋天福年间重修", "level": "国保"}, {"name": "大云寺壁画", "type": "壁画", "city": "长治市", "county": "沁县", "location": "大云寺内", "lat": 36.7552, "lng": 112.7052, "desc": "大云寺壁画保存于大云寺大殿内，内容丰富，技法精湛，展示了五代至宋代的壁画艺术风格。", "era": "五代至宋", "level": "国保"}, {"name": "平顺天台庵", "type": "寺", "city": "长治市", "county": "平顺县", "location": "长治市平顺县实会村", "lat": 36.21, "lng": 113.45, "desc": "天台庵为唐代佛寺，是研究唐代佛教建筑的重要实例。寺内保存有唐代木构建筑，具有重要的文物价值。", "era": "唐", "level": "国保"}, {"name": "壶关真泽宫", "type": "宫", "city": "长治市", "county": "壶关县", "location": "壶关县", "lat": 36.05, "lng": 113.2, "desc": "真泽宫保存有精美的古建筑和壁画，是研究晋东南道教建筑的重要实物。", "era": "元、明", "level": "国保"}, {"name": "屯留三嵕庙", "type": "庙", "city": "长治市", "county": "屯留区", "location": "屯留区", "lat": 36.28, "lng": 112.9, "desc": "三嵕庙供奉上党地区信仰的神祇，保存有精美的古建筑和壁画，是研究地方信仰文化的珍贵实物。", "era": "金、元、明", "level": "国保"}, {"name": "晋城青莲寺", "type": "寺", "city": "晋城市", "county": "泽州县", "location": "晋城市泽州县金村镇寺润村", "lat": 35.56, "lng": 112.87, "desc": "青莲寺分为上、下两寺，下寺创建于北齐天保年间（550-559年），上寺创建于唐太和二年（828年）。寺内保存有唐、宋、金、元、明、清各代建筑，以及珍贵的佛教文物。其中上寺的释迦殿为唐代遗构，殿内供奉有唐代彩塑。2001年列入国保。", "era": "北齐天保年间（550-559年）", "level": "国保"}, {"name": "晋城玉皇庙", "type": "庙", "city": "晋城市", "county": "城区", "location": "晋城市城区府城村", "lat": 35.503, "lng": 112.853, "desc": "玉皇庙创建于北宋熙宁九年（1076年），是供奉玉皇大帝的道教庙宇。庙内保存有宋、元、明、清各代建筑，尤其是元代二十八宿殿内的二十八宿彩塑最为珍贵，是研究元代道教艺术的稀世珍品，被誉为\"海内孤品\"。2001年列入国保。", "era": "北宋熙宁九年（1076年）", "level": "国保"}, {"name": "玉皇庙二十八宿殿", "type": "殿", "city": "晋城市", "county": "城区", "location": "玉皇庙内", "lat": 35.5032, "lng": 112.8532, "desc": "二十八宿殿建于元代，殿内供奉有二十八宿星君彩塑，每尊造像神态各异，个性鲜明，是元代道教彩塑的巅峰之作，被誉为\"海内孤品\"。", "era": "元代", "level": "国保"}, {"name": "玉皇庙元代彩塑", "type": "彩塑", "city": "晋城市", "county": "城区", "location": "玉皇庙二十八宿殿", "lat": 35.5033, "lng": 112.8533, "desc": "玉皇庙二十八宿彩塑以人、神、兽混合造型，分别代表二十八宿星座，构思奇妙，造型生动，是中国古代彩塑艺术的杰作，代表了元代彩塑艺术的最高成就。", "era": "元至元三十年（1293年）", "level": "国保"}, {"name": "阳城皇城相府", "type": "民居", "city": "晋城市", "county": "阳城县", "location": "晋城市阳城县北留镇皇城村", "lat": 35.48, "lng": 112.47, "desc": "皇城相府是清代大学士陈廷敬的故居，是晋城最著名的晋商豪宅之一。相府分为内外两城，内城为明代建筑，外城为清代建筑，总面积约6万平方米。建筑精美，文化底蕴深厚，是研究清代官宦文化的重要场所。", "era": "明、清", "level": "国保"}, {"name": "皇城相府内城", "type": "城", "city": "晋城市", "county": "阳城县", "location": "皇城相府内", "lat": 35.4805, "lng": 112.4705, "desc": "皇城相府内城又称\"斗筑可居\"，建于明崇祯五年（1632年），是陈廷敬祖父陈昌言所建。城墙坚固，防御设施完备，是研究明代城堡建筑的珍贵实物。", "era": "明崇祯五年（1632年）", "level": "国保"}, {"name": "皇城相府外城", "type": "民居", "city": "晋城市", "county": "阳城县", "location": "皇城相府外", "lat": 35.4795, "lng": 112.4695, "desc": "皇城相府外城建于清康熙四十二年（1703年），是陈廷敬回乡探亲时所建。外城建筑宏伟，装饰精美，展示了清代官宦豪宅的气派。", "era": "清康熙四十二年（1703年）", "level": "国保"}, {"name": "阳城古村郭峪", "type": "古村", "city": "晋城市", "county": "阳城县", "location": "阳城县北留镇郭峪村", "lat": 35.49, "lng": 112.48, "desc": "郭峪村是明清时期的重要城堡村落，城墙上开有600余个窑洞式垛口，被称为\"蜂窝城墙\"，蔚为壮观。村内保存有大量明清古建筑，是研究明清城堡村落的珍贵实物。", "era": "明、清", "level": "国保"}, {"name": "郭峪村城墙", "type": "城墙", "city": "晋城市", "county": "阳城县", "location": "郭峪村", "lat": 35.4905, "lng": 112.4805, "desc": "郭峪村城墙建于明崇祯年间，高约12米，周长约700米。城墙内外两侧开有600余个窑洞式垛口，密密麻麻，形如蜂窝，被称为\"蜂窝城墙\"，是研究明代城防建筑的独特实例。", "era": "明崇祯年间", "level": "国保"}, {"name": "高平开化寺", "type": "寺", "city": "晋城市", "county": "高平市", "location": "晋城市高平市舍报山", "lat": 35.85, "lng": 112.91, "desc": "开化寺创建于后唐庄宗年间（923-926年），是晋城地区最古老的寺庙之一。寺内保存有北宋时期的壁画和古建筑，具有极高的历史和艺术价值。", "era": "后唐庄宗年间（923-926年）", "level": "国保"}, {"name": "开化寺壁画", "type": "壁画", "city": "晋城市", "county": "高平市", "location": "开化寺大雄宝殿", "lat": 35.8502, "lng": 112.9102, "desc": "开化寺大雄宝殿内保存有北宋壁画约65平方米，描绘了清凉大法会的内容，构图宏大，技法精湛，是我国现存宋代壁画中的精品。", "era": "北宋皇祐元年（1049年）", "level": "国保"}, {"name": "高平羊头山石窟", "type": "石窟寺", "city": "晋城市", "county": "高平市", "location": "晋城市高平市神农镇羊头山", "lat": 35.9, "lng": 112.95, "desc": "羊头山石窟开凿于北魏至唐代，共有洞窟40余个，造像数百尊。石窟造像风格独特，具有重要的历史和艺术价值。", "era": "北魏至唐", "level": "国保"}, {"name": "陵川崇安寺", "type": "寺", "city": "晋城市", "county": "陵川县", "location": "陵川县城内", "lat": 35.773, "lng": 113.275, "desc": "崇安寺是陵川县城的主要古建筑，创建于后唐，历史悠久。寺内古树参天，建筑宏伟。", "era": "后唐", "level": "国保"}, {"name": "陵川崇安寺山门", "type": "门", "city": "晋城市", "county": "陵川县", "location": "崇安寺", "lat": 35.7732, "lng": 113.2752, "desc": "崇安寺山门又称\"古陵楼\"，建于明洪武年间，高大雄伟，是陵川古城的标志性建筑。", "era": "明洪武年间", "level": "国保"}, {"name": "沁水柳氏民居", "type": "民居", "city": "晋城市", "county": "沁水县", "location": "晋城市沁水县土沃乡西文兴村", "lat": 35.68, "lng": 112.2, "desc": "柳氏民居是明代柳氏家族的宅院建筑群，总面积约20000平方米。民居依山而建，层层叠高，建筑精美，砖雕、木雕、石雕琳琅满目，是研究明代晋东南民居建筑的珍贵实物，被誉为\"中华古建艺术明珠\"。2006年列入国保。", "era": "明", "level": "国保"}, {"name": "柳氏民居门楼", "type": "门楼", "city": "晋城市", "county": "沁水县", "location": "柳氏民居", "lat": 35.6802, "lng": 112.2002, "desc": "柳氏民居门楼雕刻精美，砖雕、木雕、石雕三艺合一，展示了明代建筑装饰艺术的最高水平。", "era": "明", "level": "国保"}, {"name": "沁水湘峪古堡", "type": "堡", "city": "晋城市", "county": "沁水县", "location": "沁水县郑村镇湘峪村", "lat": 35.64, "lng": 112.26, "desc": "湘峪古堡是明代万历年间户部尚书张五典所建的防御性城堡，城堡依山而建，城墙坚固，防御设施完备。堡内保存有大量明代民居建筑，是研究明代城堡建筑的珍贵实物。", "era": "明万历年间", "level": "国保"}, {"name": "湘峪古堡城墙", "type": "城墙", "city": "晋城市", "county": "沁水县", "location": "湘峪古堡", "lat": 35.6402, "lng": 112.2602, "desc": "湘峪古堡城墙高约10米，周长约700米，采用丁顺式砌法，坚固异常。城墙设有多个城门和防御设施，是研究明代城防建筑的珍贵实物。", "era": "明万历年间", "level": "国保"}, {"name": "沁水窦庄古堡", "type": "堡", "city": "晋城市", "county": "沁水县", "location": "沁水县嘉峰镇窦庄村", "lat": 35.6, "lng": 112.32, "desc": "窦庄古堡是明代万历年间工部尚书张铨的故居，城堡布局严谨，防御设施完备。堡内保存有大量明代民居建筑，是研究明代官宦文化的重要场所。", "era": "明万历年间", "level": "国保"}, {"name": "阳城砥洎城", "type": "城", "city": "晋城市", "county": "阳城县", "location": "阳城县润城镇", "lat": 35.51, "lng": 112.46, "desc": "砥洎城是明代崇祯年间所建的防御性城堡，城墙以河卵石和炼铁渣混合夯筑，极为坚固。城内地势北高南低，街巷布局合理，保存有大量明清古建筑。", "era": "明崇祯年间", "level": "国保"}, {"name": "阳城海会寺", "type": "寺", "city": "晋城市", "county": "阳城县", "location": "阳城县", "lat": 35.49, "lng": 112.44, "desc": "海会寺为唐代古刹，保存有唐、宋、金、元、明、清各代建筑，以宋代塔和明代琉璃塔最为著名。", "era": "唐", "level": "国保"}, {"name": "海会寺塔", "type": "塔", "city": "晋城市", "county": "阳城县", "location": "海会寺", "lat": 35.4902, "lng": 112.4402, "desc": "海会寺塔分为唐塔和明塔两座。唐塔为方形五层楼阁式砖塔，明塔为八角十三层楼阁式琉璃塔，高耸入云，是海会寺的标志性建筑。", "era": "唐、明", "level": "国保"}, {"name": "洪洞广胜寺", "type": "寺", "city": "临汾市", "county": "洪洞县", "location": "临汾市洪洞县霍山南麓", "lat": 36.365, "lng": 111.705, "desc": "广胜寺始建于东汉建和元年（147年），元代大德七年（1303年）大地震后重建，是临汾地区最著名的古刹。寺内保存有元、明、清各代建筑，以及珍贵的《赵城金藏》和琉璃塔。其中飞虹塔为明嘉靖年间所建，是我国现存最完整的琉璃塔，高47.31米，色彩艳丽，雕工精湛，被誉为\"中华第一琉璃塔\"。1961年列入第一批全国重点文物保护单位。", "era": "东汉建和元年（147年），元大德七年（1303年）重建", "level": "国保"}, {"name": "广胜寺飞虹塔", "type": "塔", "city": "临汾市", "county": "洪洞县", "location": "广胜寺上寺", "lat": 36.3652, "lng": 111.7052, "desc": "飞虹塔建于明嘉靖三十四年（1555年），高47.31米，为八角十三层楼阁式琉璃塔。塔身以黄、绿、蓝三色琉璃装饰，阳光下璀璨夺目，被誉为\"中华第一琉璃塔\"。", "era": "明嘉靖三十四年（1555年）", "level": "国保"}, {"name": "广胜寺赵城金藏", "type": "经藏", "city": "临汾市", "county": "洪洞县", "location": "广胜寺", "lat": 36.365, "lng": 111.7048, "desc": "《赵城金藏》是我国现存最早最完整的官版大藏经，雕刻于金代皇统八年（1148年），共有6980卷。它与《敦煌遗书》、《永乐大典》、《四库全书》并称为国家图书馆的四大镇馆之宝。", "era": "金代皇统八年（1148年）", "level": "国保"}, {"name": "广胜寺元代壁画", "type": "壁画", "city": "临汾市", "county": "洪洞县", "location": "广胜寺下寺", "lat": 36.3647, "lng": 111.7047, "desc": "广胜寺下寺水神庙明应王殿内保存有元代壁画，内容为水神祭祀和民间生活场景，笔法生动，色彩鲜艳，是研究元代壁画艺术的珍贵实物。", "era": "元代（1309年）", "level": "国保"}, {"name": "临汾尧庙", "type": "庙", "city": "临汾市", "county": "尧都区", "location": "临汾市尧都区尧庙镇", "lat": 36.08, "lng": 111.52, "desc": "尧庙是祭祀尧帝的祠庙，创建于晋代，是我国最早的祭祀帝王庙宇之一。庙内保存有历代碑刻和古建筑，是研究尧文化的重要场所。", "era": "晋代", "level": "国保"}, {"name": "隰县小西天", "type": "寺", "city": "临汾市", "county": "隰县", "location": "临汾市隰县城西凤凰山", "lat": 36.694, "lng": 110.942, "desc": "小西天又名千佛庵，创建于明崇祯二年（1629年），因寺内供奉有大量佛像而得名。寺内保存有明代的悬塑和壁画，尤其是大雄宝殿内的悬塑，密密麻麻布满整个殿堂，被誉为\"悬塑艺术宝库\"，是研究明代悬塑艺术的巅峰之作。2006年列入国保。", "era": "明崇祯二年（1629年）", "level": "国保"}, {"name": "小西天大雄宝殿悬塑", "type": "悬塑", "city": "临汾市", "county": "隰县", "location": "小西天大雄宝殿", "lat": 36.6942, "lng": 110.9422, "desc": "小西天大雄宝殿内的悬塑面积达197.51平方米，以极乐世界的佛菩萨为内容，造像达千余尊，层层叠叠，布满殿顶和四壁，蔚为壮观。这些悬塑做工精细，色彩艳丽，代表了明代悬塑艺术的最高成就。", "era": "明崇祯二年（1629年）", "level": "国保"}, {"name": "永济鹳雀楼", "type": "楼", "city": "运城市", "county": "永济市", "location": "运城市永济市黄河岸边", "lat": 34.813, "lng": 110.298, "desc": "鹳雀楼始建于北周，因时有鹳雀栖于此而得名。唐代诗人王之涣登楼赋诗\"白日依山尽，黄河入海流。欲穷千里目，更上一层楼\"，使此楼名扬天下。原楼毁于元代战火，1997年重建。新楼高73.9米，为仿唐塔式建筑。", "era": "北周始建（557-581年），1997年重建", "level": "省保"}, {"name": "永济普救寺", "type": "寺", "city": "运城市", "county": "永济市", "location": "运城市永济市西厢村", "lat": 34.805, "lng": 110.28, "desc": "普救寺是唐代古刹，因元代杂剧大师王实甫的《西厢记》故事发生于此而闻名天下。寺内西厢花园有\"梨花深院\"，是崔莺莺与张生的爱情故事发生地。寺内保存有唐代莺莺塔，是研究唐代佛塔建筑的珍贵实物。", "era": "唐", "level": "国保"}, {"name": "普救寺莺莺塔", "type": "塔", "city": "运城市", "county": "永济市", "location": "普救寺内", "lat": 34.8052, "lng": 110.2802, "desc": "莺莺塔建于唐代，高约39米，为方形十三层密檐式砖塔。塔身古朴典雅，与《西厢记》故事紧密相连。敲击塔身，可听到蛙鸣声回响，被称为\"普救蟾声\"，为古代奇趣建筑技艺的代表。", "era": "唐", "level": "国保"}, {"name": "永济蒲津渡遗址", "type": "遗址", "city": "运城市", "county": "永济市", "location": "永济市蒲州镇黄河渡口", "lat": 34.82, "lng": 110.25, "desc": "蒲津渡是古代黄河上的重要渡口，连接山西与陕西。遗址保存有唐代的黄河大铁牛四尊、铁人四个、铁山两座等，是研究唐代黄河渡口和冶炼铸造技术的珍贵实物。", "era": "唐", "level": "国保"}, {"name": "蒲津渡铁牛", "type": "铁铸", "city": "运城市", "county": "永济市", "location": "蒲津渡遗址", "lat": 34.8202, "lng": 110.2502, "desc": "蒲津渡遗址出土有四尊唐代大铁牛，高约1.5米，长约3米，每尊重达约75吨，是目前世界上发现的重量最大、工艺最精美的铁质文物之一。这些铁牛铸造于唐开元年间，用于固定黄河浮桥，展现了唐代铸造技术的最高水平。", "era": "唐开元年间（725-741年）", "level": "国保"}, {"name": "永济古蒲州城", "type": "城", "city": "运城市", "county": "永济市", "location": "永济市蒲州镇", "lat": 34.825, "lng": 110.255, "desc": "蒲州古城是唐代最繁华的城市之一，为唐玄宗五女花萼相辉楼等重要建筑的所在地。古城遗址保存有各代城墙和建筑遗迹，是研究唐代城市建筑的重要基地。", "era": "唐", "level": "国保"}, {"name": "运城舜帝陵", "type": "陵", "city": "运城市", "county": "盐湖区", "location": "运城市盐湖区北相镇", "lat": 35.09, "lng": 111.06, "desc": "舜帝陵是祭祀上古贤君虞舜的陵庙，创建于唐代，是海内外华人寻根问祖的圣地之一。陵庙保存有各代建筑遗迹和碑刻。", "era": "唐", "level": "国保"}, {"name": "运城泛舟禅师塔", "type": "塔", "city": "运城市", "county": "盐湖区", "location": "运城市盐湖区", "lat": 35.05, "lng": 111.03, "desc": "泛舟禅师塔建于唐贞元年间，为圆形单层亭式砖塔，造型独特，是研究唐代佛塔建筑的珍贵实物。", "era": "唐贞元年间", "level": "国保"}, {"name": "运城寨里永安寺", "type": "寺", "city": "运城市", "county": "临猗县", "location": "临猗县", "lat": 35.15, "lng": 110.78, "desc": "永安寺保存有各代建筑，以元、明建筑为主，具有重要的历史价值。", "era": "元、明", "level": "国保"}, {"name": "运城临猗双塔", "type": "塔", "city": "运城市", "county": "临猗县", "location": "临猗县", "lat": 35.14, "lng": 110.77, "desc": "临猗双塔建于宋代，两塔隔街相望，造型秀美，是研究宋代佛塔建筑的珍贵实物。", "era": "宋", "level": "国保"}, {"name": "运城妙道寺双塔", "type": "塔", "city": "运城市", "county": "临猗县", "location": "临猗县", "lat": 35.13, "lng": 110.76, "desc": "妙道寺双塔建于宋代，两塔造型略有不同，展现了宋代佛塔建筑的演变过程。", "era": "宋", "level": "国保"}, {"name": "万荣东岳庙", "type": "庙", "city": "运城市", "county": "万荣县", "location": "万荣县解店镇", "lat": 35.41, "lng": 110.78, "desc": "东岳庙供奉东岳大帝，保存有宋、元、明、清各代建筑，以元代飞云楼最为著名。", "era": "宋、元、明、清", "level": "国保"}, {"name": "东岳庙飞云楼", "type": "楼", "city": "运城市", "county": "万荣县", "location": "东岳庙", "lat": 35.4102, "lng": 110.7802, "desc": "飞云楼建于元代，明、清重修，高约17米，为三层四檐十字歇山顶楼阁式木构建筑。整座楼阁不用一钉，全部以榫卯咬合，斗拱密布，层层叠叠，如云翼飞展，被誉为\"中华第一木楼\"，与应县木塔并称\"南楼北塔\"。", "era": "元代，明、清重修", "level": "国保"}, {"name": "运城司马光祠", "type": "祠", "city": "运城市", "county": "夏县", "location": "运城市夏县", "lat": 35.14, "lng": 111.23, "desc": "司马光祠是祭祀北宋史学家、文学家司马光的祠庙。司马光为夏县人，著有《资治通鉴》。祠庙保存有宋、元、明、清各代建筑和大量碑刻。", "era": "宋", "level": "国保"}, {"name": "司马光祖茔", "type": "墓", "city": "运城市", "county": "夏县", "location": "司马光祠内", "lat": 35.1402, "lng": 111.2302, "desc": "司马光祖茔是司马光家族的墓葬群，保存有大量宋代石刻和碑文，是研究宋代墓葬制度的重要实物。", "era": "宋", "level": "国保"}, {"name": "夏县东下冯遗址", "type": "遗址", "city": "运城市", "county": "夏县", "location": "夏县", "lat": 35.12, "lng": 111.22, "desc": "东下冯遗址是夏商时期的重要遗址，对研究中原地区早期文明具有重要价值。", "era": "夏商时期", "level": "国保"}, {"name": "运城裴柏村", "type": "古村", "city": "运城市", "county": "闻喜县", "location": "闻喜县裴柏村", "lat": 35.38, "lng": 111.25, "desc": "裴柏村是历史上著名的\"宰相村\"，是裴氏家族的聚居地。裴氏家族在历史上出了59位宰相、59位大将军，是中国历史上最著名的世家大族之一。村内有裴氏祠堂和大量历史文物，是研究中国古代世家文化的珍贵实物。", "era": "历史悠久", "level": "省保"}, {"name": "新绛绛州大堂", "type": "堂", "city": "运城市", "county": "新绛县", "location": "新绛县", "lat": 35.618, "lng": 111.225, "desc": "绛州大堂是绛州古城的核心建筑，创建于唐代，是古代地方行政办公场所。堂内空间宽敞，结构独特，是研究唐代地方衙署建筑的重要实物。", "era": "唐", "level": "国保"}, {"name": "新绛绛州三楼", "type": "楼", "city": "运城市", "county": "新绛县", "location": "新绛县城内", "lat": 35.6185, "lng": 111.224, "desc": "绛州三楼指钟楼、乐楼、鼓楼，三楼并峙，是绛州古城的标志性景观。三楼建于不同年代，建筑风格各异，是研究晋南古建筑演变的重要实物。", "era": "宋、元、明", "level": "国保"}, {"name": "新绛绛守居园池", "type": "园林", "city": "运城市", "county": "新绛县", "location": "新绛县", "lat": 35.617, "lng": 111.223, "desc": "绛守居园池始建于隋开皇十六年（596年），是绛州官署园林，也是中国现存最早的官署园林之一。园林布局精巧，山水亭桥错落有致，具有极高的历史和园林艺术价值。", "era": "隋开皇十六年（596年）", "level": "国保"}, {"name": "芮城永乐宫", "type": "宫", "city": "运城市", "county": "芮城县", "location": "运城市芮城县永乐镇", "lat": 34.6955, "lng": 110.5915, "desc": "永乐宫是中国现存最大的道教宫观，创建于元代，是全真教三大祖庭之一（与北京白云观、陕西重阳宫齐名）。宫内保存有面积达1000平方米的元代壁画，以三清殿的《朝元图》最为著名，描绘了290位神祇朝拜元始天尊的宏大场面，构图雄伟，技法精湛，代表了元代壁画艺术的最高成就，被誉为\"东方画廊\"。1961年列入第一批全国重点文物保护单位。", "era": "元定宗贵由二年（1247年）至元至元三十一年（1294年）", "level": "国保"}, {"name": "永乐宫三清殿", "type": "殿", "city": "运城市", "county": "芮城县", "location": "永乐宫内", "lat": 34.6957, "lng": 110.5917, "desc": "三清殿是永乐宫的主殿，建于元代，殿内供奉道教最高神三清。殿内保存有元代壁画《朝元图》，描绘了290位道教神祇朝拜元始天尊的宏大场面，构图严谨，色彩艳丽，代表了元代壁画艺术的最高成就。", "era": "元至元三十一年（1294年）", "level": "国保"}, {"name": "永乐宫朝元图", "type": "壁画", "city": "运城市", "county": "芮城县", "location": "永乐宫三清殿", "lat": 34.6958, "lng": 110.5918, "desc": "《朝元图》是永乐宫三清殿内的元代壁画，高4.26米，宽94.68米，描绘了290位道教神祇朝拜元始天尊的宏大场面。壁画人物众多，神态各异，构图严谨，线条流畅，色彩以青绿为主，艳丽而不失庄重，代表了元代壁画艺术的最高成就，被誉为\"东方画廊\"。",         // ===== STATE =====
        let currentCity = '全部';
        let currentType = '全部';
        let currentSearch = '';
        let selectedBuilding = null;
        let mapLoaded = false;
        let amapInstance = null;
        let markers = [];
        let infoWindows = [];

        // ===== INIT =====
        function init() {
            document.getElementById('stat-total').textContent = buildings.length;
            buildCityFilter();
            buildTypeFilter();
            renderList();
            initMapWithKey();
        }

        // ===== CITY FILTER =====
        function buildCityFilter() {
            const cities = ['全部', ...new Set(buildings.map(b => b.city))];
            const container = document.getElementById('city-filter');
            container.innerHTML = cities.map(c =>
                `<button class="city-btn ${c === '全部' ? 'active' : ''}" onclick="setCity('${c}')">${c}</button>`
            ).join('');
        }

        // ===== TYPE FILTER =====
        function buildTypeFilter() {
            const types = ['全部', ...new Set(buildings.map(b => b.type))];
            const container = document.getElementById('type-filter');
            container.innerHTML = types.slice(0, 20).map(t =>
                `<button class="filter-btn ${t === '全部' ? 'active' : ''}" onclick="setType('${t}')">${t}</button>`
            ).join('');
        }

        // ===== SET FILTERS =====
        function setCity(city) {
            currentCity = city;
            document.querySelectorAll('.city-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === city);
            });
            renderList();
        }

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === type);
            });
            renderList();
        }

        // ===== FILTER =====
        function getFiltered() {
            return buildings.filter(b => {
                const matchCity = currentCity === '全部' || b.city === currentCity;
                const matchType = currentType === '全部' || b.type === currentType;
                const matchSearch = !currentSearch ||
                    b.name.includes(currentSearch) ||
                    b.location.includes(currentSearch) ||
                    b.city.includes(currentSearch) ||
                    (b.desc && b.desc.includes(currentSearch));
                return matchCity && matchType && matchSearch;
            });
        }

        // ===== RENDER LIST =====
        function renderList() {
            const filtered = getFiltered();
            document.getElementById('stat-shown').textContent = filtered.length;

            const list = document.getElementById('building-list');
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="no-result">
                        <div class="no-result-icon">&#x1F50D;</div>
                        <div class="no-result-text">未找到匹配的古建筑</div>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map((b, i) => `
                <div class="building-card ${selectedBuilding === b ? 'selected' : ''}"
                     onclick="selectBuilding(${buildings.indexOf(b)})">
                    <div class="building-card-header">
                        <div class="building-name">${b.name}</div>
                        <span class="building-level level-${b.level === '国保' ? 'guobao' : b.level === '省保' ? 'shengbao' : 'shibao'}">${b.level}</span>
                    </div>
                    <div class="building-meta">
                        <span class="building-type">${b.type}</span>
                        <span class="building-location">${b.city} · ${b.county}</span>
                    </div>
                    <div class="building-desc-preview">${b.desc}</div>
                </div>
            `).join('');

            // Scroll to selected
            const selected = list.querySelector('.selected');
            if (selected) selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        // ===== SELECT BUILDING =====
        function selectBuilding(index) {
            selectedBuilding = buildings[index];
            renderList();
            showPopup(selectedBuilding);
            if (mapLoaded && amapInstance) {
                locateOnMap();
            }
        }

        // ===== POPUP =====
        function showPopup(b) {
            const popup = document.getElementById('map-popup');
            popup.classList.add('active');

            document.getElementById('popup-name').textContent = b.name;

            const badges = document.getElementById('popup-badges');
            const levelClass = b.level === '国保' ? 'badge-level-guobao' : b.level === '省保' ? 'badge-level-shengbao' : 'badge-level-shibao';
            badges.innerHTML = `
                <span class="popup-badge badge-type">${b.type}</span>
                <span class="popup-badge ${levelClass}">${b.level}</span>
            `;

            const body = document.getElementById('popup-body');
            body.innerHTML = `
                <div class="popup-section">
                    <div class="popup-label">位置</div>
                    <div class="popup-value">${b.city} ${b.county} · ${b.location}</div>
                </div>
                <div class="popup-section">
                    <div class="popup-label">年代</div>
                    <div class="popup-value popup-era">${b.era}</div>
                </div>
                <div class="popup-section">
                    <div class="popup-label">简介</div>
                    <div class="popup-value popup-desc">${b.desc}</div>
                </div>
                <div class="popup-section">
                    <div class="popup-label">坐标</div>
                    <div class="popup-coords">
                        <span>北纬 ${b.lat.toFixed(4)}°</span>
                        <span>东经 ${b.lng.toFixed(4)}°</span>
                    </div>
                </div>
            `;
        }

        function closePopup() {
            document.getElementById('map-popup').classList.remove('active');
            selectedBuilding = null;
            renderList();
        }

        // ===== MAP =====
        function initMapWithKey() {
            // 如果高德 API 还没加载完，等加载完再初始化
            if (typeof AMap !== 'undefined') {
                _buildMap();
            } else {
                window.addEventListener('amap-ready', _buildMap, { once: true });
                // 兜底：轮询检测
                const poll = setInterval(() => {
                    if (typeof AMap !== 'undefined') {
                        clearInterval(poll);
                        _buildMap();
                    }
                }, 200);
                setTimeout(() => clearInterval(poll), 15000);
            }
        }

        function _buildMap() {
            document.getElementById('map-placeholder').style.display = 'none';
            document.getElementById('map-loading').style.display = 'flex';

            try {
                document.getElementById('map-loading').style.display = 'none';
                document.getElementById('map-legend').classList.add('active');
                document.getElementById('key-status-text').textContent = '地图已加载';
                document.getElementById('key-status-pill').style.background = 'rgba(45,80,22,0.15)';
                document.getElementById('key-status-pill').style.borderColor = 'rgba(45,80,22,0.3)';
                document.getElementById('key-status-pill').style.color = '#2d5016';
                createMap();
                mapLoaded = true;
            } catch (e) {
                document.getElementById('map-loading').style.display = 'none';
                document.getElementById('map-placeholder').style.display = 'flex';
                console.error(e);
                alert('地图初始化失败：' + (e.message || e));
            }
        }

        function createMap() {
            amapInstance = new AMap.Map('map-container', {
                zoom: 7,
                center: [112.35, 37.55],
                mapStyle: 'amap://styles/whitesmoke',
            });

            amapInstance.addControl(new AMap.Scale());
            amapInstance.addControl(new AMap.ToolBar({ position: 'RB' }));

            // Add markers
            buildings.forEach((b, i) => {
                const color = b.level === '国保' ? '#c44000' : b.level === '省保' ? '#2c5282' : '#8b7355';
                const marker = new AMap.Marker({
                    position: [b.lng, b.lat],
                    title: b.name,
                    extData: i,
                    icon: new AMap.Icon({
                        size: new AMap.Size(24, 24),
                        image: 'data:image/svg+xml;base64,' + btoa(`
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="11" fill="${color}" stroke="white" stroke-width="1.5"/>
                                <circle cx="12" cy="12" r="5" fill="white" opacity="0.7"/>
                            </svg>
                        `),
                        imageSize: new AMap.Size(24, 24),
                    }),
                    offset: new AMap.Pixel(-12, -12),
                });

                marker.on('click', function() {
                    selectBuilding(this.getExtData());
                });

                marker.on('mouseover', function() {
                    this.setTop(true);
                });

                marker.setMap(amapInstance);
                markers.push(marker);
            });

            // Fit all markers (pass Marker objects, not raw coordinates)
            if (markers.length) {
                amapInstance.setFitView(markers, false, [50, 50, 50, 50]);
            }
        }

        function locateOnMap() {
            if (!mapLoaded || !selectedBuilding || !amapInstance) return;
            amapInstance.setZoomAndCenter(12, [selectedBuilding.lng, selectedBuilding.lat], false, 500);
        }

        // ===== SEARCH =====
        document.getElementById('search-input').addEventListener('input', function(e) {
            currentSearch = e.target.value.trim();
            renderList();
        });

        // ===== TOGGLE SIDEBAR =====
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('toggle-sidebar');
            sidebar.classList.toggle('collapsed');
            btn.classList.toggle('collapsed');
            btn.innerHTML = sidebar.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
        }

        // ===== INIT =====
        init();
    </script>

</body>
</html>
