{"name":"原起寺","city":"长治市","county":"潞城市","lat":36.32,"lng":113.32,"desc":"原起寺位于潞城区黄牛蹄乡辛安村凤凰山巅，始建于唐天宝六年（747年），据寺内经幢记载，北宋元祐二年（1087年）建青龙宝塔，后历代均有修葺。寺坐北朝南，因山就势，非中轴对称，南北长22.3米、东西宽32.7米，占地约729平方米。寺内现存建筑有大雄宝殿、青龙宝塔（大圣宝塔）等，其中大雄宝殿和宝塔为宋代原构，余为明清建筑。大雄宝殿面阔三间，进深四椽，单檐歇山顶，前檐斗栱四铺作单栱出跳、补间无铺作、耍头呈短昂批竹式，栌斗直接坐柱头之上、阑额不出头；青龙宝塔为八角七层密檐式砖塔，高17米，层层出檐，檐下密布精巧的砖雕仿木斗栱，顶端为宝瓶式塔刹。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"淳化寺","city":"长治市","county":"平顺县","lat":36.19,"lng":113.44,"desc":"淳化寺位于平顺县阳高乡阳高村，始建于北齐天保年间（550-559年），初名龙门禅院，北宋淳化二年（991年）改今名。寺内原有两进院落，现仅存正殿一座为金代遗构，面阔三间，进深六椽，单檐歇山顶，明间前后辟板门，柱头斗栱四铺作单抄单下昂，梁架彻上露明，用材规范，具显著宋金规格。殿前尚存两通北宋开宝三年（970年）石经幢，八角形，楷书阴刻《尊胜陀罗尼经》《金刚般若波罗蜜经》。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大禹庙（北社）","city":"长治市","county":"平顺县","lat":36.2,"lng":113.44,"desc":"平顺北社大禹庙位于平顺县北社村，是祭祀大禹的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大禹庙（西青北）","city":"长治市","county":"平顺县","lat":36.21,"lng":113.45,"desc":"平顺西青北大禹庙位于平顺县西青北村，是祭祀大禹的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大云院","city":"长治市","county":"平顺县","lat":36.19,"lng":113.46,"desc":"平顺大云院位于平顺县实会村龙耳山中，始建于五代后晋天福三年（938年），初名仙岩院，北宋太平兴国八年（983年）奉敕改额「大云禅院」。寺内主殿弥陀殿（大佛殿）建于后晋天福五年（940年），是中国仅存的三座五代木构建筑之一，殿内的普拍枋为中国木构古建中使用最早的实例。殿内东壁及扇面墙尚存五代壁画约21平方米，是中国仅存的五代寺观壁画。寺外西南隅尚存五代后周显德元年（954年）所建的石制七宝塔。1988年列入第三批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"佛头寺","city":"长治市","county":"平顺县","lat":36.2,"lng":113.47,"desc":"佛头寺位于平顺县阳高乡车当村，因背靠形似佛头的山而得名，创建年代不详，明崇祯九年（1636年）和清光绪二年（1876年）均有重修。寺内原为两进院落，现仅存宋代正殿一座，面阔三间，进深四椽，单檐歇山顶，柱头斗栱五铺作双下昂，前后檐补间铺作出斜栱，较为独特。殿内东、西山墙及后檐墙残存元代壁画，绘二十四诸天群像，采用沥粉堆金与工笔重彩技法。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"回龙寺","city":"长治市","county":"平顺县","lat":36.18,"lng":113.43,"desc":"回龙寺位于平顺县阳高乡侯壁村西浊漳河南岸的台地上，创建年代不详，清光绪二年（1876年）曾修缮。2003年，北京大学考古文博学院师生测绘实习时意外发现此寺并进行了详细测绘。寺内现仅存正殿一座（金代建筑），面阔三间，进深四椽，单檐悬山顶，平面近方形。其建筑保留了多处早期地方手法：栌斗下无普拍枋，阑额至角柱不出头，前檐柱头铺作用「蝉肚实柏」栱，昂介于真昂与假昂之间的罕见特例。殿内存清代工笔淡彩壁画约50平方米。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"金灯寺石窟","city":"长治市","county":"平顺县","lat":36.16,"lng":113.42,"desc":"金灯寺石窟位于平顺县玉峡关镇背泉村东林虑山海拔1700米处的天然崖凹内，原名宝岩寺，始建于北齐，隋唐至元代屡经重修，至元代泰定年间改称金灯寺。现存石窟主要开凿于明弘治十七年至嘉靖四十四年（1504-1565年），共历时60余年，是全国现存规模最大的明代石窟群。寺内依崖开凿洞窟14个、佛龛37个、摩崖造像500余尊，并以明弘治元年（1488年）凿造的水陆殿（第四进院落第5窟）最为特色，窟内地面凿池架桥，顶雕精美佛龛与方形藻井，四周浮雕水陆壁画90幅。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"九天圣母庙","city":"长治市","county":"平顺县","lat":36.21,"lng":113.43,"desc":"平顺九天圣母庙位于平顺县侯壁村东浊漳河北岸的台地上，是供奉「九天圣母」（传说中能保佑地方平安的女神）的民间信仰庙宇。庙始建于北宋建中靖国元年（1101年），元明清各代多次修葺。庙坐北朝南，规模较大，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约80平方米和历代碑碣。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"龙门寺","city":"长治市","county":"平顺县","lat":36.22,"lng":113.48,"desc":"平顺龙门寺位于平顺县石城镇源头村龙门山腰，始建于北齐天保元年（550年），初名法华寺，又名惠日院。寺内完整保存了五代、宋、金、元、明、清六个朝代的木构建筑，被誉为「中国古代建筑立体博物馆」。其中西配殿建于五代后唐同光三年（925年），是中国现存唯一的五代悬山式木构建筑；大雄宝殿建于北宋绍圣五年（1098年）；山门为金代遗构；燃灯佛殿为元代建筑；东配殿为明代建筑。1996年列入第四批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"龙王庙（王曲）","city":"长治市","county":"平顺县","lat":36.22,"lng":113.49,"desc":"平顺王曲龙王庙位于平顺县王曲村，是供奉「龙王」的民间信仰庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"明惠大师塔","city":"长治市","county":"平顺县","lat":36.21,"lng":113.46,"desc":"明惠大师塔位于平顺县虹梯关乡虹霓村，原为海惠院中建筑，寺院早毁，唯塔独存。塔建于唐乾符四年（877年），是中国现存仅有的五代时期石塔之一。塔通高约6.5米，平面方形，单檐单层，覆钵尖锥顶，通体由青石仿木构雕造，由塔基、塔座、塔身、塔檐、塔刹五部分组成。塔身南壁辟门，两侧雕金刚像，门楣雕伎乐人；塔座束腰处壶门内雕石狮十六躯，姿态各异。塔背面嵌后唐长兴三年（932年）石碣，记载了明惠大师在唐乾符四年遇害及建塔始末。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"平顺三嵕庙","city":"长治市","county":"平顺县","lat":36.21,"lng":113.47,"desc":"平顺三嵕庙位于平顺县三嵕村，是供奉「三嵕神」的民间信仰庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"圣母庙","city":"长治市","county":"平顺县","lat":36.19,"lng":113.45,"desc":"平顺圣母庙位于平顺县圣母庙村，是当地民间信仰「圣母」的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"夏禹神祠","city":"长治市","county":"平顺县","lat":36.2,"lng":113.48,"desc":"平顺夏禹神祠位于阳高乡侯壁村，始建于元至元二年（1336年），明清屡有修葺。祠坐北朝南，一进院落，占地约877平方米，中轴线现存山门（上层设倒座戏台）、正殿，两侧为配殿、耳房。正殿为元代遗构，面阔三间，进深六椽，单檐悬山顶，柱头斗栱四铺作；山门为明代建筑，余为清代所建。殿内尚存明万历十一年（1583年）石供桌三张、明代嵌壁石一方及清代嵌壁石二方。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"洪教院","city":"长治市","county":"沁县","lat":36.74,"lng":112.7,"desc":"沁县洪教院位于沁县洪教村，是一座佛教寺院。寺始建于金代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"南涅水石刻","city":"长治市","county":"沁县","lat":36.74,"lng":112.7,"desc":"沁县南涅水石刻位于沁县南涅水村，是一处佛教石刻群。刻于北魏至北宋时期，明清各代均有补刻。石刻造像分为单体造像、造像塔、造像碑三种形式，共有石刻约2000余块。其中「百佛碑」「千佛塔」等是北魏至唐时期佛教石刻艺术的代表作。石刻内容多为佛、菩萨、弟子、力士、供养人等佛教题材，造型生动、雕工精细。1959年发现于沁县南涅水村古寺遗址。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"普照寺大殿","city":"长治市","county":"沁县","lat":36.75,"lng":112.71,"desc":"沁县普照寺大殿位于沁县普照寺内，是一座佛教寺院的主殿。寺始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，原规模较大，现仅存大殿。大殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。殿内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"圣寿寺","city":"长治市","county":"沁源县","lat":36.5,"lng":112.34,"desc":"沁源圣寿寺位于沁源县圣寿村，是一座佛教寺院。寺始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"宝峰寺","city":"长治市","county":"屯留区","lat":36.31,"lng":112.89,"desc":"屯留宝峰寺位于屯留区宝峰村，因寺旁山峰而得名「宝峰寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"石室蓬莱宫","city":"长治市","county":"屯留区","lat":36.32,"lng":112.9,"desc":"屯留石室蓬莱宫位于屯留区西郊石室村，因山石而得名「石室蓬莱宫」。宫始建于元代，明清两代多次修葺，是道教全真派道场。宫坐北朝南，依山就势凿石为室，主要建筑有山门、过殿、蓬莱殿、东西配殿等。其中蓬莱殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"仙济桥","city":"长治市","county":"屯留区","lat":36.31,"lng":112.91,"desc":"屯留仙济桥位于屯留区西郊仙济村浊漳河上，是一座单孔石拱桥，因传说有神仙相助修建而得名「仙济桥」。桥始建于金大定年间（1161-1189年），明清两代多次修葺。桥全长约30米，宽约6米，由青石砌筑，单孔跨度大，桥面铺石，两侧设石栏杆，栏板上雕刻有花卉、瑞兽等图案。桥头建有石狮一对，明清石碑数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"先师和尚舍利塔","city":"长治市","county":"屯留区","lat":36.32,"lng":112.9,"desc":"屯留先师和尚舍利塔位于屯留区东南郊，是为纪念唐代高僧先师和尚而建的墓塔。塔始建于唐贞元年间（785-805年），明清两代多次修葺。塔为八角七层密檐式砖塔，高约10米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。塔内供奉先师和尚舍利。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"洪济院","city":"长治市","county":"武乡县","lat":36.84,"lng":112.86,"desc":"武乡洪济院位于武乡县洪济村，是一座佛教寺院。寺始建于金代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"会仙观","city":"长治市","county":"武乡县","lat":36.85,"lng":112.87,"desc":"武乡会仙观位于武乡县会仙村，是供奉道教诸神仙的道教官观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。观内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},

{"name":"紫微庙","city":"长治市","county":"长子县","lat":36.06,"lng":112.9,"desc":"长子紫微庙位于长子县紫微村，是供奉道教「紫微大帝」（北极星）的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"}

{"name":"景德桥","city":"晋城市","county":"城区及近郊区","lat":35.5,"lng":112.85,"desc":"晋城景德桥位于晋城市城区西关，是一座单孔石拱桥，因传说建于隋开皇七年（587年）而得名「景德桥」。桥由青石砌筑，单孔跨度大，桥面铺石，两侧设石栏杆，栏板上雕刻有花卉、瑞兽等图案。桥头建有石狮一对，明清石碑数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"景忠桥","city":"晋城市","county":"城区及近郊区","lat":35.5,"lng":112.86,"desc":"晋城景忠桥位于晋城市城区东关，是一座单孔石拱桥，因传说能保佑一方平安而得名「景忠桥」。桥始建于明洪武年间（1368-1398年），清代多次修葺。桥由青石砌筑，单孔跨度大，桥面铺石，两侧设石栏杆，栏板上雕刻有花卉、瑞兽等图案。桥头建有石狮一对，明清石碑数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玉皇庙（西街）","city":"晋城市","county":"城区及近郊区","lat":35.5,"lng":112.85,"desc":"晋城西街玉皇庙位于晋城市城区西街，是供奉道教玉皇大帝的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"崇明寺","city":"晋城市","county":"高平市","lat":35.79,"lng":112.92,"desc":"高平崇明寺位于高平市河西镇郭家庄圣佛山东麓，原名狼谷寺，始建于宋开宝四年（971年），太平兴国年间得宋太宗敕赐寺名「崇明寺」，明万历十九年（1591年）、清道光六年（1826年）均有大修。寺内中佛殿为宋代早期原构，是崇明寺的核心建筑，风格雄浑、颇具唐风；殿内一对「断梁」结构由两根等径等长的短梁对接而成，巧妙将屋盖荷载传递给檐柱，是中国古代建筑史上罕见的小材大用的创举。后殿为元建明修建筑。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"定林寺","city":"晋城市","county":"高平市","lat":35.79,"lng":112.93,"desc":"高平定林寺位于高平市米山镇七佛山南麓，原名永德寺，因寺旁有甘泉「定林泉」而改名定林寺，创建年代不详，至迟在唐代已有此寺，元延祐四年（1317年）及明、清历代均有修葺。寺坐北朝南，占地约8000平方米，四进院落，主要建筑有山门、雷音殿、三佛殿、七佛殿。其中雷音殿为元代建筑，面阔进深各三间，单檐九脊顶（歇山顶），梁架采用宋《营造法式》做法，斗栱彩绘与宋《营造法式》彩画纹样一致；屋顶的琉璃脊饰为金代佳作，金碧辉煌；殿前月台竖立两座北宋石经幢（977年、985年），是宋代石刻艺术珍品。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二郎庙","city":"晋城市","county":"高平市","lat":35.8,"lng":112.93,"desc":"高平二郎庙位于高平市寺庄镇王报村北的山岗上，始建年代不详。庙内现存建筑为明清遗构，但其中的戏台始建于金大定二十三年（1183年），是中国目前发现年代最早的戏台实物。戏台须弥座式台基高1.1米，面阔一间，平面方形，单檐歇山式九脊顶，举折平缓，山花朝前；柱头上置大额枋，施四铺作斗栱，所有华栱与耍头均为琴面真昂；未用梁架，以斗栱直接支撑层面，内檐四角抹角梁承托大角梁后尾。束腰石上刻「时大定二十三年岁次癸卯仲秋十有三日石匠赵显、赵志刊」铭文及「博士李皋」四字。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二仙宫（中坪）","city":"晋城市","county":"高平市","lat":35.8,"lng":112.94,"desc":"高平中坪二仙宫位于高平市寺庄镇中坪村，是供奉「二仙」的道教宫观。宫始建于金代，元明清各代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二仙庙（西李门）","city":"晋城市","county":"高平市","lat":35.79,"lng":112.92,"desc":"高平西李门二仙庙位于高平市西李门村，是供奉「二仙」的道教庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"古中庙","city":"晋城市","county":"高平市","lat":35.8,"lng":112.93,"desc":"高平古中庙位于高平市中部村，是当地民间信仰「中神」的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"姬氏民居","city":"晋城市","county":"高平市","lat":35.79,"lng":112.94,"desc":"高平姬氏民居位于高平市陈区镇中庄村，建造于元至元三十一年（1294年），距今已七百余年，是目前中国发现年代最早、唯一具有确切纪年题记的元代民居建筑。青石门墩上刻有「大元国至元三十一年岁次甲午……姬宅置石匠……」等题记，清楚地记载了民居的修建时间、建筑性质、刻字人身份与宅主姓氏。民居坐北朝南，建在高42厘米的砂岩台基上，面阔三间，进深六椽，单檐悬山顶，前檐由四根砂岩石柱支撑，柱头斗栱四铺作单抄计心造，耍头作麻叶形；梁架为彻上露明造，四椽栿前压搭牵用三柱，使用自然弯材制成，为典型元代手法。1996年列入第四批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"济渎庙","city":"晋城市","county":"高平市","lat":35.8,"lng":112.94,"desc":"高平济渎庙位于高平市济渎村，是供奉「济渎神」（传说中能保佑地方风调雨顺的水神）的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"嘉祥寺","city":"晋城市","county":"高平市","lat":35.79,"lng":112.92,"desc":"高平嘉祥寺位于高平市三甲镇赤祥村，始建于五代后周年间（951-953年），宋元明清各代屡有增修。寺坐北朝南，二进院落，占地约3220平方米，中轴线排列有天王殿、毗卢殿、大雄宝殿。寺内毗卢殿（中殿）为金代建筑，面阔三间，进深六椽，单檐歇山顶，建于方形台基之上，柱网、斗栱、梁架和节点构造多符合晋东南金代建筑特征；大雄宝殿为元代遗构，面阔五间，进深三间，单檐悬山顶，使用弯材梁架，保存了山西元代建筑的风格。殿前立有两座五代后周广顺三年（953年）石经幢，高约4米，幢身刻《佛顶尊胜陀罗尼经》《佛说阿弥陀经》。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"金峰寺","city":"晋城市","county":"高平市","lat":35.8,"lng":112.93,"desc":"高平金峰寺位于高平市区西南西山东麓，据庙内碑文记载始建于金大定三年（1163年），原名崇果院，金大定年间赐额灵岩院，后毁于兵火，元元统二年（1334年）重建，明清均有重修。寺坐西朝东，依山势而建，四进院落，占地约12547平方米，中轴线依次建有山门、天王殿、大雄宝殿、三圣殿、观音殿。寺内大雄宝殿、三圣殿为元代遗构：大雄宝殿建于1.6米台基之上，面阔五间，进深八椽，单檐悬山顶，使用减柱法，梁架为四椽栿对前后乳栿通檐用四柱；三圣殿重檐歇山顶，前檐柱头斗栱六铺作。1996年公布为山西省文物保护单位。","era":"明清","level":"省保"},
{"name":"清化寺","city":"晋城市","county":"高平市","lat":35.79,"lng":112.94,"desc":"高平清化寺位于高平市神农镇团东村，创建于唐代，元明清均有重修，为神农镇羊头山上清化寺之下寺（团东下寺）。寺坐北朝南，规模宏大，三进正院、两进偏院，中轴线上由南向北依次为如来殿、三佛殿、七佛殿。寺内如来殿为元代遗构，石砌台基，面阔三间，进深六椽，单檐歇山顶，琉璃脊饰，柱头施阑额普柏枋，柱头斗栱四铺作单下昂，殿内梁架彻上露明造，为六架椽屋四椽栿对后乳栿通檐用三柱；七佛殿、水陆殿、诸天殿为明代遗构。寺内存明嘉靖乙丑岁（1565年）石碑等历代碑刻。2019年列入第八批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清梦观","city":"晋城市","county":"高平市","lat":35.8,"lng":112.93,"desc":"高平清梦观位于高平市清梦村，是供奉道教吕洞宾的道教官观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。观内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"三嵕庙（三王村）","city":"晋城市","county":"高平市","lat":35.79,"lng":112.92,"desc":"高平三王村三嵕庙位于高平市三王村，是供奉「三嵕神」的民间信仰庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"铁佛寺","city":"晋城市","county":"高平市","lat":35.8,"lng":112.94,"desc":"高平铁佛寺位于高平市米山镇米西村，传说因金大定七年（1167年）寺内曾归安过铁佛而得名。寺内正殿建筑面积84.5平方米，殿内72平方米的空间密集排列了28尊明代彩塑。中央为释迦牟尼佛趺坐须弥座，背光高达6米直通菩萨顶，其后悬塑中有唐僧师徒西天取经情节；环绕佛坛的二十四诸天彩塑像高约3米，分立东西两侧砖台，造型夸张、轮廓张扬、装饰繁密，采用独特的「木骨铁魂」技法——在木架中嵌入细密铁线以增强结构稳定性。据殿内西侧金柱题记推断，塑像塑造于明嘉靖十年开工，嘉靖十五年（1536年）开光竣工。明代二十四诸天彩塑为中国古代寺观彩塑中的绝无仅有者。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万寿宫","city":"晋城市","county":"高平市","lat":35.79,"lng":112.93,"desc":"高平万寿宫位于高平市万寿村，是供奉道教「万寿大帝」的道教官观。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"仙翁庙","city":"晋城市","county":"高平市","lat":35.8,"lng":112.94,"desc":"高平仙翁庙位于高平市仙翁村，是供奉道教「仙翁」（传说中吕洞宾等八仙）的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"游仙寺","city":"晋城市","county":"高平市","lat":35.79,"lng":112.92,"desc":"高平游仙寺位于高平市游仙村，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玉皇庙","city":"晋城市","county":"高平市","lat":35.8,"lng":112.93,"desc":"高平玉皇庙位于泽州县金村镇府城村卧龙山岗，始建于北宋熙宁九年（1076年），金泰和七年（1207年）重修，元至明清均有修葺，现存为宋金元风格建筑群。庙内现存殿宇楼阁110余间，宋元明三代道教彩塑300余尊，最负盛名者为后院西庑的二十八宿彩塑：人物与动物形象相结合，每尊高约2米，或慈眉善目或怒发冲冠，将人性与神性完美结合，是国内现存规模最大、保存最完好的同类道教艺术精品。后殿成汤殿建于金代，三垣四圣殿为元代建筑，献亭、钟鼓楼为明代建筑。1988年列入第三批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玉虚观","city":"晋城市","county":"高平市","lat":35.79,"lng":112.94,"desc":"高平玉虚观位于高平市玉虚村，是供奉道教玉皇大帝的道教官观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。观内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"资圣寺","city":"晋城市","county":"高平市","lat":35.8,"lng":112.93,"desc":"高平资圣寺位于高平市资圣村，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"白玉宫","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川白玉宫位于陵川县白村，是供奉道教「玉帝」（玉皇大帝）的道教宫观。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"北吉祥寺","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"北吉祥寺位于陵川县礼义镇西街村，始建于唐大历年间（770年），宋太平兴国三年（978年）被赐额「北吉祥院」，元至元十六年（1279年）、明洪武十八年（1385年）、清康熙四十一年（1702年）屡有修葺。寺坐北朝南，二进院落，中轴线上为前殿、中殿、后殿，两侧为掖门、厢房、配殿、禅房。前殿为北宋太平兴国三年（978年）原构，面阔三间，进深六椽，单檐歇山顶，举折平缓，出檐深远，柱头斗栱五铺作单抄单下昂；中殿为宋代遗构，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作双下昂，无补间铺作，外观甚为古朴，与前殿同为宋构；后殿为明代建筑。1996年列入第四批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"崔府君庙（陵川）","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川崔府君庙位于陵川县崔府村，是供奉「崔府君」的民间信仰庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"东岳庙（陵川）","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"陵川东岳庙位于陵川县东岳庙村，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二仙庙（南神头）","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川南神头二仙庙位于陵川县南神头村，是供奉「二仙」的道教庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二仙庙（西溪）","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"陵川西溪二仙庙位于崇文镇岭常村西的山谷之中，距陵川县城约3公里，创建于北宋中晚期，金皇统二年（1142年）扩建形成现有规模，元、明、清各代屡有修葺。庙宇奉祀以孝感天的乐氏二姐妹冲惠、冲淑二真人。建筑群坐北朝南，庙北依西溪水，呈现「背水面山」的独特布局；现存16座金至明清时期建筑，中轴线依次为山门、拜亭、中殿、后殿，后殿两侧有梳妆楼和配殿。后殿、东梳妆楼为金代建筑，正殿面阔三间，进深六椽，单檐歇山顶，梁架为四椽栿前压乳栿，斗栱五铺作双昂计心造；中殿内有精美的「凹」字形小木作神龛三座，龛内供奉二仙及侍女塑像，是珍贵的小木作遗物。庙内存古碑29通，包括金代状元赵安时、李俊民的「状元碑」。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二仙庙（小会岭）","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川小会岭二仙庙位于陵川县小会岭村，是供奉「二仙」的道教庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"龙岩寺","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"陵川龙岩寺位于陵川县礼义镇梁泉村，原名龙泉寺，创建年代不详，唐总章二年（669年）称龙严寺，金大定二年（1162年）改额龙岩寺，明万历八年（1580年）大修。寺坐北朝南，前后两院，中轴线上有山门（仅存基址）、过殿、正殿，两侧有垛楼、廊房。寺内过殿为金天会七年（1129年）所建的主殿，面阔进深各三间，平面近方形，单檐歇山顶，前檐明间设门、四周檐柱为石质、覆盆式柱础刻宝装莲瓣；檐下柱头斗栱五铺作单抄单下昂、批竹昂、无补间斗栱，梁架为四椽栿对后乳栿通檐用三柱，正殿为明代遗构；寺内存金大定三年（1163年）和大定二十五年（1185年）石碑两通，以草、篆、隶、楷、行多种字体镌刻。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"南吉祥寺","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"南吉祥寺位于陵川县礼义镇平川村，与北吉祥寺相距约两千米，始建于唐贞观年间，原址宋家川，宋淳化三年（992年）敕赐院额，天圣八年（1030年）迁至现址，金、元、明、清屡有修葺。寺坐北朝南，二进院落，中轴线有过殿、圆明殿等。过殿为宋代遗构，面阔进深各三间，单檐歇山顶，檐下斗栱硕大，梁架规整；圆明殿（后殿）为金代创建，元代重修，面阔五间，进深六椽，单檐悬山顶。殿内保存有宋代、元代塑像和明清壁画。1996年与北吉祥寺合并列入第四批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"南庙宫","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"陵川南庙宫位于陵川县南庙村，是供奉道教的道教宫观。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"三教堂（陵川）","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川三教堂位于陵川县三教村，是供奉儒释道三教的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"三圣瑞现塔","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"陵川三圣瑞现塔位于陵川县城西三圣寺内，原为三圣寺遗物。塔始建于唐代，明清两代多次修葺。塔为方形七层密檐式砖塔，高约20米，因传说圣人曾在此显灵而得名「瑞现塔」。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"文庙（南召）","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川南召文庙位于陵川县南召村，是祭祀孔子的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、崇圣祠等。其中大成殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玉皇庙（北马）","city":"晋城市","county":"陵川县","lat":35.79,"lng":113.29,"desc":"陵川北马玉皇庙位于陵川县北马村，是供奉道教玉皇大帝的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玉皇庙（石掌）","city":"晋城市","county":"陵川县","lat":35.78,"lng":113.28,"desc":"陵川石掌玉皇庙位于陵川县石掌村，是供奉道教玉皇大帝的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"窦庄古建筑群","city":"晋城市","county":"沁水县","lat":35.6,"lng":112.32,"desc":"沁水窦庄古建筑群位于沁水县东南15公里窦庄村，是一处明代城堡式村落。明嘉靖年间（1522-1566年）始建，明崇祯年间大规模扩建。城堡平面方形，周长约2公里，设四门，南北东西相对。村内现存明清两代院落数十座，房屋数百间，建筑多为砖木结构，硬山顶砖瓦房。建筑布局讲究「五进串连」「院中有院」，砖雕、木雕、石雕装饰精美，是研究晋东南明清民居聚落形态与城堡式村落建筑的实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"郭壁村古建筑群","city":"晋城市","county":"沁水县","lat":35.66,"lng":112.27,"desc":"沁水郭壁村古建筑群位于沁水县东南20公里郭壁村，是一处明清古村落建筑群。明嘉靖年间（1522-1566年）始建，清代多次扩建。村内现存明清两代院落数十座，房屋数百间，建筑多为砖木结构，硬山顶砖瓦房。村落依山就势而建，体现了晋东南明清民居聚落的典型形态。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"石塔（玉溪）","city":"晋城市","county":"沁水县","lat":35.65,"lng":112.28,"desc":"沁水玉溪石塔位于沁水县玉溪村，原为玉溪古寺遗物。塔始建于唐代，明清两代多次修葺。塔为方形七层密檐式石塔，高约10米，由青石雕砌。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为石雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"东岳庙（润城）","city":"晋城市","county":"阳城县","lat":35.51,"lng":112.46,"desc":"阳城润城东岳庙位于阳城县润城镇，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"东岳庙（屯城）","city":"晋城市","county":"阳城县","lat":35.5,"lng":112.45,"desc":"阳城屯城东岳庙位于阳城县屯城村，是供奉东岳大帝的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"开福寺","city":"晋城市","county":"阳城县","lat":35.49,"lng":112.43,"desc":"阳城开福寺位于阳城县城内南大街东侧，始建于北齐天保四年（553年），初名文殊寺，金大定年间改名福严寺，元至正初年定名开福寺。寺内现存献殿、大雄宝殿、戏台三座主要建筑，分别代表了金、元、明三个时期的建筑特色：献殿（部分资料判定为元代大德元年即1297年所建）面阔三间，进深六椽，单檐歇山顶，四面墙壁，屋檐如大鹏展翅，是晋城地区罕见的「殿」形献建筑，柱头斗栱五铺作单抄单下昂；大雄宝殿面阔五间，进深六椽，单檐悬山顶，柱头斗栱五铺作双下昂，殿内采用减柱法；戏台为明代建筑，琉璃脊饰有明嘉靖年号及工匠题记，是阳城乔氏琉璃代表作。占地1095平方米，建筑面积500平方米。","era":"明清","level":"省保"},
{"name":"寿圣寺","city":"晋城市","county":"阳城县","lat":35.5,"lng":112.44,"desc":"阳城寿圣寺位于阳城县寿圣村，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},

{"name":"碧岩寺","city":"临汾市","county":"尧都区","lat":36.08,"lng":111.52,"desc":"临汾碧岩寺位于临汾市尧都区西北碧岩山麓，因山势、岩石而得名「碧岩寺」。寺始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存。寺内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"临汾东岳庙","city":"临汾市","county":"尧都区","lat":36.08,"lng":111.51,"desc":"临汾东岳庙位于临汾市尧都区，是供奉东岳大帝的庙宇。庙始建于唐贞观年间（627-649年），元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后土庙","city":"临汾市","county":"尧都区","lat":36.09,"lng":111.52,"desc":"临汾后土庙位于临汾市尧都区，是祭祀「后土皇地祇」的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"牛王庙","city":"临汾市","county":"尧都区","lat":36.08,"lng":111.53,"desc":"临汾牛王庙位于临汾市尧都区，是民间为祭祀牛王而修建的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约40平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"铁佛寺（尧都）","city":"临汾市","county":"尧都区","lat":36.09,"lng":111.52,"desc":"临汾尧都铁佛寺位于临汾市尧都区，原名「大云寺」，俗称「铁佛寺」，始建于唐贞观年间（627-649年），元明清各代多次修葺。寺内原有唐代铁铸佛头一座（高约6米）、元代铁铸佛身一尊，明万历年间合铸为一尊铁佛，是国内现存较大的古代铁铸佛像之一。寺内存明清建筑和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"尧陵","city":"临汾市","county":"尧都区","lat":36.1,"lng":111.51,"desc":"尧陵位于临汾市尧都区大阳镇伊村西北，为上古帝王帝尧的陵寝。据《史记·五帝本纪》及历代县志记载，帝尧崩后葬于「伊祁山」（亦称「尧山」），即今尧陵所在。陵区现存建筑多为明清遗构，坐北朝南，主要有山门、牌坊、厢房、献殿、享殿、墓冢等。帝尧墓冢封土高约50米，周长约80米，墓前有明代「古帝尧陵」碑及清代碑刻数通，是上古帝王陵寝中保存较好的实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"麻衣寺砖塔","city":"临汾市","county":"安泽县","lat":36.15,"lng":112.25,"desc":"安泽麻衣寺砖塔位于安泽县城北10公里麻衣寺山，始建于唐，明清两代多次修葺。塔为八角七层密檐式砖塔，高约15米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收。塔内供奉唐代石雕佛像一尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"郎寨砖塔","city":"临汾市","county":"安泽县","lat":36.16,"lng":112.26,"desc":"安泽郎寨砖塔位于安泽县城东南15公里郎寨村，原为郎寨古寺遗物。塔始建于唐代，明清两代多次修葺。塔为四角五层密檐式砖塔，高约12米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"师家沟古建筑群","city":"临汾市","county":"汾西县","lat":36.65,"lng":111.53,"desc":"师家沟古建筑群位于汾西县僧念镇师家沟村，是清代晋南山区典型的窑洞式与砖木混合民居建筑群。始建于清乾隆三十四年（1769年），其后嘉庆、道光、咸丰、同治、光绪各代陆续扩建。村落依山就势，占地约10万平方米，现存主要建筑有大门、垂花门、绣楼、过厅、正房、偏房等组成的三十余座院落，砖雕、木雕、石雕装饰工艺精湛。其中师家大院的石雕「福禄寿三星图」和木雕「百鸟朝凤图」是清代民间雕刻艺术的代表。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"真武祠","city":"临汾市","county":"汾西县","lat":36.66,"lng":111.54,"desc":"汾西真武祠位于汾西县城西5公里僧念镇，是祀奉真武大帝的道教宫观。祠始建于元代，明清两代多次修葺。祠坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造。祠内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"老君洞","city":"临汾市","county":"浮山县","lat":35.89,"lng":111.85,"desc":"浮山老君洞位于浮山县城南8公里老君洞山腰，是祀奉道教太上老君李耳的宫观。洞始建于唐代，明清两代多次修葺。洞依山就势，主要建筑有山门、过殿、老君殿、东西配殿等。其中老君殿为明代木构遗存。洞前有石狮一对，明清碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清微观","city":"临汾市","county":"浮山县","lat":35.9,"lng":111.86,"desc":"浮山清微观位于浮山县城南3公里，是供奉道教三清的道教官观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、三清殿、东西配殿等。其中三清殿为明代木构遗存。观内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"古县关帝庙","city":"临汾市","county":"古县","lat":36.53,"lng":111.91,"desc":"古县关帝庙位于古县城内东街，是祭祀关羽的庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"碧霞圣母宫","city":"临汾市","county":"洪洞县","lat":36.27,"lng":111.68,"desc":"洪洞碧霞圣母宫位于洪洞县城北5公里，是供奉碧霞元君的道教宫观。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"洪洞关帝庙","city":"临汾市","county":"洪洞县","lat":36.27,"lng":111.67,"desc":"洪洞关帝庙位于洪洞县城内，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"洪洞华严寺","city":"临汾市","county":"洪洞县","lat":36.28,"lng":111.68,"desc":"洪洞华严寺位于洪洞县城北15公里广胜寺镇，是一座华严宗佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"苏三监狱","city":"临汾市","county":"洪洞县","lat":36.27,"lng":111.67,"desc":"洪洞苏三监狱位于洪洞县古槐南路，因京剧《玉堂春》主人公「苏三起解」的传说而得名，是国内现存唯一一座明代监狱实物。监狱始建于明洪武二年（1369年），明清两代屡有修缮，因其「虎头牢」的特殊规制和「苏三」传说而闻名。监狱由普通牢房、死牢、狱神庙、狱卒房等组成，通道狭窄、门扇低矮、设双层夹墙，体现了明代刑狱制度的特点；「虎头」门头高4米，内设「犯人」坑，前方装高1米的活动木闸。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"净石宫","city":"临汾市","county":"洪洞县","lat":36.28,"lng":111.69,"desc":"洪洞净石宫位于洪洞县城东3公里，是一座道教宫观。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"商山庙","city":"临汾市","county":"洪洞县","lat":36.27,"lng":111.68,"desc":"洪洞商山庙位于洪洞县城西20公里商山腰，是当地民间信仰庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，依山而建，主要建筑有山门、过殿、正殿、东西配殿等。其中正殿为金代木构遗存。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"泰云寺","city":"临汾市","county":"洪洞县","lat":36.29,"lng":111.67,"desc":"洪洞泰云寺位于洪洞县城东南15公里广胜寺镇，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"洪洞玉皇庙","city":"临汾市","county":"洪洞县","lat":36.27,"lng":111.68,"desc":"洪洞玉皇庙位于洪洞县城内玉皇街，是供奉玉皇大帝的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、玉皇殿、东西配殿等。其中玉皇殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"鼓楼（霍州）","city":"临汾市","county":"霍州市","lat":36.57,"lng":111.72,"desc":"霍州鼓楼位于霍州市市中心，明嘉靖二十七年（1548年）由知州杨汝楫创建，清代屡有修葺。楼基呈方形，高约8米，由砖砌而成；楼身为木结构三层，面阔进深各三间，重檐歇山顶，筒板瓦屋面，琉璃脊饰，雕梁画栋，气势雄伟。鼓楼底层面南北辟券洞门，东西为砖墙，四角设石柱；中层和上层四面开窗。楼内现存明代铁钟一口，钟声远播十数里。鼓楼是霍州古城的标志性建筑，也是古代报时、警戒之用。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"观音庙（霍州）","city":"临汾市","county":"霍州市","lat":36.57,"lng":111.73,"desc":"霍州观音庙位于霍州市城内，是供奉观音菩萨的佛教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"娲皇庙","city":"临汾市","county":"霍州市","lat":36.58,"lng":111.72,"desc":"霍州娲皇庙位于霍州市城东10公里，是祭祀女娲的庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"州署大堂","city":"临汾市","county":"霍州市","lat":36.57,"lng":111.72,"desc":"霍州州署大堂位于霍州市城内东大街，始建于唐贞观年间，元代毁于战火后重建，明清两代多次修葺，是国内现存为数极少的古代州署大堂之一。大堂为元代木构遗存，面阔、进深各五间，平面方形，单檐庑殿顶，筒板瓦屋面，琉璃脊饰。前檐柱头斗栱五铺作单抄单下昂，梁架结构严谨、用材宏大，体现了元代官式建筑的典型风格。堂内正中设公案、座椅，两侧列仪仗执事，是研究元代地方衙署建筑与官制的重要实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"祝圣寺","city":"临汾市","county":"霍州市","lat":36.58,"lng":111.73,"desc":"霍州祝圣寺位于霍州市城内西大街，是一座佛教寺院。寺始建于唐贞观年间（627-649年），元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存。寺内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"蒲县东岳庙","city":"临汾市","county":"蒲县","lat":36.41,"lng":111.1,"desc":"蒲县东岳庙位于蒲县城东柏山，始建于唐贞观年间，历代均有修葺，明清两代多次扩建重修，是华北地区著名的道教庙宇之一。庙内现存主要建筑有地狱、献亭、凌霄殿、吕祖祠、土地祠、财神祠等，地狱塑像是国内罕见的实物。其中的「十八层地狱」由15孔窑洞构成，塑有五岳大帝、十殿阎君、六曹判官等塑像共约120余尊，以「游地狱」为内容，表现因果报应、生死轮回的宗教观念，塑像神态逼真、阴森可畏，是中国传统地狱文化的珍贵实物。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大悲院","city":"临汾市","county":"曲沃县","lat":35.63,"lng":111.47,"desc":"曲沃大悲院位于曲沃县城内西大街，原名「大悲禅院」，是一座佛教寺院。院始建于唐代，元明清各代多次修葺。院坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。院内保存有元代壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"龙泉寺","city":"临汾市","county":"曲沃县","lat":35.64,"lng":111.48,"desc":"曲沃龙泉寺位于曲沃县城北10公里，因寺旁泉水而得名「龙泉寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"三清庙献殿","city":"临汾市","county":"曲沃县","lat":35.63,"lng":111.47,"desc":"曲沃三清庙献殿位于曲沃县城内，是供奉道教三清的道教庙宇献殿。庙始建于金代，元明清各代多次修葺。庙坐北朝南，原规模较大，现仅存献殿。献殿为元代木构遗存，面阔三间，进深三间，单檐歇山顶，前檐柱头斗栱五铺作单抄单下昂，平面近方形，梁架为彻上露明造，结构简洁，是晋南金元木构建筑的代表。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"四牌楼","city":"临汾市","county":"曲沃县","lat":35.64,"lng":111.48,"desc":"曲沃四牌楼位于曲沃县城内十字街中心，建于明万历年间（1573-1620年），是明代曲沃县为表彰科举功名而建的石牌楼群。牌楼共四座，分别立于十字街四个方向，故名「四牌楼」。牌楼为四柱三门五楼式，全部由青石雕砌，结构精巧。四面刻有「龙凤呈祥」「八仙过海」「二十四孝」「花卉瑞兽」等图案，雕工精细，气势宏伟。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"薛家大院","city":"临汾市","county":"曲沃县","lat":35.63,"lng":111.47,"desc":"曲沃薛家大院位于曲沃县城内北街，是清代晋南地区典型的民居建筑群。大院始建于清乾隆年间（1736-1795年），由当地富商薛氏家族所建。大院坐北朝南，前后三进院落，主要建筑有大门、垂花门、过厅、正房、东西厢房等。大院建筑规模较大，砖雕、木雕、石雕装饰精美，是清代晋南民居建筑的杰出代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"隰县鼓楼","city":"临汾市","county":"隰县","lat":36.69,"lng":110.94,"desc":"隰县鼓楼位于隰县城内十字街中心，明万历四十五年（1617年）由知县刘以焕创建，清代多次修葺。楼为单体楼阁式建筑，台基为方形砖砌结构，四面辟拱洞门。楼身面阔进深各三间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰，雕梁画栋。楼内立\"隰州\"石碑一通。鼓楼是隰县古城的标志性建筑，也是古代报时、警戒之用。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"千佛庵","city":"临汾市","county":"隰县","lat":36.69,"lng":110.94,"desc":"千佛庵位于隰县城西凤凰山，因寺内供奉千佛而又名小西天，是著名的佛教净土宗道场。寺始建于明崇祯七年（1634年），其后屡有修葺。庵内主要建筑有大雄宝殿、文殊殿、普贤殿、无梁殿等，其中大雄宝殿内的明代悬塑艺术堪称中国雕塑史上罕见杰作——殿内悬塑面积约169平方米，塑有佛、菩萨、弟子、金刚、罗汉、乐伎、飞天等约1500余尊造像，层层叠叠、繁而不乱地悬塑于梁架、藻井、墙壁之上，被誉为\"中国悬塑之冠\"。1986年由山西省人民政府公布为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"乡宁寿圣寺","city":"临汾市","county":"乡宁县","lat":35.97,"lng":110.85,"desc":"乡宁寿圣寺位于乡宁县城西5公里，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"丁村民居","city":"临汾市","county":"襄汾县","lat":35.88,"lng":111.45,"desc":"丁村民居位于襄汾县新城镇丁村，是明清时期山西南部典型的大型民居建筑群。明万历二十一年（1593年）丁氏建宅始祖丁溪定居于此，其后子孙繁衍，至清代陆续建成各院落。村落现存明清两代院落33座，房舍498间，分为北中南三大群组。民居建筑以四合院格局为主，木雕、砖雕、石雕装饰精美，其明清雕花木刻家具为研究晋南民俗文化的珍贵实物。1961年列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"汾城古建筑群","city":"临汾市","county":"襄汾县","lat":35.81,"lng":111.43,"desc":"汾城古建筑群位于襄汾县汾城镇，为晋南地区保存完整的古代县级城址建筑群。城址始建于唐贞观七年（633年），明嘉靖年间在原城基础上砌砖加固，现存城垣为明代遗构。镇内现存古建筑包括城隍庙、文庙、关帝庙、社稷庙、学前塔（俗称\"汾阳八景\"之一）等十几处，跨越金至清多个历史时期。城隍庙金代大殿、文庙大成殿、社稷庙大殿均为重要金元木构遗存，是研究晋南地方建筑演变与县级城制规划的实物标本。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"襄汾关帝庙","city":"临汾市","county":"襄汾县","lat":35.8,"lng":111.44,"desc":"襄汾关帝庙位于襄汾县新城关帝庙村，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"灵光寺塔","city":"临汾市","county":"襄汾县","lat":35.81,"lng":111.43,"desc":"襄汾灵光寺塔位于襄汾县汾城镇灵光寺内，是一座佛教古塔。塔始建于唐代，明清两代多次修葺。塔为八角七层密檐式砖塔，高约30米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴端庄。塔内存唐代石雕佛像一尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"普净寺","city":"临汾市","county":"襄汾县","lat":35.82,"lng":111.45,"desc":"普净寺位于襄汾县赵康镇史威村，原名\"白佛寺\"，始建于唐，金代重修，明清两代续修。寺内现存主要建筑有南殿、北殿、东西配殿等。其中南殿为金代木构遗存，面阔三间，进深三间，单檐歇山顶，柱头斗栱四铺作单抄单下昂，平面近方形，梁架结构严谨，保留了金代晋南地区小型佛寺的典型做法。寺内存历代碑碣数通，金代碑记载了寺名、沿革及重修事宜。整体建筑规模虽小，但历史悠久，是研究晋南金代民间信仰与佛寺建筑的实物例证。","era":"明清","level":"省保"},
{"name":"襄汾文庙","city":"临汾市","county":"襄汾县","lat":35.81,"lng":111.43,"desc":"襄汾文庙位于襄汾县汾城镇内西北隅，是祭祀孔子的庙宇。庙始建于唐贞观年间（627-649年），金元明清各代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、崇圣祠等。其中大成殿为元代木构遗存，面阔五间，进深八椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"翼城东岳庙","city":"临汾市","county":"翼城县","lat":35.74,"lng":111.56,"desc":"翼城东岳庙位于翼城县城内，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙（樊店）","city":"临汾市","county":"翼城县","lat":35.73,"lng":111.55,"desc":"翼城樊店关帝庙位于翼城县樊店村，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"乔泽庙","city":"临汾市","county":"翼城县","lat":35.74,"lng":111.56,"desc":"翼城乔泽庙位于翼城县城西5公里乔泽村，是当地民间信仰庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"石木四牌坊","city":"临汾市","county":"翼城县","lat":35.73,"lng":111.55,"desc":"翼城石木四牌坊位于翼城县城内十字街，建于明万历年间（1573-1620年），是明代翼城县为表彰科举功名而建的石木结构牌坊群。牌坊共四座，分别立于十字街四个方向，故名\"四牌坊\"。牌坊为四柱三门五楼式，下部石砌、上部木构，结构精巧。四面刻有「龙凤呈祥」「八仙过海」「二十四孝」「花卉瑞兽」等图案，雕工精细，形象生动，是明代的牌坊建筑艺术的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永和文庙","city":"临汾市","county":"永和县","lat":36.76,"lng":110.63,"desc":"永和文庙位于永和县城内，始建于元代，明清两代多次修葺，是永和县保存完整的祭祀孔子的庙宇建筑群。文庙坐北朝南，中轴线上依次建有棂星门、大成门、大成殿、崇圣祠等建筑，两侧配以东西庑、名宦祠、乡贤祠等。大成殿为元代木构遗存，面阔五间，进深八椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型元代建筑手法。整体建筑对研究晋西南地区元至清地方文庙建筑演变具有重要价值。","era":"明清","level":"省保"},
/* ── 运城市 ── */
{"name":"池神庙","city":"运城市","county":"盐湖区","lat":35.01,"lng":111,"desc":"运城池神庙位于盐湖区南郊，是中国现存规模最大、保存最完整的祭祀盐池之神的庙宇。始建于唐大历年间（766-779年），明嘉靖年间重建于今址，清代屡有修葺。庙坐北朝南，中轴线上建有山门、过殿、戏台、东西厢房、三大殿（中池、东池、西池神祠）等。庙内三座大殿供奉中、东、西池盐神，集中反映了中国古代盐业生产和管理的历史，是研究运城盐池文化、运城盐业发展史的重要实物。其中东池神祠为明代木构，面阔三间，进深三间，单檐悬山顶。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙（常平）","city":"运城市","county":"盐湖区","lat":35.05,"lng":111.04,"desc":"常平关帝庙位于盐湖区解州镇常平村，是关羽故宅所建的\"关帝家庙\"，被誉为\"关庙之祖\"。相传关羽生于常平村，因关羽祖父辈始迁居于此，故名\"常平\"。庙始建于金代，明嘉靖三十四年（1555年）地震后重建于今址，清康熙四十二年（1703年）敕修扩建。现庙坐北朝南，中轴线依次为山门、仪门、崇宁殿、娘娘殿、关帝殿（祖宗殿）、圣祖殿，庙内现存明万历年间石雕铁狮子一对、清代御制\"关帝世系图\"碑等珍贵文物。庙前有\"关公故里\"石碑一通。2006年与解州关帝庙合并列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙（解州）","city":"运城市","county":"盐湖区","lat":35.04,"lng":111.01,"desc":"解州关帝庙位于盐湖区解州镇西关，是现存规模最大、保存最完整的关帝庙宇，被誉为\"关庙之祖\"。庙始建于陈隋年间（589年），宋真宗时扩建为\"崇宁宫\"，明嘉靖年间毁于地震后重建于今址。清康熙四十二年（1703年）因传说为关羽诞生地而敕建\"庙下庙\"——常平关帝家庙。庙坐北朝南，分南北两大部分：南部为结义园、君子亭等，北部为正庙。中轴线依次有琉璃龙壁、端门、雉门、午门、御书楼、崇宁殿、春秋楼等建筑。庙内琉璃龙壁、藻井、雕梁均为艺术珍品。1961年列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝献殿","city":"运城市","county":"盐湖区","lat":35.05,"lng":111.02,"desc":"运城关帝献殿位于盐湖区解州镇解州关帝庙内，是关帝庙主体建筑群中的一座独立建筑。殿始建于元代，明清两代多次修葺，是祭祀关羽时陈列祭品、举行仪式的场所。殿坐北朝南，面阔五间，进深六椽，单檐歇山顶，筒板瓦屋面，琉璃脊饰。献殿整体建筑形制与正殿保持一致，但略低，体现了主次分明、礼制严谨的建筑布局。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关王庙（运城）","city":"运城市","county":"盐湖区","lat":35.03,"lng":111.01,"desc":"运城关王庙位于盐湖区西片关王庙街，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"三官庙戏台","city":"运城市","county":"盐湖区","lat":35.04,"lng":111.02,"desc":"运城三官庙戏台位于盐湖区西片三官庙内，建于明万历年间（1573-1620年），是山西现存保存较完整的明代戏台建筑之一。戏台面阔三间，进深四椽，前后台分明，前台有藻井（\"井口枋\"）装置，可形成回音效果；后台为化妆室，两侧有\"出将\"\"入相\"上下场门。戏台顶部为卷棚顶，筒板瓦屋面，是研究明清山西戏曲文化与舞台建筑的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太平兴国寺塔","city":"运城市","county":"盐湖区","lat":35.05,"lng":111.03,"desc":"太平兴国寺塔位于运城市盐湖区安邑城内太平兴国寺内，俗称\"安邑塔\"。塔始建于唐贞观年间，原为木塔，宋太平兴国年间改建为砖塔，明清两代屡有修葺。塔为方形七层密檐式砖塔，高约36米，由塔基、塔身、塔檐、塔刹四部分组成。塔身四面均辟有佛龛，内嵌佛教题材砖雕；塔檐仿木构砖雕，层层上收，造型古朴端庄。塔内部中空有阶梯可登临。塔顶塔刹为铁制，由覆钵、相轮、宝瓶组成，是晋南地区保存较好的宋代砖塔。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"运城泰山庙","city":"运城市","county":"盐湖区","lat":35.04,"lng":111.01,"desc":"运城泰山庙位于盐湖区禹都街，又名\"东岳庙\"，始建于元代，明清两代多次修葺，是祭祀东岳大帝黄飞虎的庙宇。庙坐北朝南，前后三进院落，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为明代木构遗存，面阔七间，进深八椽，单檐悬山顶，前檐柱头斗栱五铺作双下昂。庙内保存有明代壁画约80平方米，绘东岳大帝出巡、行雨布雨等内容。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙（樊村）","city":"运城市","county":"河津市","lat":35.59,"lng":110.7,"desc":"河津樊村关帝庙位于河津市樊村镇樊村，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后土庙（古垛村）","city":"运城市","county":"河津市","lat":35.6,"lng":110.71,"desc":"河津古垛村后土庙位于河津市古垛村，是祭祀\"后土皇地祇\"的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"台头庙","city":"运城市","county":"河津市","lat":35.59,"lng":110.7,"desc":"河津台头庙位于河津市台头村，是当地民间信仰庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玄帝庙","city":"运城市","county":"河津市","lat":35.6,"lng":110.71,"desc":"河津玄帝庙位于河津市城区，是祀奉真武大帝的道教宫观。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"镇风塔","city":"运城市","county":"河津市","lat":35.58,"lng":110.7,"desc":"镇风塔位于河津市阳村乡苍头村，建于清乾隆十八年（1753年），是当地百姓为镇风沙、求平安而修建的佛教风水塔。塔为八角十三层密檐式砖塔，高约35米，由塔基、塔身、塔檐、塔刹四部分组成。塔身底部有「镇风塔」三字及建塔纪年铭文。塔檐为砖雕仿木构斗栱，每层转角处悬挂风铎。塔刹为铁制，由覆钵、相轮、宝瓶组成。镇风塔融合了佛教信仰与民间风水观念，是研究晋南清代民间信仰与砖塔建筑的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"北阳城砖塔","city":"运城市","county":"稷山县","lat":35.6,"lng":110.97,"desc":"稷山北阳城砖塔位于稷山县城北5公里北阳城村，原为北阳城古寺遗物。塔始建于唐代，明清两代多次修葺。塔为八角七层密檐式砖塔，高约20米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"法王庙","city":"运城市","county":"稷山县","lat":35.61,"lng":110.98,"desc":"稷山法王庙位于稷山县城关镇，是当地民间信仰庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"稷王庙","city":"运城市","county":"稷山县","lat":35.6,"lng":110.97,"desc":"稷山稷王庙位于稷山县城关镇，系清代遗物，是祭祀农神「稷」（后稷）的庙宇。庙坐北朝南，中轴线建有山门、过殿、正殿、东西配殿等。其中正殿为清代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存历代重修碑记数通。稷山是中华农耕文明的发祥地之一，相传后稷曾在此教民稼穑，因此稷王庙在此地尤其受到重视。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"青龙寺","city":"运城市","county":"稷山县","lat":35.61,"lng":110.98,"desc":"青龙寺位于稷山县马村西隅，始建于唐龙朔二年（662年），元明清各代均有修葺。寺内主要建筑有天王殿、罗汉殿、地藏殿、大雄宝殿、东西配殿等。其中大雄宝殿、东西配殿内保存有元代壁画约190余平方米，绘有释迦牟尼、观音、弥勒、佛本生故事及四季变化、星宿等内容，是元代壁画艺术的杰出代表。明代在此设\"稷山县稷益寺儒学\"。寺内存明清重修碑记数通。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"砖雕墓葬（马村段氏家族）","city":"运城市","county":"稷山县","lat":35.6,"lng":110.97,"desc":"稷山马村段氏砖雕墓葬位于稷山县马村，是金代段氏家族的墓葬群。金大定年间（1161-1189年）始建，至明清各代陆续扩建，共有墓葬14座。墓葬均为砖雕仿木构建筑形式，由墓道、墓门、甬道、墓室组成。墓室内壁镶嵌有精美的砖雕，题材包括\"二十四孝\"\"妇人启门\"\"孝子故事\"\"花卉瑞兽\"\"戏剧人物\"等，被誉为\"金代民间艺术博物馆\"。其中段氏墓地共出土砖雕约200余块，题材丰富、雕工精细。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"长春观","city":"运城市","county":"绛县","lat":35.49,"lng":111.57,"desc":"绛县长春观位于绛县城内东南隅，原名\"玄妙观\"，是一座道教宫观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、三清殿、东西配殿等。其中三清殿为明代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。观内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"功德碑楼","city":"运城市","county":"绛县","lat":35.5,"lng":111.58,"desc":"绛县功德碑楼位于绛县横水镇乔家堡村，原为\"乔氏祠堂\"内的纪念性建筑。碑楼始建于清乾隆年间（1736-1795年），由当地富商乔氏为纪念先祖功德而立。碑楼为砖石结构，四柱三门三楼式，结构精巧。碑楼四面刻有「龙凤呈祥」「八仙过海」「二十四孝」「花卉瑞兽」等图案，雕工精细，形象生动。碑楼内立\"乔氏功德碑\"一通，碑文记载了乔氏家族发家史和德行事迹。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"节孝牌坊","city":"运城市","county":"绛县","lat":35.49,"lng":111.57,"desc":"绛县节孝牌坊位于绛县城内十字街，建于清乾隆年间（1736-1795年），是清代绛县为表彰节孝妇女而建的牌坊。牌坊为四柱三门五楼式，全部由青石雕砌，结构精巧。牌坊四面刻有\"节孝故事\"\"二十四孝\"\"花卉瑞兽\"等图案，雕工精细，形象生动，是清代石雕艺术的代表作品。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"景云宫玉皇殿","city":"运城市","county":"绛县","lat":35.5,"lng":111.58,"desc":"绛县景云宫玉皇殿位于绛县横水镇乔家堡村，原名\"太阴宫\"，始建于唐贞观年间（627-649年），元代改为道教宫观，明清续修。宫坐北朝南，主要建筑有山门、东西配殿、玉皇殿等。其中玉皇殿为元代木构遗存，面阔三间，进深四椽，单檐歇山顶，前檐柱头斗栱五铺作，平面近方形。玉皇殿前廊设木雕\"月梁\"和元代风格的拱眼壁彩画，是元代山西道教建筑的重要实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太阴寺","city":"运城市","county":"绛县","lat":35.49,"lng":111.57,"desc":"绛县太阴寺位于绛县郝庄乡太阴村，原名\"青莲寺\"，始建于北魏，唐贞观年间扩建，北宋重修，明清续修。寺坐北朝南，主要建筑有山门、东西配殿、大雄宝殿等。其中大雄宝殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。寺内存有金代《大藏经》雕版印刷物和明清壁画。寺后有北魏至唐石雕造像数尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"泰山庙（南柳）","city":"运城市","county":"绛县","lat":35.5,"lng":111.58,"desc":"绛县南柳泰山庙位于绛县南柳村，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"泰山庙戏台（董封）","city":"运城市","county":"绛县","lat":35.49,"lng":111.57,"desc":"绛县董封泰山庙戏台位于绛县董封村，是供奉东岳大帝的泰山庙附属戏台。戏台始建于金代，元明清各代多次修葺，是研究晋南金元明清戏曲文化与舞台建筑的重要实物。戏台坐南朝北，面阔三间，进深四椽，前后分明，前台有藻井（\"井口枋\"）装置，可形成回音效果；后台为化妆室，两侧有\"出将\"\"入相\"上下场门。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"绛县文庙","city":"运城市","county":"绛县","lat":35.5,"lng":111.58,"desc":"绛县文庙位于绛县城内东南隅，是祭祀孔子的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"妙道寺双塔","city":"运城市","county":"临猗县","lat":35.13,"lng":110.76,"desc":"妙道寺双塔位于临猗县城内北隅，原为妙道寺（亦称\"双塔寺\"）建筑遗存。寺始建于唐，两塔为宋代遗物。西塔名\"雁塔\"，方形九层密檐式砖塔，高约33米；东塔名\"文峰塔\"，方形十三层密檐式砖塔，高约30米。双塔耸立于县城北部，隔街相对，是临猗古城的标志性建筑。双塔塔身均辟有佛龛，内嵌佛教造像砖雕；塔檐为砖雕仿木构斗栱，工艺精细，保留了宋代砖塔建筑的典型风格。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"圣庵寺塔","city":"运城市","county":"临猗县","lat":35.14,"lng":110.77,"desc":"临猗圣庵寺塔位于临猗县城内，原为圣庵寺遗物。塔始建于唐贞观年间，明清两代多次修葺。塔为方形七层密檐式砖塔，高约30米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴端庄。塔内存唐代石雕佛像一尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"临猗县衙","city":"运城市","county":"临猗县","lat":35.15,"lng":110.78,"desc":"临猗县衙位于临猗县城内，是元明清时期临猗县的官署衙署建筑。县衙始建于元代，明清两代多次修葺。现存建筑主要为清代遗构，包括大堂、二堂、三堂及东西厢房、仪门、监狱等。大堂面阔五间，进深六椽，单檐悬山顶，结构严谨，是清代地方官署衙门的典型布局。县衙内保存有\"临猗县\"清代石额一方，历代县志档案若干，对研究清代县级地方衙署建制具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永兴寺塔","city":"运城市","county":"临猗县","lat":35.13,"lng":110.76,"desc":"临猗永兴寺塔位于临猗县城内，原为永兴寺遗物。塔始建于唐贞观年间，明清两代多次修葺。塔为方形九层密檐式砖塔，高约25米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴端庄。塔内存唐代石雕佛像一尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"城隍庙（芮城）","city":"运城市","county":"芮城县","lat":34.69,"lng":110.59,"desc":"芮城城隍庙位于芮城县城内东街，是祀奉城隍神的庙宇。庙始建于明洪武三年（1370年），明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、献亭、正殿、东西配殿等。其中正殿为明代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"广仁王庙","city":"运城市","county":"芮城县","lat":34.7,"lng":110.58,"desc":"广仁王庙位于芮城县城北4公里龙泉村西的高地上，是供奉广仁王（青龙、白虎两山之神广德王、仁圣王）的水神庙宇。庙始建于唐大和五年（831年），是中国现存最早的道教庙宇建筑之一。庙坐北朝南，由戏台、厢房、正殿组成，正殿面阔五间，进深四椽，单檐歇山顶，柱头有\"大唐大和五年\"题记，是中国现存唐代木构建筑中极为珍贵的一例。殿内当心间设佛龛，内供奉唐代泥塑。庙南有龙泉唐井和龙泉亭。是唐代地方神庙建筑的典型代表，2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后土庙（朱吕）","city":"运城市","county":"芮城县","lat":34.69,"lng":110.59,"desc":"芮城朱吕后土庙位于芮城县朱吕村，是祭祀\"后土皇地祇\"的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清凉寺","city":"运城市","county":"芮城县","lat":34.7,"lng":110.58,"desc":"芮城清凉寺位于芮城县城西10公里清凉山麓，因山势清幽而得名「清凉寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"寿圣寺塔","city":"运城市","county":"芮城县","lat":34.69,"lng":110.59,"desc":"芮城寿圣寺塔位于芮城县城内，原为寿圣寺遗物。塔始建于唐贞观年间，明清两代多次修葺。塔为八角九层密檐式砖塔，高约28米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴端庄。塔内存唐代石雕佛像一尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"八龙寺塔","city":"运城市","county":"万荣县","lat":35.41,"lng":110.78,"desc":"万荣八龙寺塔位于万荣县八龙寺村，原为八龙寺遗物。塔始建于唐代，明清两代多次修葺。塔为方形九层密檐式砖塔，高约25米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万荣东岳庙","city":"运城市","county":"万荣县","lat":35.41,"lng":110.77,"desc":"万荣东岳庙位于万荣县城内，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万荣后土庙","city":"运城市","county":"万荣县","lat":35.42,"lng":110.78,"desc":"万荣后土庙位于万荣县城西南荣河镇庙前村的高崖之上，是现存规模最大的祭祀「后土皇地祇」的庙宇，俗称「后土祠」。庙始建于汉文帝后元元年（前163年），北宋政和六年（1116年）扩建，明嘉靖年间毁于地震后于万历年间重建。庙内标志性建筑「秋风楼」为明代建筑，因汉武帝《秋风辞》而得名。楼高约32米，分三层，斗栱层叠，巍峨壮观，楼下有琉璃龙壁、二龙戏珠、奇花异兽、人物故事等精美琉璃构件。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万荣稷王庙","city":"运城市","county":"万荣县","lat":35.41,"lng":110.77,"desc":"万荣稷王庙位于万荣县稷王山麓，是祭祀农神「稷」（后稷）的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为明代木构遗存，面阔五间，进深六椽，单檐悬山顶。庙内存明清壁画约80平方米，绘「后稷教民稼穑」等农耕题材。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"稷王山塔","city":"运城市","county":"万荣县","lat":35.42,"lng":110.78,"desc":"万荣稷王山塔位于万荣县稷王山顶，原为稷王山寺庙遗物。塔始建于唐代，明清两代多次修葺。塔为八角九层密檐式砖塔，高约15米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"李家大院","city":"运城市","county":"万荣县","lat":35.41,"lng":110.77,"desc":"李家大院位于万荣县阎景村，是清光绪至民国初年晋商李氏家族所建的大型民居建筑群。李氏家族自李敬之于清道光年间起开始发家，至民国初年由其孙李道行（留学英国）扩建成现有规模。院落以中西合璧为特色，保存有哥特式拱券门、罗马式立柱、中式木雕砖雕等不同风格的建筑装饰。大院共有院落20余座，房屋260余间，分为\"前院\"、\"后院\"、\"小姐院\"、\"仆人院\"等不同功能分区，是研究近代晋商文化与中西建筑文化交融的重要实物。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万荣寿圣寺塔","city":"运城市","county":"万荣县","lat":35.42,"lng":110.78,"desc":"万荣寿圣寺塔位于万荣县城内，原为寿圣寺遗物。塔始建于唐代，明清两代多次修葺。塔为八角九层密檐式砖塔，高约20米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万荣文庙","city":"运城市","county":"万荣县","lat":35.41,"lng":110.77,"desc":"万荣文庙位于万荣县城内（原万泉县城），始建于金代，明清两代多次修葺。庙坐北朝南，中轴线建有棂星门、大成门、大成殿、崇圣祠等。其中大成殿为明代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作，殿内梁架为彻上露明造。庙内存历代碑碣数通。1958年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"薛瑄家庙","city":"运城市","county":"万荣县","lat":35.42,"lng":110.78,"desc":"万荣薛瑄家庙位于万荣县薛瑄故里，是祭祀明代著名理学家、文学家薛瑄（1389-1464）的家庙。庙始建于明成化年间（1465-1487年），明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、享堂、东西配殿等。其中享堂为明代木构遗存。庙内存明清碑碣数通，记载了薛瑄生平事迹。薛瑄被誉为\"明代河东学派创始人\"\"关学宗师\"。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"保宁寺塔","city":"运城市","county":"闻喜县","lat":35.38,"lng":111.25,"desc":"闻喜保宁寺塔位于闻喜县城内，原为保宁寺遗物。塔始建于唐代，明清两代多次修葺。塔为方形七层密檐式砖塔，高约25米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。塔内存唐代石雕佛像一尊。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后稷庙","city":"运城市","county":"闻喜县","lat":35.39,"lng":111.26,"desc":"后稷庙位于闻喜县桐城镇，始建年代不详，明嘉靖年间重建于今址，是晋南地区专祀农神\"后稷\"的庙宇。庙坐北朝南，中轴线建有戏台、献殿、正殿、东西配殿等建筑。其中正殿为明代木构，面阔五间，进深六椽，单檐悬山顶。庙内保存有明代壁画约100平方米，绘\"后稷教民稼穑\"\"稷播百谷\"等农耕题材，与新绛稷益庙壁画题材相似、相映成趣。庙内存明清碑碣数通，记载了晋南地区农业祭祀传统。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"仇氏石牌坊及碑亭","city":"运城市","county":"闻喜县","lat":35.38,"lng":111.25,"desc":"闻喜仇氏石牌坊及碑亭位于闻喜县郭家庄仇氏家族墓地内，是清代为表彰仇氏家族功名而建的纪念性建筑群。牌坊始建于清光绪年间（1875-1908年），为四柱三门五楼式，全部由青石雕砌，结构精巧。碑亭为单檐歇山顶建筑，内立\"仇氏家谱碑\"及仇氏先贤功德碑数通。牌坊与碑亭组合，是清代晋南家族纪念建筑的代表作品。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"司马光墓","city":"运城市","county":"夏县","lat":35.14,"lng":111.23,"desc":"司马光墓位于夏县水头镇小晁村北麓，是北宋著名政治家、史学家、《资治通鉴》主编司马光（1019-1086年）及其家族的墓园。墓园始建于北宋，元明清各代均有修葺，墓区规模宏大，包括墓冢、碑楼、碑亭、祠堂、余庆禅寺等。司马光墓封土高约5米，墓前现存宋、元、明、清各代碑碣及石羊、石虎、石马、石翁仲等石像生。\"司马光砸缸\"的故事即发生于此地。2006年与温公祠堂、余庆禅寺等合并列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"夏县圣母庙","city":"运城市","county":"夏县","lat":35.15,"lng":111.24,"desc":"夏县圣母庙位于夏县城内西街，是当地民间信仰的圣母庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"夏县泰山庙","city":"运城市","county":"夏县","lat":35.13,"lng":111.23,"desc":"夏县泰山庙位于夏县城内东街，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"夏县文庙","city":"运城市","county":"夏县","lat":35.14,"lng":111.24,"desc":"夏县文庙位于夏县城内东南隅，是祭祀孔子的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、崇圣祠等。其中大成殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"白台寺","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"白台寺位于新绛县光村镇白台寺村，始建于唐代，明清两代多次修葺。寺坐北朝南，主要建筑有天王殿、罗汉殿、中殿、后殿等。其中后殿（又名\"普光殿\"）保留唐代遗风，元代重建，明清续修，是白台寺的核心建筑。中殿和后殿内保存有元代塑像与明代壁画，是晋南元代佛教艺术的重要实物。寺内存唐代石雕造像、金代经幢、明清重修碑记等珍贵文物，对研究晋南地区唐至明清佛教建筑与艺术演变具有重要价值。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"福胜寺","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"福胜寺位于新绛县光村镇光村，原名\"普安寺\"，始建于唐贞观年间，明正德年间改今名。寺内主要建筑有塔、钟鼓楼、东西配殿、正殿等。其中塔为元代建筑，平面方形十三层密檐式砖塔，高约40米，是晋南元代砖塔的代表作品。塔内有木梯可登临，造型古朴浑厚，体现了元代砖塔的建筑风格。寺内存历代碑碣和元明清各代木构建筑多座，是研究晋南元明清佛教建筑演变的重要实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙（龙香）","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"新绛龙香关帝庙位于新绛县龙香村，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙（泉掌）","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"新绛泉掌关帝庙位于新绛县泉掌村，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"稷王庙（北池）","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"新绛北池稷王庙位于新绛县北池村，是祭祀农神「稷」（后稷）的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为明代木构遗存。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"稷王庙（苏阳）","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"新绛苏阳稷王庙位于新绛县苏阳村，是祭祀农神「稷」（后稷）的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为明代木构遗存。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"稷益庙","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"稷益庙位于新绛县阳王镇阳王村，是祭祀稷（后稷、农神）和益（伯益、皋陶之臣）的庙宇，又称「稷益庙」或「阳王庙」。庙始建于唐，元至元年间重修，明嘉靖年间续修。庙内正殿为明代木构，面阔五间，进深六椽，单檐悬山顶，琉璃脊饰。殿内保存有明代壁画约130平方米，绘稷教民稼穑、益造井田以及稷与益率民耕获等农耕内容，并辅以山水、楼阁、人物等场景，是明代壁画艺术中反映农耕题材的代表作。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"绛守居园池","city":"运城市","county":"新绛县","lat":35.62,"lng":111.23,"desc":"绛守居园池位于新绛县城内西北隅，是隋开皇十六年（596年）由当时的绛州刺史梁叔静主持修建的官署园林，是中国现存最早的官署园林。园内现存隋唐以来的古建筑和园林遗迹，包括洄涟亭、望月台、嘉禾楼、静观楼、八角亭、半亭、影壁、六角拱桥、垂柳、苍松等。其中的\"洄涟亭\"和\"望月台\"保留了隋代园林布局特色，是研究中国古代园林艺术起源与发展的重要实物。园内\"绛守居园池\"题刻为唐代书法家颜真卿所书摹刻。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"绛州三楼","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"绛州三楼位于新绛县城内高垣之上，分别为钟楼、鼓楼、乐楼。三楼始建于元代，明清两代多次修葺。钟楼底层为砖砌方形台基，下设券洞通道连接两街，钟楼面阔进深各三间，重檐歇山顶，琉璃瓦顶；鼓楼与钟楼形制相似，下层为砖砌券洞台基，四面辟门洞；乐楼为明代建筑，因面向北坡钟楼取\"登楼听戏\"之意而建造。三楼并列耸立，气势壮观，与唐代州府规制密切相关，是研究元明清州府建筑格局和礼乐制度的实物。2013年绛州三楼、乐楼列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"净梵寺大殿","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"净梵寺位于新绛县北张镇北张村，始建于唐，原名\"清凉院\"，北宋改称\"净梵寺\"，明清多次修葺。寺内主要建筑有山门、天王殿、大雄宝殿及东西配殿等。其中大雄宝殿为元代木构遗存，面阔三间，进深六椽，单檐歇山顶，柱头斗栱五铺作单抄单下昂，平面近方形，梁架结构为四椽栿对后乳栿通檐用三柱，使用自然弯材，呈现典型元代建筑风格。殿内存明代彩塑及清代壁画，对研究晋南元代佛寺建筑与明清彩塑艺术演变具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"龙兴寺","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"龙兴寺位于新绛县城内，始建于唐，原名\"碧落观\"，唐高宗改名\"龙兴寺\"。宋元明清各代屡有修葺。寺内现存主要建筑有大雄宝殿、碧落碑亭、东西配殿等。其中大雄宝殿为元代木构遗存，面阔七间，进深八椽，单檐悬山顶，柱头斗栱六铺作，梁架结构为四椽栿对前后乳栿通檐用四柱，是元代官式建筑中的重要实例。寺内存唐代\"碧落碑\"，碑文为李训撰、释\"黄仙鹤\"篆书，字体奇异，是研究唐代书法艺术和道教文化的重要文物。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"新绛三官庙","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"新绛三官庙位于新绛县城内三官庙街，是供奉三官大帝（天官、地官、水官）的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、三官殿、东西配殿等。其中三官殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"寿圣寺大殿","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"新绛寿圣寺大殿位于新绛县城西10公里寿圣寺内，是一座佛教寺院主殿。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，主要建筑有山门、天王殿、大雄宝殿（寿圣寺大殿）、东西配殿等。其中大雄宝殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型元代建筑风格。殿内存明代彩塑和壁画。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"新绛文庙","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"新绛文庙位于新绛县城内龙兴寺西侧，是祭祀孔子的庙宇。庙始建于明洪武年间（1368-1398年），明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、泮池、大成门、大成殿、崇圣祠等。其中大成殿为明代木构遗存，面阔七间，进深八椽，单檐悬山顶，前檐柱头斗栱五铺作双下昂。庙内保存有明代石刻\"孔子线刻像\"和清乾隆年间重修碑记。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"新绛玉皇庙","city":"运城市","county":"新绛县","lat":35.62,"lng":111.22,"desc":"新绛玉皇庙位于新绛县城内玉皇街，是供奉玉皇大帝的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、玉皇殿、东西配殿等。其中玉皇殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"州属衙大堂","city":"运城市","county":"新绛县","lat":35.61,"lng":111.23,"desc":"新绛州属衙大堂位于新绛县城内西北隅，是元明清时期绛州直隶州的官署衙署建筑。衙署始建于元代，明清两代多次修葺。现存大堂为清代建筑，面阔五间，进深八椽，前檐插廊，单檐悬山顶，结构严谨。大堂内设公案、座椅、仪仗执事，是清代州府官署衙门的典型布局。州署内保存有\"绛州正堂\"清代石额一方，历代州志档案若干，对研究清代地方州府衙署建制具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"普救寺塔","city":"运城市","county":"永济市","lat":34.81,"lng":110.29,"desc":"普救寺位于永济市蒲州镇峨嵋塬下，是元代王实甫《西厢记》故事的发生地，被誉为「爱情圣地」。寺始建于唐武则天时期（685年），后历代均有修葺，明嘉靖四十三年（1564年）地震后重建于今址。寺坐北朝南，主要建筑有大钟楼、塔院、回廊、厢房、佛堂、菩萨洞等。其标志性建筑为舍利塔，俗称「莺莺塔」，始建于唐，明嘉靖年间毁后重建为砖塔，平面方形十三层，高约36米，因《西厢记》中张生与崔莺莺的爱情故事而得名。莺莺塔具有\"回音\"奇效，是中国四大回音建筑之一。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"栖岩寺塔群","city":"运城市","county":"永济市","lat":35.1,"lng":110.5,"desc":"永济栖岩寺塔群位于永济市韩阳镇祁家坡村栖岩寺遗址，是一处佛教古塔群。寺始建于北魏，北周、隋唐各代多次扩建，宋元明清各代均有修葺。寺毁于1920年地震，现仅存古塔群。塔群共有26座砖塔，是现存规模较大的唐代古塔群。其中著名的有唐大中八年（854年）建造的圆形砖塔、宋代方形砖塔等，塔身高低错落，造型各异。塔群对研究山西唐代塔院布局和砖塔建筑演变具有重要价值。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"万固寺","city":"运城市","county":"永济市","lat":34.86,"lng":110.39,"desc":"万固寺位于永济市蒲州镇东南的雷首山腰，始建于北魏，名「延祚寺」，唐大中元年（847年）改名「万固寺」。现存主要建筑有无梁殿、药师洞、塔院等。无梁殿为明代砖砌仿木建筑，因全用青砖砌筑而无梁柱而得名，是万固寺的标志性建筑。药师洞依山就势，凿岩而成，洞内供药师佛及胁侍。塔院中现存唐代宝塔一座，明代砖塔数座，塔身呈方形或六角形，是研究山西佛教寺院选址、布局与塔院规制的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"二郎庙（垣曲）","city":"运城市","county":"垣曲县","lat":35.3,"lng":111.67,"desc":"垣曲二郎庙位于垣曲县新城二郎庙村，是供奉二郎神的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"垣曲泰山庙","city":"运城市","county":"垣曲县","lat":35.29,"lng":111.66,"desc":"垣曲泰山庙位于垣曲县城内，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"垣曲永兴寺","city":"运城市","county":"垣曲县","lat":35.3,"lng":111.67,"desc":"垣曲永兴寺位于垣曲县新城永兴寺村，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"垣曲玉皇庙","city":"运城市","county":"垣曲县","lat":35.29,"lng":111.66,"desc":"垣曲玉皇庙位于垣曲县城内玉皇街，是供奉玉皇大帝的道教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、玉皇殿、东西配殿等。其中玉皇殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
