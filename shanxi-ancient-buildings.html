{"name":"朝阳宫","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同朝阳宫位于大同市城区朝阳宫街，是供奉道教太上老君李耳的道教官观。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"纯阳宫（大同）","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.3,"desc":"纯阳宫（大同）位于大同市城区鼓楼西街，是供奉道教「八仙」之一吕洞宾的道教官观。宫始建于明万历年间（1573-1620年），清代多次修葺。宫内现存主要建筑有山门、吕祖殿、东西配殿等。其中吕祖殿为清代木构，面阔三间，进深四椽，硬山顶。宫内保存有明清彩塑和壁画。宫前有「五龙壁」一座，为清代遗物。大同纯阳宫与太原纯阳宫同属吕洞宾信仰的实物，与太原纯阳宫在道教文化研究上具有同等的价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大十字街五龙壁","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同大十字街五龙壁位于大同市城区大十字街，建于明万历年间（1573-1620年），是大同城内著名的明代琉璃照壁。照壁高约8米，长约15米，全部由琉璃构件拼合而成，正面浮雕「五龙喷水」图案，五条巨龙蜿蜒盘旋、形态生动，气势宏大、雕饰精美，是大同古城内规模最大的琉璃照壁。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"法华寺塔","city":"大同市","county":"城区及近郊区","lat":40.1,"lng":113.3,"desc":"法华寺塔位于大同市城区南寺街，因原属法华寺而得名。塔始建于元末明初，明清两代多次修葺。塔为四角七层密檐式砖塔，高约18米，由塔基、塔身、塔檐、塔刹四部分组成。塔基为方形石砌须弥座；塔身四面辟假门或装饰性假窗；各层塔檐为砖雕仿木构斗栱。塔的造型古朴端庄，是大同地区明代砖塔建筑的代表之一。寺内存元代、明代彩塑和壁画。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同古城墙","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同古城墙是大同府的明城墙。明洪武五年（1372年）大将军徐达奉命在北魏平城、辽金元西京大同土城基础上修筑，奠定了大同古城的基本格局。明永乐年间（1403-1424年）加固砖包，城高约14米，周长约7.2公里，开东和阳门、南永泰门、西清远门、北武定门四座城门。城四角建角楼、四门设城楼，全城共有马面、敌楼、窝铺等防御设施。城墙外有护城河，是明代大同府城防御体系的代表。2014年列入第一批国家级重点文物保护单位（合并\"大同城墙与代王府\"）。","era":"明清","level":"省保"},
{"name":"大同鼓楼","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同鼓楼位于大同市城区永泰街，建于明永乐二十二年（1424年），清光绪年间及现代多次修葺。楼为古代报时建筑，台基为砖砌十字券洞式结构，下设东南西北四个券洞门。楼身面阔进深各三间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰。楼内现设有展览，对外开放。鼓楼是大同古城的标志性建筑，也是明清大同府城的中心。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"关帝庙大殿（大同）","city":"大同市","county":"城区及近郊区","lat":40.1,"lng":113.3,"desc":"大同关帝庙大殿位于大同市城区大北街，是祭祀关羽的庙宇。庙始建于元代，明清两代多次修葺，清雍正、光绪年间重建。庙坐北朝南，主要建筑有琉璃照壁、龙壁、山门、仪门、崇宁殿（关帝殿）、春秋楼等。其中崇宁殿为清代木构，面阔五间，进深八椽，前檐柱头斗栱五铺作双下昂。关帝庙前有著名的大同城九龙壁式砖雕照壁，气势宏大。庙内存明、清碑碣数十通，是研究晋北关帝信仰的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同观音堂","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.3,"desc":"大同观音堂位于大同市城区南郊，建于明万历八年（1580年），因寺内有明代彩塑三大士像（观音、文殊、普贤）而得名。堂坐北朝南，主要建筑有天王殿、三大士殿、观音殿、戏台等。三大士殿为明代木构遗存，面阔三间，进深四椽，前檐斗栱五铺作，内有明代「三大士」彩塑。殿内还保存有500余尊明代悬塑精品和7尊明代金代石雕佛像，「五龙喷水」藻井雕刻精美。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同开化寺","city":"大同市","county":"城区及近郊区","lat":40.1,"lng":113.3,"desc":"大同开化寺位于大同市城区开化寺街，是一座佛教寺院。寺始建于北魏孝文帝时期（471-499年），元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同清真大寺","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同清真大寺位于大同市城区大西街，是大同市规模最大的伊斯兰教寺院。寺始建于唐贞观年间（627-649年），元明清各代多次修葺。寺坐西朝东，主要建筑有大殿、过殿、望月楼、沐浴室等。其中望月楼为元代木构遗存，平面六角形，二层单檐攒尖顶，结构精巧。大殿为明代木构，面阔五间，进深四椽，单檐歇山顶，前檐柱头斗栱五铺作。殿内可容纳500人同时礼拜。寺内存明清碑碣、阿文匾额等文物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同文庙","city":"大同市","county":"城区及近郊区","lat":40.1,"lng":113.3,"desc":"大同文庙位于大同市城区东南隅，始建于明洪武二十九年（1396年），明代多次修葺，2008年大规模重修。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为明代木构遗存，面阔七间，进深十椽，单檐歇山顶，前檐柱头斗栱五铺作双下昂，是山西现存规模最大的明代文庙大成殿之一。庙前有「泮池」「大成门」「乡贤祠」「名宦祠」等附属建筑。庙内存明清碑碣数通。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同兴国寺","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同兴国寺位于大同市城区南寺街附近。寺始建于唐贞观年间（627-649年），元末毁于兵火，明洪武年间重建，清代多次修葺。寺坐北朝南，主要建筑有山门、天王殿、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺前有\"代王府照壁\"（俗称\"九龙壁\"），是大同城内著名的明代琉璃照壁，气势宏大、雕饰精美。寺内存明清彩塑和历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大同玄真观","city":"大同市","county":"城区及近郊区","lat":40.1,"lng":113.3,"desc":"大同玄真观位于大同市城区玄真观街，是供奉道教玉皇大帝的道教官观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。观内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"北宋庄龙母庙","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同北宋庄龙母庙位于大同市南郊区北宋庄村，是当地民间信仰庙宇，因供奉「龙母娘娘」而得名。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"辛寨龙王庙","city":"大同市","county":"城区及近郊区","lat":40.09,"lng":113.29,"desc":"大同辛寨龙王庙位于大同市南郊区辛寨村，是当地民间信仰庙宇，因供奉「龙王」而得名。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"赵彦庄龙王庙","city":"大同市","county":"城区及近郊区","lat":40.1,"lng":113.3,"desc":"大同赵彦庄龙王庙位于大同市南郊区赵彦庄村，是当地民间信仰庙宇，因供奉「龙王」而得名。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"安坚寺","city":"大同市","county":"广灵县","lat":39.74,"lng":114.01,"desc":"广灵安坚寺位于广灵县城南15公里安坚村，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"水神堂","city":"大同市","county":"广灵县","lat":39.75,"lng":114.02,"desc":"水神堂位于广灵县城东南壶山腰，是兼具佛、道两教特色的宗教建筑，因寺旁泉水而得名。堂始建于明嘉靖年间（1522-1566年），清代多次修葺。堂依山而建，主要建筑有圣母殿、龙王殿、灵应侯祠、丰水塔等。圣母殿为明代木构，面阔五间，进深六椽。寺前有丰水塔，为八角十三层密檐式砖塔，高约30米，是水神堂的标志性建筑。寺内存明代壁画约80平方米，水神堂集山寺、泉水、砖塔为一体，是晋北地区明清民间宗教建筑的代表。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"西蕉山古建筑群","city":"大同市","county":"广灵县","lat":39.74,"lng":114.01,"desc":"广灵西蕉山古建筑群位于广灵县城西北15公里西蕉山，是明清时期山地佛寺建筑群。寺始建于唐代，元明清各代多次修葺。寺依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"殷家庄古民居","city":"大同市","county":"广灵县","lat":39.75,"lng":114.02,"desc":"广灵殷家庄古民居位于广灵县城东南10公里殷家庄村，是明清时期晋北地区典型的民居建筑群。明嘉靖年间（1522-1566年）始建，清代多次扩建。村落现存明清两代院落约20座，房屋百余间，建筑多为砖木结构，硬山顶砖瓦房，体现了晋北明清民居建筑的典型风格。民居建筑规模较大，砖雕、木雕、石雕装饰精美，是研究晋北地区明清民居建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"翟疃三身寺","city":"大同市","county":"广灵县","lat":39.74,"lng":114.01,"desc":"广灵翟疃三身寺位于广灵县城西10公里翟疃村，是供奉佛教「三身佛」（法身、报身、应身）的佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"恒山建筑群","city":"大同市","county":"浑源县","lat":39.66,"lng":113.7,"desc":"恒山建筑群位于浑源县城南4公里恒山主峰天峰岭与翠屏峰之间，是中国五岳之北岳——恒山的道教建筑群。恒山建筑始建于北魏太和年间（477-499年），历代均有修葺，唐代以\"玄武大帝道场\"而著称，明清两代规模最大。建筑群包括北岳庙、悬空寺、恒山庙、恒宗殿、会仙府、白云洞等20多处寺庙宫观，分布于恒山各峰峦之间，绵延十余公里。其中\"恒宗\"\"北岳\"\"悬空寺\"等建筑各具特色，是中国现存规模最大、保存最完整的古代山岳祭祀建筑群之一。1982年列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"荆庄大云寺","city":"大同市","county":"浑源县","lat":39.67,"lng":113.71,"desc":"浑源荆庄大云寺位于浑源县城西10公里荆庄村，原名\"大云禅寺\"，始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"律吕神祠","city":"大同市","county":"浑源县","lat":39.66,"lng":113.7,"desc":"浑源律吕神祠位于浑源县城西北10公里律吕村，是当地民间信仰庙宇，因传说尧帝时代「律吕」在此奏乐而得名。祠始建于元代，明清两代多次修葺。祠坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。祠内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"麻家大院","city":"大同市","county":"浑源县","lat":39.67,"lng":113.71,"desc":"浑源麻家大院位于浑源县城内麻家大院街，是清代晋北富商麻氏家族的民居建筑群。大院始建于清乾隆年间（1736-1795年），嘉庆、道光年间多次扩建。大院坐北朝南，前后三进院落，主要建筑有大门、过厅、正房、东西厢房等。大院建筑规模较大，砖雕、木雕、石雕装饰精美，是清代晋北民居建筑的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"浑源文庙","city":"大同市","county":"浑源县","lat":39.66,"lng":113.7,"desc":"浑源文庙位于浑源县城内东南隅，是祭祀孔子的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"圆觉寺砖塔","city":"大同市","county":"浑源县","lat":39.66,"lng":113.7,"desc":"圆觉寺砖塔位于浑源县城内，建于金正隆六年（1161年），是金代密檐式砖塔的杰出代表。塔为八角九层密檐式砖塔，高约30米。塔基为方形须弥座，束腰部分雕有精细的砖刻纹饰；塔身正面辟门，门旁雕金刚像；一层塔檐装饰砖雕仿木构斗栱，以上各层塔檐逐渐收缩，塔身轮廓挺拔秀丽。塔刹为铁制，由覆钵、相轮、宝瓶组成。塔内存有金代石刻经文。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永安寺（浑源）","city":"大同市","county":"浑源县","lat":39.67,"lng":113.71,"desc":"永安寺位于浑源县城内鼓楼北巷，始建于金代，元明清各代多次修葺。寺坐北朝南，主要建筑有山门、东西配殿、传法正宗殿、东西配殿等。其中传法正宗殿为元代木构遗存，面阔五间，进深四椽，单檐庑殿顶，前檐柱头斗栱六铺作单抄双下昂，殿内梁架为彻上露明造，结构宏大。殿内四壁保存有明代壁画约170平方米，绘「十方法界图」「三世佛说法图」及道教题材「八仙过海」等内容，是明代壁画的杰出作品。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永兴北岳行宫","city":"大同市","county":"浑源县","lat":39.66,"lng":113.7,"desc":"浑源永兴北岳行宫位于浑源县城南恒山主峰天峰岭山腰，因供奉北岳大帝而得名\"北岳行宫\"。宫始建于北魏太和年间（477-499年），明清两代多次修葺。宫坐北朝南，依山而建，主要建筑有山门、过殿、正殿、东西配殿等。其中正殿为明代木构遗存。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"觉山寺砖塔","city":"大同市","county":"灵丘县","lat":39.43,"lng":114.23,"desc":"觉山寺砖塔位于灵丘县城东南15公里觉山寺内，是一座辽代密檐式砖塔。塔始建于北魏孝文帝时期（471-499年），现存砖塔为辽代重修遗物。塔为八角十三层密檐式砖塔，高约44米，是山西现存最高大的辽代砖塔。塔基为砖砌须弥座，束腰部分雕有精美的花卉、瑞兽、歌舞伎等图案；塔身四面辟有门，雕饰佛像；塔檐为砖雕仿木构斗栱，层层上收。塔的造型繁复华丽，是辽代砖塔建筑的杰出代表。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"慈云寺","city":"大同市","county":"天镇县","lat":40.42,"lng":114.09,"desc":"慈云寺位于天镇县城内西街，始建于唐贞观年间，明宣德、嘉靖年间大规模重修，清代续修。寺坐北朝南，原有规模较大，中轴线建有山门、钟鼓楼、天王殿、大雄宝殿、毗卢殿、藏经阁等。现存毗卢殿（大雄宝殿）为明代木构遗存，面阔五间，进深八椽，单檐庑殿顶，前檐柱头斗栱五铺作。殿内塑像众多，是天镇县保存最完整的古代佛教建筑。寺内存明清壁画、彩塑与碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"新平玉皇阁","city":"大同市","county":"天镇县","lat":40.41,"lng":114.1,"desc":"天镇新平玉皇阁位于天镇县新平村，是供奉道教玉皇大帝的道教建筑。阁始建于元代，明清两代多次修葺。阁坐北朝南，主要建筑有山门、过殿、玉皇阁、东西配殿等。其中玉皇阁为明代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。阁内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"杨塔村砖塔","city":"大同市","county":"阳高县","lat":40.37,"lng":113.74,"desc":"阳高杨塔村砖塔位于阳高县杨塔村，原为杨塔村古寺遗物。塔始建于辽代，明清两代多次修葺。塔为八角九层密檐式砖塔，高约20米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"阳高云林寺","city":"大同市","county":"阳高县","lat":40.36,"lng":113.74,"desc":"阳高云林寺位于阳高县城内西街，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
/* ── 晋中市 ── */
{"name":"蒲池寿圣寺","city":"晋中市","county":"城区及近郊区","lat":37.69,"lng":112.78,"desc":"晋中蒲池寿圣寺位于晋中市城区北部蒲池村，始建于金大定年间（1161-1189年），明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，是金代晋中地区小型佛寺建筑的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"宣乘寺","city":"晋中市","county":"城区及近郊区","lat":37.69,"lng":112.79,"desc":"晋中宣乘寺位于晋中市城区北部宣乘村，始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清彩塑、壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"榆次城隍庙","city":"晋中市","county":"城区及近郊区","lat":37.69,"lng":112.78,"desc":"榆次城隍庙位于榆次老城东大街，是祀奉城隍神的庙宇。庙始建于元代，明洪武三年（1370年）重修，明清两代屡有修葺。庙坐北朝南，前后三进院落，中轴线建有山门、戏台、献亭、正殿、后殿、东西配殿等。其中献亭为明代建筑，平面方形，单檐歇山顶，结构精巧；正殿为明代木构，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清碑碣、壁画及城隍出巡仪仗，是研究晋中地区城隍信仰与庙宇建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永康东岳庙","city":"晋中市","county":"城区及近郊区","lat":37.69,"lng":112.79,"desc":"榆次永康东岳庙位于榆次区乌金山镇永康村，是供奉东岳大帝的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱四铺作单抄单下昂，殿内梁架为彻上露明造。庙内存明清壁画约50平方米和历代碑碣数通，是晋中地区元代民间信仰建筑的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"荣华寺","city":"晋中市","county":"和顺县","lat":37.33,"lng":113.57,"desc":"和顺荣华寺位于和顺县城北15公里横道村荣华山麓，始建于唐贞元年间（785-805年），元明清各代多次修葺。寺依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"和顺石牌坊","city":"晋中市","county":"和顺县","lat":37.34,"lng":113.57,"desc":"和顺石牌坊位于和顺县城东大街，建于明万历年间（1573-1620年），是明代晋商家族为纪念科举功名而建的石牌坊。牌坊为四柱三门五楼式，全部由青石雕砌，结构精巧。牌坊四面刻有「龙凤呈祥」「八仙过海」「二十四孝」「花卉瑞兽」等图案，雕工精细，形象生动，是明代石雕艺术的代表作。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"懿济圣母庙","city":"晋中市","county":"和顺县","lat":37.33,"lng":113.58,"desc":"和顺懿济圣母庙位于和顺县城西5公里义兴镇，为民间信仰庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内保存有金代塑像、明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"回銮寺","city":"晋中市","county":"介休市","lat":37.03,"lng":111.92,"desc":"回銮寺位于介休市西南20公里绵山镇兴地村狐岐山麓，始建于唐宪宗元和年间（805-820年），原名「兴国寺」。传说唐太宗李世民在绵山介子推庙祭奠时，曾「回銮」（车驾返回）至此，因此得名「回銮寺」。寺内主要建筑有大雄宝殿、地藏殿、十王殿等。元代重建后，明清两代屡有修葺。大雄宝殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，柱头斗栱五铺作单抄单下昂，是研究晋中地区元代佛寺建筑的重要实物。寺内存明清壁画和历代碑碣。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"介休城隍庙","city":"晋中市","county":"介休市","lat":37.03,"lng":111.91,"desc":"介休城隍庙位于介休市城内东大街，是祀奉城隍神的庙宇。庙始建于明洪武三年（1370年），历代屡有修葺，清雍正、道光年间大规模重修。庙坐北朝南，中轴线建有照壁、山门、戏台、献亭、正殿、后殿、东西配殿等。其中正殿（城隍殿）为清雍正年间重修，面阔五间，进深八椽，前檐插廊，单檐悬山顶。庙内悬山式戏台和卷棚式献亭结构精巧。庙内保存有明代\"城隍庙\"石额及清代重修碑记，是研究晋中地区明清城隍信仰与庙宇建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"介休东岳庙","city":"晋中市","county":"介休市","lat":37.03,"lng":111.92,"desc":"介休东岳庙位于介休市西南15公里石屯村东岳庙岭上，是供奉东岳大帝的庙宇。庙始建于北宋，元明清各代屡有修葺。庙坐北朝南，前有石阶108级，沿山势而建，主要建筑有山门、戏台、献亭、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造。庙内存元代及明清壁画约150平方米，绘\"东岳大帝出巡\"\"地狱\"等题材，对研究元代山西民间信仰和道教建筑具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后土祠（介休）","city":"晋中市","county":"介休市","lat":37.03,"lng":111.91,"desc":"介休后土祠位于介休市西南绵山脚下庙底村，是祀奉\"后土皇地祇\"的庙宇。庙始建年代不详，明嘉靖年间（1522-1566年）重建于今址。庙宇坐北朝南，主要建筑有戏台、献殿、正殿、东西配殿等。其中正殿为明代木构，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作，殿内梁架为彻上露明造。庙内保存有明代壁画约60平方米，绘\"后土娘娘\"出行图及山水花鸟等内容。庙前有石狮一对，明代石碑数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五岳庙（介休）","city":"晋中市","county":"介休市","lat":37.03,"lng":111.92,"desc":"介休五岳庙位于介休市城内西南街，是供奉五岳大帝的庙宇。庙始建年代不详，明嘉靖年间（1522-1566年）重建于今址，清代续修。庙坐北朝南，中轴线上建有山门、戏台、献亭、正殿、东西配殿等。其中正殿为明代木构，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。殿内梁架为彻上露明造，结构严谨。庙内保存有明代壁画约80平方米，绘「五岳大帝」出行图及山水花鸟等内容，是研究晋中地区五岳信仰与道教建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"源神庙","city":"晋中市","county":"介休市","lat":37.03,"lng":111.91,"desc":"介休源神庙位于介休市洪山镇洪山村，是当地百姓为纪念水利先贤\"源神\"而修建的庙宇。庙始建年代不详，明嘉靖二十七年（1548年）重建，清代续修。庙坐北朝南，中轴线上建有山门、戏台、献殿、正殿、东西配殿等。其中正殿为明代木构，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内有清代碑刻\"源神庙水利碑\"，详细记载了介休水利发展史。庙前有石狮一对、明代石旗杆二根，寺内存明代壁画约30平方米。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太和岩牌楼","city":"晋中市","county":"介休市","lat":37.03,"lng":111.92,"desc":"太和岩牌楼位于介休市西南15公里西段屯村东太和岩堡北出口，是介休市最具代表性的石雕建筑之一。牌楼始建于清光绪二十三年（1897年），由当地富商王钺出资建造。牌楼为青石雕砌，四柱三门三楼，结构精巧，气势宏伟。牌楼四面刻有浮雕，包括龙凤、八仙、二十四孝、狮象、花卉、瑞兽等图案，雕工精细，形象生动，为清代石雕艺术的杰出代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"云峰寺石佛殿","city":"晋中市","county":"介休市","lat":37.03,"lng":111.91,"desc":"介休云峰寺石佛殿位于介休市西南10公里马鞍桥村云峰山腰，是因山势似「卧佛」而得名「卧佛寺」或「云峰寺」。寺始建于唐，明清两代多次修葺。寺内主要建筑有石佛殿、地藏殿、伽蓝殿等。其中石佛殿为元代木构遗存，面阔三间，进深四椽，单檐歇山顶，前檐柱头斗栱四铺作单抄单下昂。殿内供奉元代石雕佛像三尊（中为释迦牟尼，左为药师佛，右为弥陀佛），高约1.5米。寺前有「龛云一线」石壁景观。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"晋祠庙","city":"晋中市","county":"灵石县","lat":36.85,"lng":111.79,"desc":"灵石晋祠庙位于灵石县城东10公里静升镇旌介村，是祭祀西周晋国始祖唐叔虞的祠庙。庙始建年代不详，明嘉靖年间重建于今址，清代续修。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为明代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清碑碣数通和历代重修碑记。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"静升文庙","city":"晋中市","county":"灵石县","lat":36.86,"lng":111.78,"desc":"灵石静升文庙位于灵石县城东10公里静升镇静升村，是明清时期灵石县规模最大的祭祀孔子的庙宇。庙始建于明嘉靖年间（1522-1566年），清乾隆、道光年间多次修葺。庙坐北朝南，中轴线建有棂星门、泮池、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为清代建筑。庙内存明清碑碣数通。「静升文庙」与静升镇王家大院、夏门古堡等共同构成灵石县明清文化建筑群。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"灵石后土庙","city":"晋中市","county":"灵石县","lat":36.85,"lng":111.79,"desc":"灵石后土庙位于灵石县城西10公里静升镇社台村，是祭祀后土皇地祇的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，前后两进院落，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型元代建筑风格。庙内存明清壁画和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"夏门古堡","city":"晋中市","county":"灵石县","lat":36.85,"lng":111.79,"desc":"夏门古堡位于灵石县城西10公里夏门镇，是一处明清时期的晋中地区城堡式民居建筑群。明嘉靖年间（1522-1566年）始建堡墙，因堡前汾河夏涨水浸，故名\"夏门\"。古堡依山傍水而建，占地约2万平方米，由堡墙、堡门、街道、民居、庙宇、商铺等组成。现存明清两代院落约50座，房屋数百间，建筑多为砖木结构，硬山顶砖瓦房，体现了晋中地区明清民居建筑的典型风格。古堡的堡门、堡墙保存完整，是研究明清晋商聚落形态与防御建筑的实物。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"资寿寺","city":"晋中市","county":"灵石县","lat":36.86,"lng":111.78,"desc":"资寿寺位于灵石县城东10公里静升镇苏溪村，始建于唐咸通十一年（870年），历代屡有修葺。寺名「资寿」取「资给于民、增寿于民」之意。寺内现存建筑以明代为主，沿中轴线依次有天王殿、大雄宝殿、药师殿、弥陀殿等。其中大雄宝殿为明代木构遗存，面阔三间，进深六椽，单檐悬山顶，柱头斗栱五铺作双抄单下昂。寺内保存有明代彩塑近百尊，是晋中地区明代彩塑艺术的杰出代表。其中「十八罗汉」造型生动、神态各异，被誉为「中国明代彩塑艺术的上乘之作」。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"北常普音寺","city":"晋中市","county":"平遥县","lat":37.21,"lng":112.15,"desc":"平遥北常普音寺位于平遥县香乐乡北常村普音寺，始建于北齐天保年间（550-559年），元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。寺内存元明清塑像、壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"北依涧永福寺过殿","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"平遥北依涧永福寺过殿位于平遥县襄垣乡北依涧村永福寺内，因寺旁山泉终年不涸而得名「永福寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，原规模较大，现仅存过殿。过殿为元代木构遗存，面阔三间，进深四椽，单檐悬山顶，前檐柱头斗栱四铺作单抄单下昂，是元代晋中地区佛寺过殿建筑的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"长则普明寺","city":"晋中市","county":"平遥县","lat":37.21,"lng":112.15,"desc":"平遥长则普明寺位于平遥县孟山乡长则村普明寺，始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"慈相寺","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"慈相寺位于平遥县城东北15公里冀郭村，始建于唐贞观年间，原名\"圣俱寺\"，宋庆历年间改今名\"慈相寺\"，历代均有修葺。寺坐北朝南，主要建筑有山门、钟鼓楼、过殿、大雄宝殿等。其中大雄宝殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，梁架结构规整严谨，是金代晋中地区佛寺建筑的代表作品。寺内保存有金代塑像和明清壁画，对研究金代佛教建筑与艺术演变具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"干坑南神庙","city":"晋中市","county":"平遥县","lat":37.21,"lng":112.15,"desc":"平遥干坑南神庙位于平遥县段村镇干坑村，是当地民间信仰庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约40平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"惠济桥","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"惠济桥位于平遥县城东南6公里桥头村惠济河上，是一座九孔石拱桥。桥始建于清康熙三十七年（1698年），嘉庆、道光年间续修。桥全长约80米，宽约8米，由青石砌筑，九孔联拱，桥面铺石，两侧设石栏杆，栏板上雕刻有花卉、瑞兽等图案。桥头建有石狮一对、石碑数通，记载了建桥历史。桥两端各有一座石牌坊，造型古朴庄重。惠济桥是清代晋中地区规模较大的石拱桥之一，对研究清代桥梁建筑工艺有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"金庄文庙","city":"晋中市","county":"平遥县","lat":37.21,"lng":112.15,"desc":"平遥金庄文庙位于平遥县卜宜乡金庄村，是金庄及周边地区祭祀孔子的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、东西配殿等。其中大成殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存元明清碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"梁家滩白云寺","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"平遥梁家滩白云寺位于平遥县朱坑乡梁家滩村白云山麓，因山顶常年白云缭绕而得名「白云寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存。寺内存明清彩塑、壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"利应侯庙","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"平遥利应侯庙位于平遥县襄垣乡利应侯村，是当地为祭祀\"利应侯\"（宋金时期民间水神）而修建的庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"南政隆福寺","city":"晋中市","county":"平遥县","lat":37.21,"lng":112.15,"desc":"平遥南政隆福寺位于平遥县南政乡南政村隆福寺，始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。寺内存明清彩塑和壁画。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清凉寺（平遥）","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"平遥清凉寺位于平遥县岳壁乡清凉寺村，因寺周环境清幽得名「清凉寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清虚观","city":"晋中市","county":"平遥县","lat":37.21,"lng":112.15,"desc":"清虚观位于平遥县城内东大街，是一座历史悠久、规模宏大的道教宫观，与平遥城墙、双林寺、镇国寺并称为\"平遥四宝\"。观始建于唐显庆二年（657年），明弘治年间（1488-1505年）重修，清代续修。观坐北朝南，前后三进院落，主要建筑有牌楼、山门、龙虎殿、纯阳宫、三清殿、玉皇阁等。其中龙虎殿、三清殿为明代遗构，纯阳宫、玉皇阁为清代建筑。观内保存有明代彩塑和清代壁画，碑刻众多，是研究中国道教文化和晋中地区明清道教建筑的实物。1982年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"襄垣慈胜寺","city":"晋中市","county":"平遥县","lat":37.22,"lng":112.16,"desc":"平遥襄垣慈胜寺位于平遥县襄垣乡襄垣村慈胜寺，始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。寺内存明清彩塑、壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"聚全堂药铺旧址","city":"晋中市","county":"祁县","lat":37.36,"lng":112.43,"desc":"祁县聚全堂药铺旧址位于祁县城内东大街，是清代祁县中药老字号「聚全堂」的店铺旧址。药铺始建于清嘉庆年间（1796-1820年），由当地名医王聚全创办，是清代晋商中药材经营的代表性店铺。药铺现存建筑为清代遗物，前为店铺（三间），后为库房、制药间、账房等。店内悬匾「聚全堂」三字，是研究清代晋商医药业和地方商业史的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"梁村洪福寺","city":"晋中市","county":"祁县","lat":37.35,"lng":112.42,"desc":"祁县梁村洪福寺位于祁县古县镇梁村洪福寺，始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清彩塑和壁画。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"祁县文庙","city":"晋中市","county":"祁县","lat":37.36,"lng":112.43,"desc":"祁县文庙位于祁县城内东南隅，始建于金大定年间（1161-1189年），元明清各代多次修葺。庙坐北朝南，中轴线建有棂星门、大成门、大成殿、明伦堂、尊经阁、崇圣祠等。其中大成殿为元代木构遗存，面阔七间，进深八椽，单檐悬山顶，前檐柱头斗栱五铺作双下昂，殿内梁架为彻上露明造，是晋中地区规模较大的元代文庙建筑。庙内存金、元、明、清各代碑碣20余通，对研究晋中地区文庙建筑演变与儒学教育史具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"兴梵寺","city":"晋中市","county":"祁县","lat":37.35,"lng":112.42,"desc":"祁县兴梵寺位于祁县城东南20公里峪口乡，始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"镇河楼","city":"晋中市","county":"祁县","lat":37.36,"lng":112.43,"desc":"镇河楼位于祁县城东南10公里子洪口村昌源河畔，因传说能镇住洪水、保护县城而得名「镇河楼」。楼始建于明嘉靖二十四年（1545年），清代屡有修葺。楼为单檐歇山顶楼阁式建筑，台基为方形石砌券洞式结构，下部设拱洞门可通行。楼身面阔三间，进深二间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰。楼内供真武大帝铜像一尊，是晋中地区明代镇水信仰建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"段王村罗汉寺","city":"晋中市","county":"寿阳县","lat":37.89,"lng":113.18,"desc":"寿阳段王村罗汉寺位于寿阳县段王村，始建于唐代，明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代建筑。寺内原供五百罗汉塑像（已部分损毁），其中「十八罗汉」为明代彩塑的代表作。寺前有石狮一对，明清碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"普光寺（寿阳）","city":"晋中市","county":"寿阳县","lat":37.9,"lng":113.19,"desc":"寿阳普光寺位于寿阳县城东5公里平头镇，始建于北魏太和年间（477-499年），唐宋元明清各代均有修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存北魏至唐石雕造像数尊、明清壁画约80平方米。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"平舒崇福寺","city":"晋中市","county":"寿阳县","lat":37.89,"lng":113.18,"desc":"寿阳平舒崇福寺位于寿阳县平舒村，始建于唐代，明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，是金代晋中地区小型佛寺建筑的代表。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"孟家沟龙泉寺","city":"晋中市","county":"寿阳县","lat":37.9,"lng":113.19,"desc":"寿阳孟家沟龙泉寺位于寿阳县孟家沟村龙泉山麓，因寺旁泉水而得名「龙泉寺」。寺始建于唐代，明清两代多次修葺。寺依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。寺内保存有明代壁画约40平方米。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"寿阳福田寺","city":"晋中市","county":"寿阳县","lat":37.89,"lng":113.18,"desc":"寿阳福田寺位于寿阳县城东平舒村福田寺山，始建于唐开元年间（713-741年），历代均有修葺。寺内主要建筑有山门、大雄宝殿、东西配殿等。其中大雄宝殿为清代建筑。寺内现存明清碑碣数通，记载了自唐至清的修缮历史。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"寿阳松罗院","city":"晋中市","county":"寿阳县","lat":37.9,"lng":113.19,"desc":"寿阳松罗院位于寿阳县松罗山上，始建于唐代，明清两代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。寺前有松树成林，环境清幽，故名\"松罗院\"。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"安禅寺","city":"晋中市","county":"太谷县","lat":37.42,"lng":112.55,"desc":"安禅寺位于太谷县城内西街，始建于唐贞元年间（785-805年），宋元明清各代均有修葺。寺内现存主要建筑为大雄宝殿和西配殿。其中大雄宝殿为宋代木构遗存，面阔三间，进深四椽，单檐歇山顶，举折平缓，出檐深远，是晋中地区罕见的宋代建筑实例。殿内存宋代塑像和明代壁画，是研究唐宋时期晋中地区佛教建筑的重要实物。安禅寺历经千年沧桑，至今仍保存着重要的早期木构遗存，具有很高的文物价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"法安寺","city":"晋中市","county":"太谷县","lat":37.42,"lng":112.55,"desc":"太谷法安寺位于太谷县城内西南隅，始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"范村圆智寺","city":"晋中市","county":"太谷县","lat":37.43,"lng":112.56,"desc":"圆智寺位于太谷县城东北20公里范村镇范村，始建于金大定二十五年（1185年），明清两代多次修葺。寺坐北朝南，前后两进院落，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，梁架为彻上露明造，是金代晋中地区佛寺建筑的典型实例。寺内存历代碑碣数通，记载了金代建寺及明清重修史。圆智寺对研究金代佛教建筑风格在晋中地区的演变具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"光化寺","city":"晋中市","county":"太谷县","lat":37.42,"lng":112.55,"desc":"光化寺位于太谷县城东北15公里范村镇，始建于北齐天保年间（550-559年），唐贞观年间（627-649年）改名\"光化寺\"，历代均有修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为清代建筑，寺内存唐代八角形石经幢一座、北齐造像碑一通。寺内存历代碑碣20余通，记载了光化寺自北齐至明清的修缮史。光化寺对研究北齐至唐佛教建筑与晋中地区佛寺历史演变具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"净信寺","city":"晋中市","county":"太谷县","lat":37.43,"lng":112.56,"desc":"净信寺位于太谷县城东南10公里阳邑村，始建于唐开元年间（713-741年），历代均有修葺。寺坐北朝南，前后三进院落，中轴线上建有山门、天王殿、大雄宝殿、毗卢殿、东西配殿等。寺内存明清彩塑70余尊，其中明代十八罗汉、十二圆觉菩萨像造型生动、姿态传神，是明代彩塑艺术的杰出代表。寺内保存有明代壁画约200平方米，绘佛本生故事、菩萨、十大明王等内容，线条流畅、设色典雅。净信寺对研究晋中地区明清佛教建筑与彩塑、壁画艺术具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太谷鼓楼","city":"晋中市","county":"太谷县","lat":37.42,"lng":112.55,"desc":"太谷鼓楼位于太谷县城内老城十字街中心，是太谷古城的标志性建筑。明正德九年（1514年）初建，清代多次修葺。楼为重檐歇山顶楼阁式建筑，台基为方形砖砌券洞式结构，四面辟拱洞门，洞上建木构楼阁。楼身面阔进深各三间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰，雕梁画栋，气势宏伟。楼内立\"太谷县\"石碑一通。鼓楼是明清时期太谷县城的报时、警戒、观瞻建筑，是晋中地区保存较好的古代鼓楼之一。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"新村妙觉寺","city":"晋中市","county":"太谷县","lat":37.42,"lng":112.55,"desc":"太谷新村妙觉寺位于太谷县城西北10公里新村，始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"真圣寺","city":"晋中市","county":"太谷县","lat":37.43,"lng":112.56,"desc":"真圣寺位于太谷县城东北15公里小白乡东崖村，始建于金正隆年间（1156-1161年），明清两代多次修葺。寺坐北朝南，前后两进院落，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型金代建筑风格。寺内存金代塑像和明清壁画，对研究金代晋中地区佛教建筑演变具有重要价值。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"福严寺","city":"晋中市","county":"昔阳县","lat":37.61,"lng":113.71,"desc":"昔阳福严寺位于昔阳县城东15公里皋落镇福严村，始建于唐代，明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。寺内保存有明清彩塑和壁画。其中大雄宝殿为明代木构遗存，面阔三间，进深六椽。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"离相寺","city":"晋中市","county":"昔阳县","lat":37.6,"lng":113.72,"desc":"昔阳离相寺位于昔阳县城西20公里赵壁乡，始建于唐代，明清两代多次修葺。寺依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存，面阔三间，进深六椽。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"昔阳崇教寺","city":"晋中市","county":"昔阳县","lat":37.61,"lng":113.71,"desc":"昔阳崇教寺位于昔阳县城内北街，始建于唐贞观年间（627-649年），元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。寺内存金元至明清各代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"崇圣寺","city":"晋中市","county":"榆社县","lat":37.07,"lng":112.99,"desc":"榆社崇圣寺位于榆社县城西15公里河峪乡岩良村，始建于金大定年间（1161-1189年），明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作，殿内梁架为彻上露明造，是金代晋中地区小型佛寺建筑的代表。寺内存金代塑像和明清壁画，对研究金代佛教建筑在晋中地区的演变具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"福祥寺","city":"晋中市","county":"榆社县","lat":37.08,"lng":113,"desc":"榆社福祥寺位于榆社县城东南10公里社城镇福祥村，始建于北魏，唐宋元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"寺坪普照寺大殿","city":"晋中市","county":"左权县","lat":37.08,"lng":113.38,"desc":"左权寺坪普照寺大殿位于左权县城东南15公里寺坪村普照寺内，因寺向阳背山而得名「普照寺」。寺始建于北魏孝昌年间（525-527年），唐宋元明清各代多次修葺。寺坐北朝南，原规模较大，现仅存大殿。大殿为金代木构遗存，面阔三间，进深四椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，是金代晋中地区小型佛寺大殿的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"苇则寿圣寺","city":"晋中市","county":"左权县","lat":37.07,"lng":113.37,"desc":"左权苇则寿圣寺位于左权县石匣乡苇则村，始建于北齐天统年间（565-569年），唐宋元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清彩塑、壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"文庙大成殿","city":"晋中市","county":"左权县","lat":37.08,"lng":113.38,"desc":"左权文庙大成殿位于左权县（原辽县）城内东南隅，是祭祀孔子的庙宇大成殿。庙始建于金大定年间（1161-1189年），明清两代多次修葺。庙坐北朝南，原规模较大，现仅存大成殿。大成殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，是金代晋中地区文庙建筑的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
/* ── 吕梁市 ── */
{"name":"离石文庙","city":"吕梁市","county":"离石区","lat":37.52,"lng":111.15,"desc":"离石文庙位于离石区城内东南隅，是祭祀孔子的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"天贞观","city":"吕梁市","county":"离石区","lat":37.51,"lng":111.14,"desc":"离石天贞观位于离石区城内西街，是供奉道教\"全真道\"派始祖王重阳及其弟子的道教宫观。观始建于元代，明清两代多次修葺。观坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。观内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"方山鼓楼","city":"吕梁市","county":"方山县","lat":37.89,"lng":111.24,"desc":"方山鼓楼位于方山县城内十字街中心，明万历年间（1573-1620年）始建，清代多次修葺。楼为单体楼阁式建筑，台基为方形砖砌结构，四面辟拱洞门。楼身面阔进深各三间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰，雕梁画栋。楼内立\"方山县\"石碑一通。鼓楼是方山县古城的标志性建筑，也是古代报时、警戒之用。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"于成龙故居","city":"吕梁市","county":"方山县","lat":37.9,"lng":111.25,"desc":"于成龙故居位于方山县北武当镇于成龙村（北旺池村），是清代名臣于成龙（1617-1684）的祖居地。故居始建于清初，原规模较大，现存主要建筑有大门、东西厢房、正房等。故居内设于成龙生平展览，展示了于成龙\"清官第一\"\"天下第一廉吏\"的史料和文物。于成龙曾任罗城县令、黄州知州、武昌知府、福建按察使、直隶巡抚、两江总督等职，所到之处清廉自律、政绩卓著，是清代廉吏的杰出代表。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"于成龙墓地","city":"吕梁市","county":"方山县","lat":37.89,"lng":111.24,"desc":"于成龙墓地位于方山县北武当镇于成龙村（北旺池村），是清代名臣于成龙（1617-1684）的墓葬。墓园始建于清康熙二十三年（1684年），嘉庆、道光年间续修。墓园规模较大，坐北朝南，主要有石牌坊、墓道、墓冢、碑亭、石像生等。墓冢封土高约5米，周长约30米。墓前有康熙皇帝御赐\"御制碑\"，记载于成龙一生清廉节俭的功绩。于成龙墓地是研究清代廉吏文化和丧葬习俗的重要实物。2013年与于成龙故居合并列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"柏草坡龙天土地庙","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.78,"desc":"汾阳柏草坡龙天土地庙位于汾阳市柏草坡村，是供奉「土地神」「龙王」等民间信仰庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"堡城寺龙王庙","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.77,"desc":"汾阳堡城寺龙王庙位于汾阳市堡城寺村，是当地民间信仰庙宇，因供奉「龙王」而得名。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"汾阳报恩寺","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.78,"desc":"汾阳报恩寺位于汾阳市城内东街，原名\"报恩禅寺\"，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"禅定寺","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.77,"desc":"汾阳禅定寺位于汾阳市城区东南隅，是一座佛教禅宗寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"法云寺","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.78,"desc":"汾阳法云寺位于汾阳市城区西郊，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"汾阳关帝庙","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.77,"desc":"汾阳关帝庙位于汾阳市城区西街，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后土圣母庙（汾阳）","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.78,"desc":"汾阳后土圣母庙位于汾阳市杏花村镇，是当地民间信仰\"后土圣母\"的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"汾阳铭义中学","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.77,"desc":"汾阳铭义中学位于汾阳市城区，是近代教会学校建筑。校舍始建于清光绪三十一年（1905年），由美国基督教公理会创办，是近代山西新式教育的代表。校舍现保存有清末民国时期遗构，主要建筑有教学楼、礼堂、图书馆等，建筑为中西合璧式风格，是研究近代山西教育史和教会建筑史的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"齐圣广佑王庙","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.78,"desc":"汾阳齐圣广佑王庙位于汾阳市齐圣村，是供奉\"齐圣广佑王\"（传说中唐太宗李世民）的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太符观","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.77,"desc":"汾阳太符观位于汾阳市杏花村镇上庙村，始建于金代承安年间（1196-1200年），明清两代多次修葺。观坐北朝南，前后两进院落，中轴线上建有戏台、东西配殿、正殿、后殿等。其中正殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。观内存金代及明代壁画约100平方米，绘道教题材「三清」「朝元」等内容。庙内还有「雌雄同株老核桃树」等奇景。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"汾阳文峰塔","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.78,"desc":"汾阳文峰塔位于汾阳市区东郊，又名\"魁星塔\"，是当地为兴文运、振文风而修建的风水塔。塔始建于明万历年间（1573-1620年），清代多次修葺。塔为八角九层密檐式砖塔，高约30米，由塔基、塔身、塔檐、塔刹四部分组成。塔身四面辟有门，门旁雕佛像；塔檐为砖雕仿木构斗栱，层层上收。塔刹为铁制，由覆钵、相轮、宝瓶组成，是晋中地区明代风水塔的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"汾阳五岳庙","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.77,"desc":"汾阳五岳庙位于汾阳市城区西街，是供奉五岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"杏花村汾酒作坊","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.78,"desc":"杏花村汾酒作坊位于汾阳市杏花村镇，是山西杏花村汾酒集团\"汾酒老作坊\"的源头。作坊始建于宋元时期，明清两代大规模扩建。作坊现保存有明清两代的酿酒作坊、设备、储酒器具等实物，主要包括\"地缸发酵\"\"蒸馏\"\"储酒\"等工序相关设施。作坊占地约5000平方米，建筑布局体现了传统酿酒工艺流程。是研究中国白酒酿造史、晋商发展史和晋中地区食品工业史的重要实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"虞城五岳庙","city":"吕梁市","county":"汾阳市","lat":37.43,"lng":111.77,"desc":"汾阳虞城五岳庙位于汾阳市虞城村，是供奉五岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"峪口圣母庙","city":"吕梁市","county":"汾阳市","lat":37.44,"lng":111.78,"desc":"汾阳峪口圣母庙位于汾阳市峪口村，是当地民间信仰\"圣母\"的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"卦山天宁寺","city":"吕梁市","county":"交城县","lat":37.55,"lng":112.15,"desc":"交城卦山天宁寺位于交城县西北10公里卦山山腰，是中国佛教禅宗曹洞宗的发祥地之一。寺始建于北魏，北宋熙宁三年（1070年）建藏经楼，元明清各代多次修葺。寺依山而建，先后十三层院落，主要建筑有千佛阁、虚堂、藏经楼、佛堂院、四明亭、瓦窑洞等。其中千佛阁为明代木构遗存。寺内存有唐代以来碑碣百余通，被誉为\"历代书法碑林\"，著名书法家颜真卿、宋代米芾等人题刻均保存于此。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"交城永福寺","city":"吕梁市","county":"交城县","lat":37.55,"lng":112.15,"desc":"交城永福寺位于交城县城区北街，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"韩极石牌坊及韩极碑亭","city":"吕梁市","county":"交口县","lat":36.98,"lng":111.21,"desc":"交口韩极石牌坊及韩极碑亭位于交口县韩极村，是清代为纪念当地名士韩极而建的纪念性建筑群。牌坊始建于清乾隆年间（1736-1795年），由当地韩氏家族出资建造。牌坊为四柱三门五楼式，全部由青石雕砌，结构精巧。碑亭为单檐歇山顶建筑，内立\"韩极功德碑\"及韩氏先贤碑数通。牌坊与碑亭组合，是清代晋中地区家族纪念建筑的代表作品。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"碛口古建筑群","city":"吕梁市","county":"临县","lat":37.57,"lng":110.61,"desc":"碛口古建筑群位于临县城南50公里黄河东岸碛口镇，是明清时期黄河流域重要的水运商埠。碛口自金代起逐渐形成，明清两代最为繁盛，与河北「胜芳」、「辛集」同为中国北方商贸重镇。古建筑群沿黄河与湫水河布局，主要街道包括「后街」「二道街」「三道街」「四道街」等，现存明清两代店铺、客栈、庙宇、民居、商号等明清建筑数十处，其中最具代表性的有黑龙庙、「祥元店」、「义顺德」等。主要建筑多为砖木结构，硬山顶或窑洞式建筑，是研究明清晋商文化、黄河航运史的实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"临县善庆寺","city":"吕梁市","county":"临县","lat":37.56,"lng":110.6,"desc":"临县善庆寺位于临县城区东南隅，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"观音庙（柳林）","city":"吕梁市","county":"柳林县","lat":37.45,"lng":110.89,"desc":"柳林观音庙位于柳林县城区西街，是供奉观音菩萨的佛教庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"柳溪寺舍利塔","city":"吕梁市","county":"柳林县","lat":37.46,"lng":110.9,"desc":"柳林柳溪寺舍利塔位于柳林县柳溪寺村，原为柳溪寺遗物。塔始建于唐代，明清两代多次修葺。塔为方形七层密檐式砖塔，高约25米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。塔内供奉唐代高僧舍利。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"柳林南山寺","city":"吕梁市","county":"柳林县","lat":37.45,"lng":110.89,"desc":"柳林南山寺位于柳林县城南南山山腰，因山势而得名「南山寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"柳林双塔寺","city":"吕梁市","county":"柳林县","lat":37.46,"lng":110.9,"desc":"柳林双塔寺位于柳林县东北20公里贾家垣村，因寺前有一对砖塔而得名。寺始建于唐，明清两代多次修葺。双塔为宋金遗物，均为方形密檐式砖塔。东塔名「文峰塔」高约15米，西塔名「南山塔」高约13米。两塔并立于寺前，相距约30米，造型古朴端庄。塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收。双塔是研究宋金时期山西砖塔建筑的重要实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"香严寺","city":"吕梁市","county":"柳林县","lat":37.45,"lng":110.89,"desc":"柳林香严寺位于柳林县城内，始建于唐贞观年间，明清两代多次修葺。寺坐北朝南，前后三进院落，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为金代木构遗存（局部），主体建筑风格保留金元特征。寺内存历代碑碣数十通和明清彩塑。其中\"七佛殿\"地砖中发现的\"金代金棺\"出土于1975年，内藏\"金刚经\"等佛经。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"玉虚宫下院","city":"吕梁市","county":"柳林县","lat":37.46,"lng":110.9,"desc":"柳林玉虚宫下院位于柳林县玉虚宫村，因原属玉虚宫的下院而得名「玉虚宫下院」。宫始建于元代，明清两代多次修葺。宫坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。宫内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"后土圣母庙（石楼）","city":"吕梁市","county":"石楼县","lat":36.99,"lng":110.83,"desc":"石楼后土圣母庙位于石楼县城区东街，是当地民间信仰\"后土圣母\"的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"仁泉寺","city":"吕梁市","county":"石楼县","lat":37,"lng":110.84,"desc":"石楼仁泉寺位于石楼县城区北郊，因寺旁泉水而得名「仁泉寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"兴东垣东岳庙","city":"吕梁市","county":"石楼县","lat":36.99,"lng":110.83,"desc":"石楼兴东垣东岳庙位于石楼县兴东垣村，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"开栅能仁寺","city":"吕梁市","county":"文水县","lat":37.45,"lng":112.03,"desc":"文水开栅能仁寺位于文水县开栅镇，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"麻家堡关帝庙","city":"吕梁市","county":"文水县","lat":37.44,"lng":112.04,"desc":"文水麻家堡关帝庙祭祀关羽。","era":"明清","level":"省保"},
{"name":"上贤梵安寺塔","city":"吕梁市","county":"文水县","lat":37.45,"lng":112.03,"desc":"文水上贤梵安寺塔位于文水县上贤村，原为梵安寺遗物。塔始建于唐代，明清两代多次修葺。塔为八角九层密檐式砖塔，高约25米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"文水则天庙","city":"吕梁市","county":"文水县","lat":37.44,"lng":112.04,"desc":"文水则天庙位于文水县城北3公里南徐村北，又名\"则天圣母庙\"。庙始建于唐，重修于金皇统五年（1145年），明清两代续修，是全国唯一一座祭祀女皇武则天的庙宇。庙坐北朝南，中轴线上建有戏台、正殿、东西配殿等。其中正殿（金代大殿）为金代木构遗存，面阔三间，进深六椽，单檐歇山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造。殿内壁面存有明代壁画约90平方米。庙前有\"武则天故里\"石碑。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"慈胜寺","city":"吕梁市","county":"孝义市","lat":37.15,"lng":111.78,"desc":"孝义慈胜寺位于孝义市城区南街，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"寂照寺","city":"吕梁市","county":"孝义市","lat":37.16,"lng":111.79,"desc":"孝义寂照寺位于孝义市城区北街，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"孝义临黄塔","city":"吕梁市","county":"孝义市","lat":37.15,"lng":111.78,"desc":"孝义临黄塔位于孝义市城区东郊，原为临黄寺遗物。塔始建于唐代，明清两代多次修葺。塔为方形九层密檐式砖塔，高约30米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"孝义三皇庙","city":"吕梁市","county":"孝义市","lat":37.16,"lng":111.79,"desc":"孝义三皇庙位于孝义市城西2公里大虺村，又名「三皇圣君庙」，始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有戏台、东西配殿、正殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐歇山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，结构简洁。庙内供奉「三皇」（伏羲、神农、轩辕）。殿内存元、明、清各代碑碣数通。三皇庙对研究晋中地区元代民间信仰建筑具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"天齐庙","city":"吕梁市","county":"孝义市","lat":37.15,"lng":111.78,"desc":"孝义天齐庙位于孝义市城区西街，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"中阳楼","city":"吕梁市","county":"孝义市","lat":37.16,"lng":111.79,"desc":"孝义中阳楼位于孝义市中心古街，始建于明万历二十七年（1599年），清嘉庆十一年（1806年）大规模重建。楼为单体楼阁式建筑，台基为方形砖砌券洞式结构，南北辟券洞门可通行；楼身面阔进深各三间，上下两层，重檐十字歇山顶，筒板瓦屋面，琉璃脊饰，气势雄伟。楼南有\"中阳楼\"匾一方，为清代书法家何绍基所书。楼前有石狮一对，明代石狮一对。该楼是孝义古城的标志性建筑。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"胡家沟砖塔","city":"吕梁市","county":"兴县","lat":38.46,"lng":111.13,"desc":"兴县胡家沟砖塔位于兴县胡家沟村，原为胡家沟古寺遗物。塔始建于唐代，明清两代多次修葺。塔为八角九层密檐式砖塔，高约18米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
/* ── 朔州市 ── */
{"name":"朔州城墙","city":"朔州市","county":"朔城区","lat":39.32,"lng":112.43,"desc":"朔州城墙位于朔城区古城内，始建于秦汉时期，明洪武三年（1370年）大规模重建为今制。城为夯土外砖包结构，城高约12米，周长约6公里，开东、南、西、北四座城门。城墙四角各设角楼一座，四门各设城楼一座。城门外有瓮城，城墙外有护城河。城墙整体布局完整，是明清时期山西北部重要的府县城池防御建筑。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"华岩寺塔","city":"朔州市","county":"怀仁县","lat":39.83,"lng":113.1,"desc":"华岩寺塔位于怀仁县金沙滩镇，原属华岩寺（也称\"华严寺\"），始建于辽代，明清两代多次修葺。塔为八角十三层密檐式砖塔，高约30米，由塔基、塔身、塔檐、塔刹四部分组成。塔基为方形石砌须弥座，束腰部分雕有精细的砖刻纹饰；塔身四面辟门或假门，门旁雕佛像；塔檐为砖雕仿木构斗栱，层层上收，造型繁复华丽。塔内存明代铜佛像和经卷。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"广武城","city":"朔州市","county":"山阴县","lat":39.52,"lng":112.76,"desc":"广武城位于山阴县中部，南距朔州市约30公里，包括广武旧城和广武新城两座同时期的明代军事城堡。广武旧城始建于明洪武七年（1374年），周长约1.5公里，城墙高约8米；广武新城始建于明洪武三十一年（1398年），周长约1公里。两城现存城墙、城门、瓮城、马面、敌楼等军事设施保存较好，是明长城沿线重要的「镇城」（驻兵城堡）。广武城扼守「南北要道」，是明代山西北部防御匈奴、鞑靼的前哨，至今仍是研究明代长城军事防御体系的实物。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"右玉宝宁寺","city":"朔州市","county":"右玉县","lat":40.18,"lng":112.47,"desc":"右玉宝宁寺位于右玉县城内，建于明代，是明代长城沿线军事城堡中的重要佛寺。寺坐北朝南，原规模较大，中轴线建有山门、天王殿、大雄宝殿、后殿、东西配殿等。其中大雄宝殿为明代木构，面阔五间，进深六椽，单檐歇山顶，前檐柱头斗栱五铺作。寺内存明清彩塑和壁画。右玉位于山西与内蒙古交界处，明代为边防军事要塞，宝宁寺的建设与戍边将士的精神寄托密切相关。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"花寨关帝庙","city":"朔州市","county":"应县","lat":39.57,"lng":113.29,"desc":"应县花寨关帝庙位于应县花寨村，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"应县净土寺","city":"朔州市","county":"应县","lat":39.56,"lng":113.29,"desc":"应县净土寺位于应县城内东北隅，原名「净因寺」，始建于金天会二年（1124年），明清两代多次修葺。寺原规模较大，现仅存大雄宝殿。大雄宝殿为金代木构遗存，面阔三间，进深四椽，单檐歇山顶，前檐柱头斗栱五铺作单抄单下昂。殿内天花藻井为金代遗物，「八门九星」「天宫楼阁」构造繁复精细，俗称「小千佛洞」，是山西金代建筑中最为精美的藻井。寺内存有金代铜钟一口、明代石雕经幢数通。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
/* ── 太原市 ── */
{"name":"唱经楼","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"唱经楼位于太原市柳巷南路，是明清时期科举制度下考生宣读考卷（「唱经」）的建筑。明正德年间（1506-1521年）始建，清代多次重修。楼为重檐歇山顶楼阁式建筑，台基为砖砌方形结构，上建木构楼阁，面阔五间，进深二间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰。楼内原存放科举档案与试卷。楼前有照壁一座，上绘「鲤鱼跳龙门」图案。唱经楼是研究明清科举制度与山西教育史的实物资料。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"崇善寺大悲殿","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"崇善寺大悲殿位于太原市上马街，原崇善寺始建于唐，明洪武十四年（1381年）晋王朱棡为纪念其母高皇后，在原寺基础上大规模扩建，是明初晋藩王府香火院。清代崇善寺大部分建筑毁于火灾，现仅存大悲殿、山门、钟鼓楼等。大悲殿为明代木构，面阔七间，进深四椽，单檐歇山顶，前檐柱头斗栱七铺作，平面近方形，是明代官式建筑的代表作品。殿内供奉明代千手千眼观音菩萨立像三尊，高约8米，造型庄严。殿内还存有明代佛经、佛像等珍贵文物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"纯阳宫（太原）","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.56,"desc":"纯阳宫位于太原市五一广场西北隅，是供奉道教「八仙」之一吕洞宾的道教官观。宫始建于明万历年间（1573-1620年），清乾隆年间（1736-1795年）大规模扩建。宫坐北朝南，前后五进院落，主要建筑有宫门、献殿、吕祖殿、关公祠、玉皇阁、潜真洞等。宫内保存有明代至清代碑碣30余通、明清道教壁画多幅，以及精美的明清道教塑像。宫后院为「庞涓洞」传为吕洞宾修行处。宫内还辟有山西省民俗博物馆，展示晋中地区民俗文物。纯阳宫对研究明清道教建筑与太原历史具有重要价值。2013年列入第七批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"大关帝庙","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"太原大关帝庙位于太原市迎泽区桥头街，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂。庙内存明清壁画约80平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"窦大夫祠","city":"太原市","county":"城区及近郊区","lat":37.92,"lng":112.44,"desc":"窦大夫祠位于太原市西北25公里上兰村汾河峡谷西岸、烈石山麓，又称「英济祠」。祠始建年代不详，唐代已有记载，宋元丰八年（1085年）重建，明清两代多次修葺。祠坐北朝南，主要建筑有山门、东西配殿、正殿等。其中正殿为元代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型元代建筑风格。祠内有元代至清碑刻数通，记载了窦犨治水有功、被当地百姓立祠祭祀的事迹。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"督军府旧址","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"督军府旧址位于太原市府东街101号，是明清至民国时期山西最高军政衙署的所在地。明清时期为「山西巡抚衙门」，1912年阎锡山任山西都督时改为「督军府」。现存建筑为明清至民国时期遗构，主要有大门、仪门、东西配房、议事厅、休息厅、自省堂、梅山、钟楼等。府内的「梅山」和「钟楼」是府衙标志性建筑，「梅山」中曾藏有清末著名学者傅山先生题写的「梅山」石碑。督军府是研究明清以来山西政治、军事史的重要实物。2019年列入第八批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"多福寺","city":"太原市","county":"城区及近郊区","lat":37.93,"lng":112.45,"desc":"多福寺位于太原市西北24公里崛围山巅，始建于唐贞元年间（785-805年），原名「崛围教寺」，宋末毁于兵火，明洪武年间（1368-1398年）重建后改今名「多福寺」。寺依山而建，前后三进院落，主要建筑有山门、钟鼓楼、大雄宝殿、千佛殿等。其中大雄宝殿为明代木构，面阔五间，进深八椽，单檐歇山顶，前檐柱头斗栱七铺作。寺内保存有明代壁画约80平方米，绘佛、菩萨、佛本生故事等内容；明代彩塑约40尊；傅山先生曾在此隐居读书，寺内存傅山先生草书碑刻数通。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"东街秦氏民宅","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"太原东街秦氏民宅位于太原市杏花岭区东街，是清代晋商秦氏家族的民居建筑群。民宅始建于清乾隆年间（1736-1795年），嘉庆、道光年间多次扩建。民宅坐北朝南，前后三进院落，主要建筑有大门、过厅、正房、东西厢房等。民宅建筑规模较大，砖雕、木雕、石雕装饰精美，是清代晋中地区民居建筑的代表。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"晋源阿育王塔","city":"太原市","county":"城区及近郊区","lat":37.71,"lng":112.44,"desc":"晋源阿育王塔位于太原市西南晋源区晋源古城内，原为惠明寺（古称「惠明寺塔」）中建筑。寺始建于唐贞观年间（627-649年），宋元祐年间毁于地震后重建。塔始建于北宋太平兴国四年（979年），明代重修。塔为圆形喇嘛式砖塔，座落在方形石砌台基之上，通高约25米。塔基为方形须弥座，束腰部分四面雕有龙、凤、莲花等图案；塔身为圆形覆钵式，顶部有方形塔脖子十三天（相轮），塔刹为金属制，由覆钵、相轮、宝瓶、日月等组成。塔的形制奇特，是研究宋代喇嘛塔建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"晋源文庙","city":"太原市","county":"城区及近郊区","lat":37.71,"lng":112.43,"desc":"晋源文庙位于太原市西南晋源区晋源古城内，始建于明洪武六年（1373年），是明清时期太原县（晋源县前身）的官办文庙。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为明代木构遗存，面阔五间，进深六椽，单檐歇山顶，前檐柱头斗栱五铺作，殿内梁架为彻上露明造，结构严谨。庙内存明清碑碣数通，记载了晋源建县以来文庙的修缮史。庙后有清代\"晋阳书院\"遗址。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"净因寺","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"净因寺位于太原市西北20公里土堂村汾河西岸，因寺后土山上有大洞，相传宋代以前为刘氏之子出家处，明嘉靖二十年（1541年）因寺前汾河洪水泛滥，遂改「土堂」为「净因」。寺依山而建，主要建筑有大雄宝殿、过殿、罗汉殿、地藏殿等。其中大雄宝殿为明代木构，面阔三间，进深四椽，单檐歇山顶。寺内保存有明代彩塑、壁画及明清碑碣。寺后土山上有「土堂大佛」，高约6米，为北齐至隋唐时期雕刻。净因寺对研究太原地区明清佛教建筑与艺术演变具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"开化寺旧址与连理塔","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.56,"desc":"开化寺旧址与连理塔位于太原市西北24公里蒙山大佛景区。开化寺原名「净明寺」，始建于北齐天保二年（551年），历代均有修葺。寺内现存主要遗迹为宋代遗物——连理塔。两塔并立于寺前东西两侧，因两塔塔基相连，故名「连理塔」。东塔名「释迦塔」，西塔名「阿育王塔」，均为方形覆钵式砖塔（喇嘛式），通高约8米，塔身基座方形，塔肚圆形，塔脖子较高，塔刹为十三天和宝瓶，造型古朴庄严。两塔是研究宋代佛教砖塔建筑的珍贵实物。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"明秀寺","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"太原明秀寺位于太原市杏花岭区敦化坊，是一座佛教寺院。寺始建于唐代，明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太原清真寺","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.56,"desc":"太原清真寺位于太原市解放路南端，是太原市现存规模最大的伊斯兰教寺院。寺始建于唐贞元年间（785-805年），元明清各代屡有修葺。寺坐西朝东，主要建筑有大门、望月楼、礼拜殿、讲堂等。望月楼为元代木构遗存，平面六角形，二层单檐攒尖顶，结构精巧。礼拜殿为明代木构，面阔五间，进深四椽，单檐歇山顶，前檐柱头斗栱五铺作单抄单下昂。殿内可容纳500人同时礼拜。寺内存明清碑碣、阿文匾额等。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太山龙泉寺","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"太山龙泉寺位于太原市西南23公里风峪沟太山山腰，始建于唐景云元年（710年），原名「昊天观」，明洪武二十四年（1391年）改今名「龙泉寺」。寺坐北朝南，依山势而建，上下三进院落，主要建筑有山门、过殿、大雄宝殿、观音阁、莲花洞等。寺内有唐代八角形石经幢、宝塔式石灯等唐代石刻文物，是研究唐代太原佛教文化的重要实物。寺前有龙泉八景，寺后有莲花洞、滴泪佛等景点。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"太原文庙","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.56,"desc":"太原文庙位于太原市上官巷东端，始建于金大定年间（1161-1189年），明洪武、永乐年间重建，清代续修。庙坐北朝南，中轴线建有棂星门、大成门、大成殿、崇圣祠等。其中大成殿为明代木构遗存，面阔七间，进深八椽，单檐歇山顶，前檐柱头斗栱七铺作，是山西现存规模较大的明代文庙大成殿之一。庙内存金、元、明、清各代碑碣20余通，记载了太原文庙自金代以来的修缮史和儒学教育史。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"延圣寺","city":"太原市","county":"城区及近郊区","lat":37.86,"lng":112.55,"desc":"太原延圣寺位于太原市迎泽区朝阳街，是一座佛教寺院。寺始建于唐代，明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永祚寺","city":"太原市","county":"城区及近郊区","lat":37.85,"lng":112.56,"desc":"永祚寺位于太原市东南郝庄村东山坡上，因寺内双塔并立，俗称「双塔寺」。寺始建于明万历二十七年（1599年），原名「永明寺」，清初改今名「永祚寺」。寺院由下至上分为前院、后院、塔院三部分，主要建筑有无量殿、东塔（文峰塔）、西塔（宣文塔）等。两塔均为砖塔，平面八角形十三层密檐式，高约54米，是中国明代砖塔建筑的杰出代表。两塔塔身雕刻精细，每层均有砖雕仿木构斗栱、檐椽、瓦垄等，被誉为「晋阳奇观」。寺内无量殿（过殿）为明代砖砌仿木建筑，结构精巧。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"古交千佛寺","city":"太原市","county":"古交市","lat":37.91,"lng":112.17,"desc":"古交千佛寺位于古交市西北20公里岔口乡，因寺内供奉千佛而得名。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清彩塑、壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"宝梵寺","city":"太原市","county":"清徐县","lat":37.61,"lng":112.35,"desc":"清徐宝梵寺位于清徐县徐沟镇，始建于唐代，明清两代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"狐突庙","city":"太原市","county":"清徐县","lat":37.62,"lng":112.34,"desc":"清徐狐突庙位于清徐县西谷村狐突山麓，是祭祀春秋时期晋国大夫狐突的庙宇。庙始建于金代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清泉寺","city":"太原市","county":"清徐县","lat":37.61,"lng":112.35,"desc":"清徐清泉寺位于清徐县城西北15公里清泉山麓，因寺旁泉水清冽而得名「清泉寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清徐尧庙","city":"太原市","county":"清徐县","lat":37.62,"lng":112.34,"desc":"清徐尧庙位于清徐县城内，是祭祀上古帝王帝尧的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清源文庙","city":"太原市","county":"清徐县","lat":37.61,"lng":112.35,"desc":"清源文庙位于清徐县清源镇城内东南隅，始建于金大定年间（1161-1189年），明清两代多次修葺。庙坐北朝南，中轴线建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为明代木构，面阔五间，进深六椽，单檐歇山顶，前檐柱头斗栱五铺作，殿内梁架为彻上露明造。庙内存明清碑碣数通，记载了清源文庙自金代以来的修缮史。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"清徐文殊塔","city":"太原市","county":"清徐县","lat":37.62,"lng":112.34,"desc":"清徐文殊塔位于清徐县城内，原为文殊寺遗物。塔始建于唐代，明清两代多次修葺。塔为八角九层密檐式砖塔，高约25米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"香岩寺","city":"太原市","county":"清徐县","lat":37.61,"lng":112.35,"desc":"清徐香岩寺位于清徐县城西北10公里香岩山麓，因山势、岩石而得名「香岩寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"徐沟城隍庙","city":"太原市","county":"清徐县","lat":37.62,"lng":112.34,"desc":"徐沟城隍庙位于清徐县徐沟镇内东街，是祀奉城隍神的庙宇。庙始建于明洪武三年（1370年），明清两代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为明代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"徐沟文庙","city":"太原市","county":"清徐县","lat":37.61,"lng":112.35,"desc":"徐沟文庙位于清徐县徐沟镇内东南隅，是祭祀孔子的庙宇。庙始建于金大定年间（1161-1189年），明清两代多次修葺。庙坐北朝南，中轴线上建有棂星门、大成门、大成殿、明伦堂、崇圣祠等。其中大成殿为明代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存历代碑碣数通。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"严香寺","city":"太原市","county":"清徐县","lat":37.62,"lng":112.34,"desc":"清徐严香寺位于清徐县城西北5公里严香山麓。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"不二寺","city":"太原市","county":"阳曲县","lat":38.06,"lng":112.69,"desc":"不二寺位于阳曲县北留乡小直峪村，始建于北汉乾祐九年（976年），原名\"不二禅院\"，明清两代多次修葺。寺坐北朝南，原有山门、过殿、大雄宝殿、东西配殿等，现仅存大雄宝殿和西配殿。其中大雄宝殿为金代木构遗存，面阔三间，进深四椽，单檐悬山顶，平面近方形，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型金代建筑风格。寺内存金代塑像残件和明清壁画。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"阳曲大王庙","city":"太原市","county":"阳曲县","lat":38.07,"lng":112.7,"desc":"阳曲大王庙位于阳曲县东黄水镇大王庙村，是当地民间信仰庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"明泰大师塔","city":"太原市","county":"阳曲县","lat":38.06,"lng":112.69,"desc":"阳曲明泰大师塔位于阳曲县北留乡小直峪村不二寺山腰，是为纪念金代高僧明泰大师而建的墓塔。塔始建于金代，明清两代多次修葺。塔为八角七层密檐式砖塔，高约10米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"前斧柯悬泉寺","city":"太原市","county":"阳曲县","lat":38.07,"lng":112.7,"desc":"阳曲前斧柯悬泉寺位于阳曲县北留乡前斧柯村悬泉山腰，因寺旁山泉从悬崖飞泻而下而得名「悬泉寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"帖木儿塔","city":"太原市","county":"阳曲县","lat":38.06,"lng":112.69,"desc":"阳曲帖木儿塔位于阳曲县城西5公里，是为纪念元代蒙古族将军帖木儿而建的纪念塔。塔始建于元代，明清两代多次修葺。塔为八角七层密檐式砖塔，高约15米。塔基为方形须弥座；塔身四面辟假门或装饰性假窗；塔檐为砖雕仿木构斗栱，层层上收，造型古朴。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"辛庄开化寺","city":"太原市","county":"阳曲县","lat":38.07,"lng":112.7,"desc":"阳曲辛庄开化寺位于阳曲县辛庄村，是一座佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"轩辕庙","city":"太原市","county":"阳曲县","lat":38.06,"lng":112.69,"desc":"阳曲轩辕庙位于阳曲县城内东南隅，是祭祀黄帝轩辕氏的庙宇。庙始建于元代，明清两代多次修葺。庙坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为元代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"铁猫寺","city":"太原市","county":"阳曲县","lat":38.07,"lng":112.7,"desc":"阳曲铁猫寺位于阳曲县城西北15公里铁猫山下，因寺旁有元代铁猫一对而得名「铁猫寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
/* ── 忻州市 ── */
{"name":"北城门楼","city":"忻州市","county":"城区及近郊区","lat":38.42,"lng":112.73,"desc":"北城门楼位于忻州古城北门\"拱辰门\"外，原建筑始建于明万历二十四年（1596年），后多次修葺。门楼为歇山顶楼阁式建筑，砖砌券洞式台基，上建木构楼阁，面阔五间，进深二间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰。楼前有月城（瓮城），原有护城河。城楼是忻州古城标志性建筑，也是现存少见的保存完整的明代府城城门楼。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"金洞寺","city":"忻州市","county":"城区及近郊区","lat":38.42,"lng":112.74,"desc":"金洞寺位于忻州西北20公里呼延村西的山巅，是一处规模较大的道教与佛教融合的宗教建筑。寺始建于北宋元祐年间（1086-1094年），明清两代多次修葺。寺内现存建筑有山门、天王殿、大雄宝殿、藏经楼、乾坤楼等。其中乾坤楼是明代木构遗存，是金洞寺的核心建筑。寺内供奉释迦牟尼佛及道教三清等，是三教合一建筑的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"秀容书院","city":"忻州市","county":"城区及近郊区","lat":38.42,"lng":112.73,"desc":"秀容书院位于忻州城内东南隅，创建于清乾隆四十年（1775年），是忻州历史上第一所官办书院。书院坐北朝南，主要建筑有大门、过厅、东西讲堂、正堂、藏书楼等。书院内有清代碑刻和古柏。书院与忻州北城门楼遥遥相对，是清代忻州府的文化教育中心。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"代县阿育王塔","city":"忻州市","county":"代县","lat":39.07,"lng":112.96,"desc":"代县阿育王塔为佛教古塔。","era":"明清","level":"省保"},
{"name":"代县边靖楼","city":"忻州市","county":"代县","lat":39.07,"lng":112.96,"desc":"边靖楼位于代县县城十字街心，又名\"鼓楼\"，始建于明洪武七年（1374年），成化年间重建，清代多次修葺。楼为城楼式建筑，台基为砖砌方形城台，高约13米，下部设南北向券洞门；楼身面阔七间，进深五间，四周围廊，重檐歇山顶，筒板瓦屋面，琉璃脊饰。楼高约40米，气势雄伟，被誉为\"亚洲第一楼\"。楼上悬\"声闻四达\"巨匾一方（清雍正十一年1733年制），长约6米、宽近3米，是雁门关外代县古城的标志性建筑。1958年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"长城雁门关段","city":"忻州市","county":"代县","lat":39.18,"lng":112.94,"desc":"长城雁门关段位于代县县城北约20公里雁门山，是明代万里长城的重要关隘。关城始建于战国时期的赵国，西汉时期已为\"九塞\"之一，北魏时称\"雁门关\"，明洪武七年（1374年）重建关城。关城周长约1公里，城墙高约7米，设东、西、北三门。关内有\"边贸街\"\"天险门\"\"地利门\"等关城设施。关城两侧的明代长城沿山势蜿蜒，是中国古代北方军事防御体系的代表。关城外的\"李牧祠\"\"杨家将祠\"等祠庙，纪念了历代守关名将。2001年列入第五批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"洪济寺砖塔","city":"忻州市","county":"代县","lat":39.07,"lng":112.97,"desc":"代县洪济寺砖塔为佛教古塔。","era":"明清","level":"省保"},
{"name":"洪福寺砖塔","city":"忻州市","county":"代县","lat":39.06,"lng":112.96,"desc":"代县洪福寺砖塔为佛教古塔。","era":"明清","level":"省保"},
{"name":"代县文庙","city":"忻州市","county":"代县","lat":39.07,"lng":112.96,"desc":"代县文庙位于代县县城内西南街，始建于唐，元明清各代多次修葺。庙坐北朝南，中轴线建有棂星门、泮池、大成门、大成殿、崇圣祠、雁池、廊庑等。其中大成殿为明代木构遗存，面阔七间，进深八椽，单檐歇山顶，前檐柱头斗栱五铺作双下昂，殿内梁架为彻上露明造，结构宏大，是山西现存规模较大的明代文庙大成殿之一。庙内保存有金、元、明、清各代碑碣30余通，记载了代县文庙自唐代以来的修缮史。庙前有明代照壁一座。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"杨忠武祠","city":"忻州市","county":"代县","lat":39.06,"lng":112.97,"desc":"杨忠武祠位于代县县城东20公里鹿蹄涧村，是北宋杨家将杨业（杨继业）的家祠。祠始建于元代，明清两代多次修葺。祠坐北朝南，前有戏台，正殿供奉杨业及八郎的塑像，两侧有杨氏家族历代名将塑像。祠前有\"鹿蹄石\"一块，传为杨业射鹿之处。庙内现存明清碑碣数通和\"杨氏族谱\"碑一通，对研究杨家将传说和杨氏家族史具有重要价值。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"永和堡等三十九堡军事防御遗址","city":"忻州市","county":"代县","lat":39.07,"lng":112.96,"desc":"代县永和堡等三十九堡为明代军事遗址。","era":"明清","level":"省保"},
{"name":"赵杲观","city":"忻州市","county":"代县","lat":39.06,"lng":112.97,"desc":"赵杲观位于代县峨口镇东南3公里天台山麓，是一处道、佛、儒三教合一的宗教建筑群。观始建于北魏太延年间（435-440年），传说为北魏大臣赵杲（被谗后隐居此地）所建。观依山而建，分上、中、下三层，主要建筑有山门、钟鼓楼、东西配殿、观音阁、赵杲洞等。其中\"赵杲洞\"为天然石洞，洞内有北魏至明清历代题刻。观内保存有明代壁画约60平方米，绘道教、佛教内容；明、清碑碣20余通。观前有汉白玉石牌坊一座。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"代县钟楼","city":"忻州市","county":"代县","lat":39.07,"lng":112.96,"desc":"代县钟楼位于代县县城十字街西侧，与东边边靖楼相对，始建于明成化年间（1465-1487年），清代多次修葺。楼为单体楼阁式建筑，台基为砖砌方形结构，下部设券洞门可通行；楼身面阔进深各三间，上下两层，重檐歇山顶，筒板瓦屋面，琉璃脊饰。楼内悬\"代州钟楼\"匾一方。钟楼是代县古城的报时、警戒建筑，与边靖楼齐名，是研究明清州府建筑布局的重要实物。1958年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"白佛堂","city":"忻州市","county":"定襄县","lat":38.5,"lng":112.96,"desc":"定襄白佛堂为佛教庙宇。","era":"明清","level":"省保"},
{"name":"定襄关王庙","city":"忻州市","county":"定襄县","lat":38.5,"lng":112.96,"desc":"定襄关王庙位于定襄县城东大街，俗称\"关帝庙\"。庙始建于金代，元明清各代多次修葺。庙坐北朝南，前后两进院落，主要建筑有山门、戏台、献殿、正殿、东西配殿等。其中正殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型金代建筑风格。庙内存明代壁画约80平方米和历代碑碣数通。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"定襄洪福寺","city":"忻州市","county":"定襄县","lat":38.49,"lng":112.96,"desc":"陡道山国保单位洪福寺（定襄）位于定襄县城北10公里北庄村西的陡道山中，始建于北魏，明清两代多次修葺。寺坐北朝南，依山而建，前后三进院落，主要建筑有山门、天王殿、大雄宝殿、东西配殿、僧舍等。其中大雄宝殿内供奉华严三圣（释迦、文殊、普贤），为明代彩塑。寺内还保存有北魏石雕造像和明清壁画。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"留晖洪福寺","city":"忻州市","county":"定襄县","lat":38.5,"lng":112.97,"desc":"定襄留晖洪福寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"公主寺","city":"忻州市","county":"繁峙县","lat":39.22,"lng":113.27,"desc":"公主寺位于繁峙县城东南30公里公主村，始建于北魏孝文帝时期（471-499年），因传说北魏文成帝之女信诚公主出家于此而得名。寺坐北朝南，中轴线上建有山门、钟鼓楼、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构，面阔五间，进深六椽，单檐悬山顶，殿内保存有明代壁画约90平方米，绘「佛、菩萨、佛本生故事」等内容，技法上承唐宋余韵，是明代壁画艺术的杰出代表。壁画中以「水陆法会图」最为精彩。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"繁峙秘密寺","city":"忻州市","county":"繁峙县","lat":39.23,"lng":113.28,"desc":"秘密寺位于五台山繁峙县岩头乡岩头村，是五台山十大寺院之一，又名「秘魔崖」。寺始建于唐代，因寺后秘魔崖上有天然石洞传为文殊菩萨修行处，故名「秘密寺」。寺坐北朝南，主要建筑有山门、东西配殿、大雄宝殿等。其中大雄宝殿为明代木构遗存，寺后秘魔崖上建有「文殊洞」和「秘密岩」。寺前有唐代石经幢一座，是研究唐代佛教遗存的珍贵实物。寺内有「秘密寺历代高僧肉身塔」。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},

{"name":"岱岳庙（河曲）","city":"忻州市","county":"河曲县","lat":39.39,"lng":111.44,"desc":"岱岳庙（河曲）位于河曲县城东北12公里岱岳殿村，又名\"东岳行祠\"，始建于金代，明清两代多次修葺。庙依山而建，前低后高，主要建筑有山门、戏台、过殿、东西配殿、正殿等。其中正殿为金代木构遗存，面阔五间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作单抄单下昂，殿内梁架为彻上露明造，使用自然弯材，呈现典型金代建筑风格。庙内存金代塑像和明清壁画。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"海潮庵","city":"忻州市","county":"河曲县","lat":39.38,"lng":111.45,"desc":"海潮庵位于河曲县城北黄河东岸海潮庵村，始建于明万历年间（1573-1620年），清康熙年间扩建至现有规模。庵坐北朝南，院落相连，主要建筑有山门、天王殿、大雄宝殿、地藏殿、关帝殿、吕祖阁、藏书楼等。庵内有清代彩塑、壁画和历代碑碣。海潮庵因紧邻黄河渡口，明清两代为往来商旅祈祷平安之所。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"河曲静乐文庙","city":"忻州市","county":"静乐县","lat":38.36,"lng":111.94,"desc":"静乐文庙为祭祀孔子的庙宇。","era":"明清","level":"省保"},

{"name":"万佛寺","city":"忻州市","county":"宁武县","lat":39.0,"lng":112.3,"desc":"宁武万佛寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"护宁寺","city":"忻州市","county":"偏关县","lat":39.44,"lng":111.5,"desc":"偏关护宁寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"隆岗寺","city":"忻州市","county":"偏关县","lat":39.43,"lng":111.51,"desc":"偏关隆岗寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"金阁寺","city":"忻州市","county":"五台山","lat":38.97,"lng":113.6,"desc":"五台山金阁寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"龙泉寺","city":"忻州市","county":"五台山","lat":38.98,"lng":113.59,"desc":"龙泉寺位于五台山台怀镇南9公里九龙岗山麓，始建于宋代，明清两代多次修葺。寺坐北朝南，寺旁有「龙泉」（泉眼）而得名。寺内主要建筑有山门、钟鼓楼、东西配殿、大雄宝殿等。其中大雄宝殿为明代木构，寺前有汉白玉石雕牌楼（「五台山石雕第一」），为明代遗物，工艺精湛。寺内保存有明清彩塑和壁画，寺后有「龙泉」和明代石雕「九龙壁」。寺前汉白玉石狮为明代雕刻，是研究明代石雕艺术的珍贵实物。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"罗睺寺","city":"忻州市","county":"五台山","lat":38.97,"lng":113.6,"desc":"罗睺寺位于五台山台怀镇显通寺东侧，始建于唐，明弘治五年（1492年）重修，明清两代多次修葺。寺坐北朝南，主要建筑有山门、天王殿、大雄宝殿、藏经楼等。其中大雄宝殿内\"开花现佛\"机关独具特色——殿中央的木制转盘上装有佛像，转盘下设机轮，寺僧以绳索牵动时佛像徐徐旋转\"开花\"，是为五台山佛教文化中\"开智\"的独特表现形式。寺前有\"汉白玉石狮\"一对，造型生动。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台山南山寺","city":"忻州市","county":"五台山","lat":38.98,"lng":113.59,"desc":"南山寺位于五台山台怀镇南2公里处，是五台山另一处重要的汉传佛教寺院。寺始建于元代，明嘉靖二十年（1541年）重建，明清两代多次修葺。寺坐北朝南，依山而建，上下三层院落，主要建筑有山门、钟鼓楼、天王殿、大雄宝殿、观音殿、佛国藏珍楼等。寺前有大石阶108级，寺内殿宇层叠，错落有致。寺内有明代石雕「送子观音」和精美的汉藏佛教彩塑，其中「五台山全景图」雕刻为研究五台山佛教建筑布局的珍贵资料。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台山殊像寺","city":"忻州市","county":"五台山","lat":38.97,"lng":113.6,"desc":"殊像寺位于五台山台怀镇大白塔西北约200米处，因供奉文殊菩萨而得名。寺始建于唐，元末毁于兵火，明成化年间（1465-1487年）重建，清代多次修葺。寺坐北朝南，前有牌楼，山门内左右各有配殿，正中为文殊阁（又称「大文殊殿」）。文殊阁为明代木构，面阔五间，进深四椽，平面方形，重檐歇山顶，殿内供奉明代彩塑文殊菩萨及胁侍、梵天、帝释等塑像。其中文殊菩萨驾驭青狮的塑像高达9.8米，是五台山文殊信仰的重要实物。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"碧山寺","city":"忻州市","county":"五台山","lat":38.98,"lng":113.59,"desc":"碧山寺位于五台山台怀镇东北2公里北台顶山麓，又名\"北山寺\"。寺始建于北魏孝文帝时期（471-499年），唐代重建，明成化年间（1465-1487年）改为汉传佛教十方丛林（可接受各方僧人挂单的寺院）。寺坐北朝南，主要建筑有天王殿、毗卢殿、戒坛殿、藏经楼等。其中戒坛殿为明代木构遗存，是五台山唯一保存完整的传戒法坛，对研究中国汉传佛教戒律传承具有重要价值。寺内有明代\"雷音宝殿\"匾和清代皇帝御赐匾额。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台山菩萨顶","city":"忻州市","county":"五台山","lat":38.97,"lng":113.6,"desc":"菩萨顶位于五台山台怀镇北灵鹫峰上，是五台山规模最大、地位最高的藏传佛教寺院，相传为文殊菩萨道场。寺始建于北魏孝文帝时期（471-499年），唐代重建，明永乐年间改为藏传佛教寺院，清代重修。寺坐北朝南，依山势而建，主要建筑有山门、天王殿、东西配殿、大雄宝殿、菩萨顶（真容殿）等，全部为清代遗构。寺前有108级石阶陡坡，寺内建筑以红墙黄瓦（清代皇家用色）为基调，乾隆皇帝曾多次到此朝拜。寺后有\"滴水殿\"等奇景。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台山塔院寺","city":"忻州市","county":"五台山","lat":38.98,"lng":113.59,"desc":"塔院寺位于五台山台怀镇显通寺南侧，原为显通寺塔院，明永乐五年（1407年）独立成寺。寺内标志性建筑为大白塔（释迦文佛真身舍利塔），为明代遗物。塔为喇嘛式砖塔，座落在方形台基之上，塔身白色覆钵式，高约50余米，塔脖子十三天（相轮），塔刹由覆钵、相轮、华盖、宝瓶、圆光组成，造型雄浑壮观。塔身四周悬挂风铎，清风徐来叮当作响。塔前有大慈延寿宝殿（明万历年间建），塔后有大藏经阁。塔院寺大白塔是五台山的标志性建筑，也是五台山佛教文化的象征。1961年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台山显通寺","city":"忻州市","county":"五台山","lat":38.97,"lng":113.6,"desc":"显通寺位于五台山台怀镇北侧，是五台山历史最悠久、规模最大、地位最特殊的汉传佛教寺院，与洛阳白马寺同为中国最早的佛教寺院之一。寺始建于东汉永平年间（58-75年），初名\"大孚灵鹫寺\"，北魏孝文帝时扩建，唐代重修，明代重修后改今名\"显通寺\"。寺坐北朝南，占地约8万平方米，主要建筑有观音殿（文殊殿）、大雄宝殿、无量殿、千钵文殊殿、铜殿、铜塔等。其中铜殿为明代铸造，造型仿木构铜铸佛殿，工艺精湛；无量殿（俗称\"无梁殿\"）为明代砖砌仿木建筑。1982年列为全国重点文物保护单位（与塔院寺、菩萨顶等合并）。","era":"明清","level":"省保"},
{"name":"圆照寺","city":"忻州市","county":"五台山","lat":38.98,"lng":113.59,"desc":"圆照寺位于五台山台怀镇显通寺北侧，古称\"般若寺\"，始建于北魏孝文帝时期，明永乐年间（1403-1424年）改为藏传佛教寺院，明清两代多次修葺。寺坐北朝南，主要建筑有山门、天王殿、大雄宝殿、塔院等。其中大雄宝殿为明代木构，寺内\"印度高僧室利沙等三人之塔\"是永乐年间印度高僧来五台山朝拜后圆寂于此所建的佛塔。寺前有清代五台山地区仅存的一处石牌坊。1982年与显通寺等合并列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台佛光寺","city":"忻州市","county":"五台县","lat":38.69,"lng":113.61,"desc":"佛光寺位于五台县东北32公里佛光新村，始建于北魏孝文帝时期（471-499年），隋唐之际已是名刹。唐会昌五年（845年）武宗灭佛时寺宇被毁，唯余北魏祖师塔一座；唐大中十一年（857年）由女弟子宁公遇出资、高僧愿诚主持重建东大殿。寺坐东朝西，三进院落，中轴线上建有东大殿、文殊殿、伽蓝殿、东西配殿等。其中东大殿为唐代原构，面阔七间，进深四椽，单檐庑殿顶，是国内现存规模最大、保存最完整的唐代木构建筑。殿内保存有唐代塑像、壁画和题记，被誉为\"中国古建第一瑰宝\"。1961年列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台广济寺","city":"忻州市","county":"五台县","lat":38.7,"lng":113.6,"desc":"广济寺位于五台县城内西街，始建于元代至正年间（1341-1368年），明景泰、成化年间大规模重修，清代续修。寺坐北朝南，中轴线上建有山门、钟鼓楼、天王殿、大雄宝殿、藏经阁、东西配殿等。其中大雄宝殿为元代木构遗存，面阔七间，进深八椽，单檐悬山顶，前檐柱头斗栱五铺作，殿内梁架为彻上露明造，是元代山西佛寺建筑的代表作品。寺前有「五台山」石牌坊一座。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"五台南禅寺","city":"忻州市","county":"五台县","lat":38.69,"lng":113.61,"desc":"南禅寺位于五台县西南22公里李家庄阳白沟小银河北岸，创建年代不详，重建于唐建中三年（782年），是中国现存最早的木构建筑。寺坐北朝南，原规模较大，现仅存山门、东西配殿、大佛殿等。其中大佛殿为唐代原构，面阔、进深各三间，单檐歇山顶，平面方形，柱头斗栱五铺作，殿内佛坛上有唐代塑像17尊（一佛、二弟子、二胁侍菩萨、二天王、二供养菩萨、二侍立菩萨、二跪供养菩萨、二力士），是现存唯一的唐代寺观塑像。1961年列入第一批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"延庆寺","city":"忻州市","county":"五台县","lat":38.7,"lng":113.6,"desc":"延庆寺位于五台县城西南27公里善文村，始建于隋代，宋代重修，明清续修。寺坐北朝南，中轴线建有山门、钟鼓楼、东西配殿、大雄宝殿等。其中大雄宝殿为宋代木构遗存，面阔三间，进深四椽，单檐歇山顶，前檐柱头斗栱四铺作单抄，殿内梁架为彻上露明造，结构简洁，是山西现存少数宋代小型佛殿的代表作品。寺内存宋代塑像、壁画和明清碑碣。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"尊胜寺","city":"忻州市","county":"五台县","lat":38.69,"lng":113.61,"desc":"尊胜寺位于五台县东北部的茹村附近，始建于唐，重建于宋景德年间（1004-1007年），明清两代多次修葺，是五台山南门外的著名佛教寺院。寺坐北朝南，前后三进院落，中轴线建有山门、东西配殿、大雄宝殿、藏经楼、佛塔等。寺内佛塔为元代建筑，是研究五台山元代佛塔形制的重要实物。寺后有\"清凉山\"之称的五台山主景区。寺内存明清塑像和历代碑碣。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"佛堂寺","city":"忻州市","county":"原平市","lat":38.73,"lng":112.71,"desc":"原平佛堂寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"崞阳文庙","city":"忻州市","county":"原平市","lat":38.74,"lng":112.7,"desc":"原平崞阳文庙为祭祀孔子的庙宇。","era":"明清","level":"省保"},
{"name":"惠济寺（原平）","city":"忻州市","county":"原平市","lat":38.73,"lng":112.71,"desc":"原平惠济寺为佛教寺院。","era":"明清","level":"省保"},
{"name":"普济桥","city":"忻州市","county":"原平市","lat":38.74,"lng":112.7,"desc":"普济桥位于原平市城北西桥头村，是山西现存规模最大的古代石拱桥，因「普济众生」之意命名。桥始建于清乾隆四十二年（1777年），嘉庆年间续修。桥全长约60米，宽约10米，为四孔石拱桥，由青石与铁锭砌筑。桥面铺石，两侧设石栏板，栏板上雕刻有精美的花卉、瑞兽等图案。桥两端各有石狮一对，明清石牌坊一座。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},

{"name":"阳泉关王庙","city":"阳泉市","county":"城区及近郊区","lat":37.86,"lng":113.58,"desc":"阳泉关王庙位于阳泉市城区南大街，是祭祀关羽的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"冠山书院","city":"阳泉市","county":"平定县","lat":37.79,"lng":113.62,"desc":"冠山书院位于平定县城西南5公里冠山山腰，是山西现存最有影响的古代书院之一。书院始建于宋嘉祐年间（1056-1063年），元明清各代多次修葺扩建。书院依山势而建，主要建筑有崇贤祠、养正堂、岁寒亭、槐音书院、文昌阁、石刻艺术长廊等。\"冠山书院\"之名源于\"冠山\"\"冠山之意\"，历代文人墨客题刻众多，是研究中国教育史、书法史的重要实物。书院培养了大批人才，明代兵部尚书乔宇、清代两江总督左光斗等均曾在此就读。2006年列入第六批全国重点文物保护单位。","era":"明清","level":"省保"},
{"name":"冠山天宁寺双塔","city":"阳泉市","county":"平定县","lat":37.78,"lng":113.63,"desc":"冠山天宁寺双塔位于平定县城西南5公里冠山山腰，始建于宋代，明清两代多次修葺。双塔为两座四门八面佛塔，东塔高约13米，西塔高约10米，均为砖石结构，天宁寺旧址已毁，双塔独存。塔身雕刻精细，各层均有不同角度的转角柱、佛像、花卉等装饰。双塔相距约50米，隔沟对峙，是冠山山地的标志性建筑，也是研究山西佛教建筑史与地方信仰的实物。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"马齿岩寺","city":"阳泉市","county":"平定县","lat":37.79,"lng":113.62,"desc":"平定马齿岩寺位于平定县城南10公里马齿岩山腰，因山势、岩石而得名「马齿岩寺」。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，依山而建，主要建筑有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"盂县大王庙","city":"阳泉市","county":"盂县","lat":38.13,"lng":113.44,"desc":"盂县大王庙位于盂县城内东街，是当地民间信仰庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"盂县府君庙","city":"阳泉市","county":"盂县","lat":38.12,"lng":113.45,"desc":"盂县府君庙位于盂县城内西街，是当地祭祀「府君」（地方行政长官或地方神）的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"盂县烈女祠","city":"阳泉市","county":"盂县","lat":38.13,"lng":113.44,"desc":"盂县烈女祠位于盂县东南15公里路家村镇，是祭祀当地历代「烈女」（以死保节、勇于殉节的女性）的纪念性祠庙。祠始建于明嘉靖年间（1522-1566年），清代多次修葺。祠坐北朝南，中轴线上建有山门、过殿、正殿、东西配殿等。其中正殿为明代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。祠内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"坡头泰山庙","city":"阳泉市","county":"盂县","lat":38.12,"lng":113.45,"desc":"盂县坡头泰山庙位于盂县坡头村，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约60平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"盂县三圣寺","city":"阳泉市","county":"盂县","lat":38.13,"lng":113.44,"desc":"盂县三圣寺位于盂县城东南15公里秀水镇，是供奉佛教「华严三圣」（释迦、文殊、普贤）的佛教寺院。寺始建于唐代，元明清各代多次修葺。寺坐北朝南，中轴线上建有山门、过殿、大雄宝殿、东西配殿等。其中大雄宝殿为明代木构遗存。寺内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"},
{"name":"盂北泰山庙","city":"阳泉市","county":"盂县","lat":38.12,"lng":113.45,"desc":"盂县盂北泰山庙位于盂县北部村，是供奉东岳大帝的庙宇。庙始建于金代，元明清各代多次修葺。庙坐北朝南，中轴线上建有山门、戏台、正殿、东西配殿等。其中正殿为金代木构遗存，面阔三间，进深六椽，单檐悬山顶，前檐柱头斗栱五铺作。庙内存明清壁画约50平方米和历代碑碣。1986年列为省级重点文物保护单位。","era":"明清","level":"省保"}
